<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ヒデちゃん&猫ちゃん ULTIMATE++</title>
  <style>
    :root{
      --bg:#f2dfe5;
      --ink:#7f0f57;
      --pink:#ef6597;
      --pink-dark:#d94883;
      --purple:#b667cf;
      --purple-dark:#8c39b8;
      --yellow:#ffef29;
      --white:#ffffff;
      --soft-border:#efb7cb;
      --shadow:0 10px 24px rgba(90,20,60,.15);
    }
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
      color:var(--ink);
    }
    body{
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    .app{
      width:min(100vw,430px);
      height:100dvh;
      padding:20px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .title{
      text-align:center;
      font-size:clamp(26px,7vw,40px);
      font-weight:900;
      letter-spacing:.02em;
      margin-top:2px;
    }
    .hud{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:8px;
    }
    .chip{
      background:rgba(255,255,255,.55);
      border:1px solid rgba(255,255,255,.78);
      box-shadow:var(--shadow);
      border-radius:16px;
      padding:8px 6px;
      text-align:center;
      font-size:11px;
      color:#8a3761;
      font-weight:800;
      min-width:0;
    }
    .chip b{
      display:block;
      margin-top:2px;
      font-size:17px;
      color:var(--ink);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .board-wrap{
      position:relative;
      width:100%;
      flex:1;
      min-height:0;
      background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.35));
      border:4px solid var(--soft-border);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(248,238,242,.72);
      backdrop-filter:blur(3px);
      padding:18px;
      z-index:7;
    }
    .overlay.hidden{
      display:none;
    }
    .card{
      width:100%;
      max-width:330px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(255,255,255,.95);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px 16px;
      text-align:center;
      color:var(--ink);
    }
    .card .big{
      font-size:48px;
      line-height:1;
      margin-bottom:8px;
    }
    .card h2{
      margin:0 0 10px;
      font-size:25px;
      line-height:1.2;
    }
    .card p{
      margin:0;
      font-size:14px;
      line-height:1.6;
      color:#8a3761;
    }
    .card .best{
      margin-top:12px;
      font-weight:800;
      font-size:14px;
    }

    .char-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }
    .char-btn{
      background:rgba(255,255,255,.75);
      border:2px solid #f0bdd2;
      border-radius:18px;
      padding:10px 8px;
      box-shadow:var(--shadow);
      color:var(--ink);
      font:inherit;
    }
    .char-btn .emo{
      font-size:34px;
      line-height:1.1;
    }
    .char-btn .name{
      font-weight:900;
      font-size:16px;
      margin-top:4px;
    }
    .char-btn .desc{
      font-size:11px;
      line-height:1.4;
      color:#8a3761;
      margin-top:4px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1.1fr 1fr;
      gap:14px;
      margin-top:2px;
    }
    button{
      border:none;
      outline:none;
      font:inherit;
      cursor:pointer;
    }
    .ctrl{
      height:92px;
      border-radius:20px;
      font-weight:900;
      color:white;
      box-shadow:0 8px 0 rgba(0,0,0,.12);
      transition:transform .08s ease, box-shadow .08s ease, opacity .12s ease, filter .12s ease;
    }
    .ctrl:active{
      transform:translateY(4px);
      box-shadow:0 4px 0 rgba(0,0,0,.12);
    }
    .ctrl-left,.ctrl-right{
      background:linear-gradient(180deg, #ef6597, #e5538b);
      font-size:34px;
    }
    .ctrl-main{
      background:linear-gradient(180deg, #bf78d7, #ab5bcb);
      font-size:17px;
      line-height:1.25;
      padding:8px;
    }
    .ctrl-main small{
      display:block;
      font-size:11px;
      opacity:.9;
      margin-top:4px;
      font-weight:700;
    }
    .ctrl-main.ready{
      background:linear-gradient(180deg, #ffe26d, #ffb52f);
      color:#7a3b00;
      box-shadow:0 0 0 2px rgba(255,255,255,.4), 0 8px 0 rgba(0,0,0,.12), 0 0 22px rgba(255,209,55,.45);
    }
    .ctrl-main.disabled{
      opacity:.55;
      filter:grayscale(.3);
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:11px;
      color:#99657f;
      margin-top:-2px;
    }
    .gauge{
      flex:1;
      height:12px;
      background:rgba(255,255,255,.55);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.8);
    }
    .gauge-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#6de9ff,#9cff8d,#ffe56b);
      transition:width .12s linear;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">ヒデちゃん&猫ちゃん</div>

    <div class="hud">
      <div class="chip">SCORE<b id="scoreText">0</b></div>
      <div class="chip">STAGE<b id="stageText">1</b></div>
      <div class="chip">LIFE<b id="lifeText">3</b></div>
      <div class="chip">MODE<b id="modeText">TITLE</b></div>
    </div>

    <div class="board-wrap" id="boardWrap">
      <canvas id="game"></canvas>
      <div class="overlay" id="overlay">
        <div class="card" id="overlayCard"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl ctrl-left" id="leftBtn">◀</button>
      <button class="ctrl ctrl-main" id="mainBtn">START<small>タップで開始</small></button>
      <button class="ctrl ctrl-right" id="rightBtn">▶</button>
    </div>

    <div class="footer">
      <span>画面ドラッグでも移動</span>
      <div class="gauge"><div class="gauge-fill" id="skillFill"></div></div>
      <span id="skillLabel">SKILL 0%</span>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const boardWrap = document.getElementById('boardWrap');
      const overlay = document.getElementById('overlay');
      const overlayCard = document.getElementById('overlayCard');

      const scoreText = document.getElementById('scoreText');
      const stageText = document.getElementById('stageText');
      const lifeText = document.getElementById('lifeText');
      const modeText = document.getElementById('modeText');
      const skillFill = document.getElementById('skillFill');
      const skillLabel = document.getElementById('skillLabel');

      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');
      const mainBtn = document.getElementById('mainBtn');

      let W = 0;
      let H = 0;
      const DPR = Math.min(2, window.devicePixelRatio || 1);

      const TAGS = ['健康','仕事','旅行','猫','休み','笑顔','幸運','ごはん'];
      const CHARACTERS = [
        { id:'hide', emoji:'😄', name:'ヒデ', ballText:'ヒデ', color:'#ffef29' },
        { id:'cat', emoji:'🐱', name:'猫ちゃん', ballText:'CAT', color:'#ffd966' }
      ];
      let selectedChar = CHARACTERS[0];

      let state = 'title'; // title, select, playing, boss, paused, clear, gameover
      let pausedFrom = 'playing';
      let score = 0;
      let stage = 1;
      let life = 3;
      let skill = 0;
      let shake = 0;
      let damageFlash = 0;
      let lastTs = 0;
      let toast = { text:'', until:0 };

      let paddle = { x:0, y:0, w:82, h:14 };
      let ball = { x:0, y:0, vx:3.8, vy:-5.6, r:17 };
      let bricks = [];
      let particles = [];
      let bossBullets = [];
      let boss = null;

      let touchX = 0;
      let holdLeft = false;
      let holdRight = false;
      let dragActive = false;

      let specialFx = {
        active:false,
        until:0,
        text:'',
        catDashX:-120
      };

      let catImg = new Image();
      let catReady = false;
      const catCandidates = ['./cat.png.JPG', './cat.jpg', './cat.jpeg', './cat.png'];

      function loadCatCandidate(i){
        if (i >= catCandidates.length) return;
        catImg = new Image();
        catImg.onload = () => { catReady = true; };
        catImg.onerror = () => loadCatCandidate(i + 1);
        catImg.src = catCandidates[i];
      }
      loadCatCandidate(0);

      function resize(){
        const rect = boardWrap.getBoundingClientRect();
        W = rect.width;
        H = rect.height;
        canvas.width = Math.floor(W * DPR);
        canvas.height = Math.floor(H * DPR);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        paddle.y = H - 44;
        if (!touchX) touchX = W / 2;
        paddle.x = Math.min(Math.max(paddle.x || (W/2 - paddle.w/2), 16), W - paddle.w - 16);
        if (state === 'title' || state === 'select') resetBall();
      }

      function resetBall(){
        ball.r = 17;
        ball.x = W / 2;
        ball.y = H - 120;
        ball.vx = 3.8 * (Math.random() > 0.5 ? 1 : -1);
        ball.vy = -5.6;
      }

      function resetPaddle(){
        paddle.w = 82;
        paddle.h = 14;
        paddle.x = W / 2 - paddle.w / 2;
        paddle.y = H - 44;
      }

      function buildStage(n){
        bricks = [];
        const cols = 4;
        const rows = Math.min(4 + (n - 1), 6);
        const gapX = 14;
        const gapY = 12;
        const marginX = 18;
        const top = 36;
        const bw = (W - marginX * 2 - gapX * (cols - 1)) / cols;
        const bh = 30;

        for(let r = 0; r < rows; r++){
          for(let c = 0; c < cols; c++){
            bricks.push({
              x: marginX + c * (bw + gapX),
              y: top + r * (bh + gapY),
              w: bw,
              h: bh,
              alive: true,
              hp: r >= 3 ? 2 : 1,
              label: TAGS[(r * cols + c + n) % TAGS.length]
            });
          }
        }
      }

      function buildBoss(){
        boss = {
          x: W / 2 - 48,
          y: 84,
          w: 96,
          h: 96,
          hp: 42,
          maxHp: 42,
          vx: 2.3,
          hitFlash: 0,
          shotTimer: 0,
          phase: 1
        };
        bossBullets = [];
      }

      function setToast(text, ms = 900){
        toast.text = text;
        toast.until = performance.now() + ms;
      }

      function getRank(){
        if (score >= 900) return 'S';
        if (score >= 700) return 'A';
        if (score >= 500) return 'B';
        return 'C';
      }

      function updateHud(){
        scoreText.textContent = score;
        stageText.textContent = state === 'boss' ? 'BOSS' : stage;
        lifeText.textContent = life;
        modeText.textContent = state.toUpperCase();
        skillFill.style.width = Math.max(0, Math.min(100, skill)) + '%';
        skillLabel.textContent = 'SKILL ' + Math.round(skill) + '%';

        if (state === 'playing' || state === 'boss') {
          if (skill >= 100) {
            mainBtn.classList.add('ready');
            mainBtn.classList.remove('disabled');
            mainBtn.innerHTML = '必殺技!<small>タップで発動</small>';
          } else {
            mainBtn.classList.remove('ready');
            mainBtn.classList.add('disabled');
            mainBtn.innerHTML = 'PAUSE<small>長押し不要</small>';
          }
        } else if (state === 'title') {
          mainBtn.classList.remove('ready', 'disabled');
          mainBtn.innerHTML = 'START<small>タップで開始</small>';
        } else if (state === 'select') {
          mainBtn.classList.remove('ready', 'disabled');
          mainBtn.innerHTML = 'CHOOSE<small>キャラ選択中</small>';
        } else if (state === 'paused') {
          mainBtn.classList.remove('ready', 'disabled');
          mainBtn.innerHTML = 'RESUME<small>再開</small>';
        } else {
          mainBtn.classList.remove('ready', 'disabled');
          mainBtn.innerHTML = 'RETRY<small>もう一回</small>';
        }
      }

      function startGame(){
        unlockAudio();
        startBGM(false);
        state = 'playing';
        pausedFrom = 'playing';
        score = 0;
        stage = 1;
        life = 3;
        skill = 0;
        shake = 0;
        damageFlash = 0;
        boss = null;
        bossBullets = [];
        particles = [];
        specialFx.active = false;
        resetPaddle();
        resetBall();
        buildStage(stage);
        setToast('GO!!', 900);
        renderOverlay();
        updateHud();
      }

      function startBoss(){
        state = 'boss';
        pausedFrom = 'boss';
        bricks = [];
        buildBoss();
        resetPaddle();
        resetBall();
        skill = Math.max(skill, 40);
        setToast('BOSS!!', 1200);
        startBGM(true);
        updateHud();
      }

      function nextStage(){
        stage += 1;
        if (stage === 4) {
          startBoss();
          return;
        }
        buildStage(stage);
        resetBall();
        resetPaddle();
        skill = Math.min(100, skill + 18);
        setToast('STAGE ' + stage, 1000);
        updateHud();
      }

      function loseLife(){
        life -= 1;
        damageFlash = 1;
        shake = 14;
        playDamage();
        updateHud();
        if (life <= 0) {
          state = 'gameover';
          stopBGM();
          renderOverlay();
          saveBest();
          return;
        }
        resetBall();
        resetPaddle();
        bossBullets = [];
        setToast('いたい!', 900);
      }

      function saveBest(){
        const key = 'hidecat_best_score_v4';
        const best = Number(localStorage.getItem(key) || 0);
        if (score > best) localStorage.setItem(key, String(score));
      }

      function getBest(){
        return Number(localStorage.getItem('hidecat_best_score_v4') || 0);
      }

      function renderOverlay(){
        if (state === 'title') {
          overlay.classList.remove('hidden');
          overlayCard.innerHTML = `
            <div class="big">🐱</div>
            <h2>ヒデちゃん&猫ちゃん</h2>
            <p>
              今回は続きとして、<br>
              ボス弾幕・猫必殺技アニメ・ダメージ演出まで追加。
            </p>
            <div class="best">BEST: ${getBest()}</div>
          `;
          return;
        }

        if (state === 'select') {
          overlay.classList.remove('hidden');
          overlayCard.innerHTML = `
            <div class="big">🐱</div>
            <h2>キャラをえらぶ</h2>
            <p>猫画像は常時表示。ボール表示だけ選びます。</p>
            <div class="char-grid">
              ${CHARACTERS.map((c, i) => `
                <button class="char-btn" data-i="${i}">
                  <div class="emo">${c.emoji}</div>
                  <div class="name">${c.name}</div>
                  <div class="desc">${c.ballText} で表示</div>
                </button>
              `).join('')}
            </div>
          `;
          overlayCard.querySelectorAll('.char-btn').forEach(btn => {
            btn.onclick = () => {
              selectedChar = CHARACTERS[Number(btn.dataset.i)];
              startGame();
            };
          });
          return;
        }

        if (state === 'paused') {
          overlay.classList.remove('hidden');
          overlayCard.innerHTML = `
            <div class="big">⏸</div>
            <h2>PAUSE</h2>
            <p>中央ボタンで再開できます。</p>
            <div class="best">SCORE: ${score}</div>
          `;
          return;
        }

        if (state === 'gameover') {
          overlay.classList.remove('hidden');
          overlayCard.innerHTML = `
            <div class="big">🐱</div>
            <h2>ざんねん…</h2>
            <p>SCORE: <b>${score}</b><br>BEST: <b>${getBest()}</b></p>
          `;
          return;
        }

        if (state === 'clear') {
          overlay.classList.remove('hidden');
          overlayCard.innerHTML = `
            <div class="big">🐱</div>
            <h2>クリア！</h2>
            <p>
              SCORE: <b>${score}</b><br>
              BEST: <b>${getBest()}</b><br>
              RANK: <b>${getRank()}</b><br><br>
              猫とボス戦、かなりまとまってきた版です。
            </p>
          `;
          return;
        }

        overlay.classList.add('hidden');
      }

      function spawnBurst(x, y, n = 8, color = '#fff'){
        for(let i = 0; i < n; i++){
          const a = Math.random() * Math.PI * 2;
          const s = 1 + Math.random() * 2.5;
          particles.push({
            x, y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s - 0.4,
            life: 1,
            color
          });
        }
      }

      function triggerSpecialFx(text){
        specialFx.active = true;
        specialFx.until = performance.now() + 650;
        specialFx.text = text;
        specialFx.catDashX = -120;
      }

      function useSkill(){
        if (!(state === 'playing' || state === 'boss')) return;
        if (skill < 100) return;

        skill = 0;
        shake = 10;
        triggerSpecialFx(selectedChar.id === 'cat' ? 'にゃーー!!' : 'キラキラ!!');
        playMeow();

        if (selectedChar.id === 'hide') {
          if (state === 'playing') {
            let removed = 0;
            for (const brick of bricks) {
              if (brick.alive) {
                brick.alive = false;
                removed++;
                spawnBurst(brick.x + brick.w/2, brick.y + brick.h/2, 10, '#fff27a');
              }
            }
            score += removed * 12;
          } else if (state === 'boss' && boss) {
            boss.hp = Math.max(0, boss.hp - 8);
            boss.hitFlash = 1;
            spawnBurst(boss.x + boss.w/2, boss.y + boss.h/2, 18, '#fff27a');
          }
        } else {
          paddle.w = Math.min(150, paddle.w + 54);
          ball.vx *= 1.28;
          ball.vy *= 1.22;
          if (state === 'boss' && boss) {
            boss.hp = Math.max(0, boss.hp - 6);
            boss.hitFlash = 1;
          }
          spawnBurst(ball.x, ball.y, 14, '#ffd18a');
        }

        if (state === 'boss' && boss && boss.hp <= 0) {
          score += 300;
          state = 'clear';
          stopBGM();
          saveBest();
          renderOverlay();
        }

        updateHud();
      }

      function addBossBullets(){
        if (!boss) return;

        const centerX = boss.x + boss.w / 2;
        const startY = boss.y + boss.h - 6;
        const p = boss.phase;

        if (p === 1) {
          bossBullets.push({ x:centerX, y:startY, vx:0, vy:4.2, r:8 });
          bossBullets.push({ x:centerX - 26, y:startY, vx:-1.1, vy:4.0, r:7 });
          bossBullets.push({ x:centerX + 26, y:startY, vx: 1.1, vy:4.0, r:7 });
        } else if (p === 2) {
          for (let i = -2; i <= 2; i++) {
            bossBullets.push({ x:centerX + i * 12, y:startY, vx:i * 0.8, vy:4.6, r:7 });
          }
        } else {
          for (let i = -3; i <= 3; i++) {
            bossBullets.push({ x:centerX + i * 10, y:startY, vx:i * 0.95, vy:5.1, r:7 });
          }
          bossBullets.push({ x:centerX, y:startY - 10, vx:0, vy:5.6, r:10 });
        }
      }

      function update(dt){
        if (!(state === 'playing' || state === 'boss')) return;

        let move = 0;
        if (holdLeft) move -= 1;
        if (holdRight) move += 1;

        if (dragActive) {
          paddle.x += ((touchX - paddle.w / 2) - paddle.x) * Math.min(1, 0.24 * dt * 60);
        } else if (move !== 0) {
          paddle.x += move * 6.8 * dt * 60;
        }
        paddle.x = Math.max(16, Math.min(W - paddle.w - 16, paddle.x));

        if (paddle.w > 82) {
          paddle.w += (82 - paddle.w) * 0.06;
        }

        ball.x += ball.vx * dt * 60;
        ball.y += ball.vy * dt * 60;

        if (ball.x < ball.r) {
          ball.x = ball.r;
          ball.vx *= -1;
          playTap(320);
        }
        if (ball.x > W - ball.r) {
          ball.x = W - ball.r;
          ball.vx *= -1;
          playTap(320);
        }
        if (ball.y < ball.r) {
          ball.y = ball.r;
          ball.vy *= -1;
          playTap(380);
        }

        if (
          ball.y + ball.r > paddle.y &&
          ball.y - ball.r < paddle.y + paddle.h &&
          ball.x > paddle.x &&
          ball.x < paddle.x + paddle.w &&
          ball.vy > 0
        ) {
          const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
          ball.vx = hit * 5.8;
          ball.vy = -Math.max(5.8, Math.abs(ball.vy));
          playTap(520);
          spawnBurst(ball.x, paddle.y, 5, '#ffffff');
        }

        if (state === 'playing') {
          for (const brick of bricks) {
            if (!brick.alive) continue;
            if (
              ball.x + ball.r > brick.x &&
              ball.x - ball.r < brick.x + brick.w &&
              ball.y + ball.r > brick.y &&
              ball.y - ball.r < brick.y + brick.h
            ) {
              brick.hp -= 1;
              ball.vy *= -1;
              score += brick.hp <= 0 ? 10 : 4;
              skill = Math.min(100, skill + 5);
              if (brick.hp <= 0) {
                brick.alive = false;
                spawnBurst(brick.x + brick.w / 2, brick.y + brick.h / 2, 10, '#ffffff');
                playTap(860);
              } else {
                playTap(640);
              }
              updateHud();
              break;
            }
          }

          if (bricks.length && bricks.every(b => !b.alive)) {
            nextStage();
          }
        }

        if (state === 'boss' && boss) {
          boss.phase = boss.hp <= 14 ? 3 : boss.hp <= 28 ? 2 : 1;
          boss.x += boss.vx * dt * 60;
          if (boss.x < 18 || boss.x + boss.w > W - 18) {
            boss.vx *= -1;
          }
          boss.hitFlash *= 0.86;
          boss.shotTimer += dt;

          const interval = boss.phase === 1 ? 1.15 : boss.phase === 2 ? 0.85 : 0.62;
          if (boss.shotTimer >= interval) {
            addBossBullets();
            boss.shotTimer = 0;
          }

          if (
            ball.x + ball.r > boss.x &&
            ball.x - ball.r < boss.x + boss.w &&
            ball.y + ball.r > boss.y &&
            ball.y - ball.r < boss.y + boss.h
          ) {
            ball.vy *= -1;
            boss.hp -= 1;
            skill = Math.min(100, skill + 7);
            boss.hitFlash = 1;
            score += 12;
            playMeow();
            spawnBurst(ball.x, ball.y, 10, '#ffe18a');

            if (boss.hp <= 0) {
              score += 300;
              state = 'clear';
              stopBGM();
              saveBest();
              renderOverlay();
            }
            updateHud();
          }

          for (let i = bossBullets.length - 1; i >= 0; i--) {
            const b = bossBullets[i];
            b.x += b.vx * dt * 60;
            b.y += b.vy * dt * 60;

            if (b.x < -20 || b.x > W + 20 || b.y > H + 20) {
              bossBullets.splice(i, 1);
              continue;
            }

            const hitPaddle =
              b.x + b.r > paddle.x &&
              b.x - b.r < paddle.x + paddle.w &&
              b.y + b.r > paddle.y &&
              b.y - b.r < paddle.y + paddle.h;

            if (hitPaddle) {
              bossBullets.splice(i, 1);
              spawnBurst(b.x, b.y, 12, '#ff9da5');
              loseLife();
              break;
            }
          }
        }

        if (ball.y > H + 40) {
          loseLife();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt * 60;
          p.y += p.vy * dt * 60;
          p.vy += 0.03 * dt * 60;
          p.life -= 0.03 * dt * 60;
          if (p.life <= 0) particles.splice(i, 1);
        }

        if (specialFx.active) {
          specialFx.catDashX += 18 * dt * 60;
          if (performance.now() > specialFx.until) {
            specialFx.active = false;
          }
        }

        if (shake > 0.1) shake *= 0.88;
        else shake = 0;

        if (damageFlash > 0.02) damageFlash *= 0.88;
        else damageFlash = 0;
      }

      function roundRectPath(x, y, w, h, r){
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function roundRect(x, y, w, h, r, fill, stroke){
        roundRectPath(x, y, w, h, r);
        if (fill) {
          ctx.fillStyle = fill;
          ctx.fill();
        }
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.stroke();
        }
      }

      function drawImageCover(img, x, y, w, h){
        const ir = img.width / img.height;
        const br = w / h;
        let dw, dh, dx, dy;
        if (ir > br) {
          dh = h;
          dw = h * ir;
          dx = x - (dw - w) / 2;
          dy = y;
        } else {
          dw = w;
          dh = w / ir;
          dx = x;
          dy = y - (dh - h) / 2;
        }
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      function drawBoardBackground(){
        ctx.save();
        if (shake > 0) {
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
        }

        ctx.fillStyle = '#f6e8ed';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(255,255,255,.62)';
        ctx.fillRect(0, 0, W, H);

        const frameX = 12;
        const frameY = 10;
        const frameW = W - 24;
        const frameH = H - 120;

        roundRect(frameX, frameY, frameW, frameH, 18, 'rgba(255,255,255,.22)', 'rgba(244,171,200,.95)');

        if (catReady) {
          ctx.save();
          ctx.globalAlpha = 0.28;
          roundRectPath(frameX + 2, frameY + 2, frameW - 4, frameH - 4, 16);
          ctx.clip();
          drawImageCover(catImg, frameX + 2, frameY + 2, frameW - 4, frameH - 4);
          ctx.restore();
        }

        const badgeSize = 56;
        const badgeX = W - 20 - badgeSize;
        const badgeY = H - 110;

        if (catReady) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(badgeX + badgeSize/2, badgeY + badgeSize/2, badgeSize/2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(catImg, badgeX, badgeY, badgeSize, badgeSize);
          ctx.restore();

          ctx.lineWidth = 3;
          ctx.strokeStyle = 'rgba(255,255,255,.95)';
          ctx.beginPath();
          ctx.arc(badgeX + badgeSize/2, badgeY + badgeSize/2, badgeSize/2, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.font = '42px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🐱', badgeX + badgeSize/2, badgeY + badgeSize/2);
        }

        if (damageFlash > 0) {
          ctx.fillStyle = `rgba(255,80,90,${0.22 * damageFlash})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();
      }

      function drawBricks(){
        for (const b of bricks) {
          if (!b.alive) continue;
          const grad = ctx.createLinearGradient(0, b.y, 0, b.y + b.h);
          grad.addColorStop(0, '#fb89b4');
          grad.addColorStop(1, '#f16c9f');
          roundRect(b.x, b.y, b.w, b.h, 8, grad, 'rgba(255,255,255,.3)');

          ctx.fillStyle = '#fff';
          ctx.font = 'bold 13px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 + 1);
        }
      }

      function drawBoss(){
        if (!boss) return;
        const g = ctx.createLinearGradient(0, boss.y, 0, boss.y + boss.h);
        g.addColorStop(0, boss.hitFlash > 0.2 ? '#fff3a8' : '#ff9cc7');
        g.addColorStop(1, boss.hitFlash > 0.2 ? '#ffd54c' : '#ff6ea6');
        roundRect(boss.x, boss.y, boss.w, boss.h, 20, g, 'rgba(255,255,255,.55)');

        ctx.font = '54px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('😾', boss.x + boss.w/2, boss.y + boss.h/2 + 2);

        const bw = W - 60;
        const ratio = Math.max(0, boss.hp / boss.maxHp);
        roundRect(30, 22, bw, 12, 8, 'rgba(255,255,255,.45)', null);
        roundRect(30, 22, bw * ratio, 12, 8, '#ff7a93', null);

        ctx.fillStyle = '#7f0f57';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText('BOSS', W / 2, 19);
      }

      function drawBossBullets(){
        for (const b of bossBullets) {
          ctx.fillStyle = '#ff7a93';
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = '11px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('! ', b.x, b.y + 0.5);
        }
      }

      function drawPaddle(){
        const grad = ctx.createLinearGradient(0, paddle.y, 0, paddle.y + paddle.h);
        grad.addColorStop(0, '#c976da');
        grad.addColorStop(1, '#a955c7');
        roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6, grad, null);
      }

      function drawBall(){
        ctx.fillStyle = selectedChar.color;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#111';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(selectedChar.ballText, ball.x, ball.y + 0.5);
      }

      function drawParticles(){
        for (const p of particles) {
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fillStyle = p.color || '#fff';
          ctx.fillRect(p.x, p.y, 3, 3);
        }
        ctx.globalAlpha = 1;
      }

      function drawToast(){
        if (performance.now() > toast.until || !toast.text) return;
        ctx.save();
        ctx.font = '900 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffd400';
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = 6;
        ctx.strokeText(toast.text, W / 2, H * 0.58);
        ctx.fillText(toast.text, W / 2, H * 0.58);
        ctx.restore();
      }

      function drawSpecialFx(){
        if (!specialFx.active) return;

        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#ffef29';
        ctx.font = '900 34px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(specialFx.text, W / 2, H * 0.34);

        if (catReady) {
          const s = 84;
          const y = H * 0.48;
          ctx.save();
          ctx.beginPath();
          ctx.arc(specialFx.catDashX + s / 2, y, s / 2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(catImg, specialFx.catDashX, y - s / 2, s, s);
          ctx.restore();
        } else {
          ctx.font = '72px sans-serif';
          ctx.fillText('🐱', specialFx.catDashX + 40, H * 0.48);
        }
        ctx.restore();
      }

      function draw(){
        drawBoardBackground();

        ctx.save();
        if (shake > 0) {
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
        }

        if (state === 'playing') drawBricks();
        if (state === 'boss') {
          drawBoss();
          drawBossBullets();
        }
        drawBall();
        drawPaddle();
        drawParticles();
        drawToast();
        ctx.restore();

        drawSpecialFx();
      }

      function tick(ts){
        if (!lastTs) lastTs = ts;
        const dt = Math.min(0.033, (ts - lastTs) / 1000);
        lastTs = ts;
        update(dt);
        draw();
        requestAnimationFrame(tick);
      }

      function pressLeft(on){ holdLeft = on; }
      function pressRight(on){ holdRight = on; }

      function bindHold(btn, onDown, onUp){
        const up = () => onUp(false);
        btn.addEventListener('pointerdown', e => { e.preventDefault(); onDown(true); });
        btn.addEventListener('pointerup', up);
        btn.addEventListener('pointercancel', up);
        btn.addEventListener('pointerleave', up);
      }

      bindHold(leftBtn, pressLeft, pressLeft);
      bindHold(rightBtn, pressRight, pressRight);

      mainBtn.addEventListener('click', () => {
        if (state === 'title') {
          state = 'select';
          renderOverlay();
          updateHud();
          return;
        }
        if (state === 'select') return;

        if (state === 'playing' || state === 'boss') {
          if (skill >= 100) {
            unlockAudio();
            useSkill();
          } else {
            pausedFrom = state;
            state = 'paused';
            stopBGM();
            renderOverlay();
            updateHud();
          }
          return;
        }

        if (state === 'paused') {
          unlockAudio();
          state = pausedFrom;
          startBGM(state === 'boss');
          renderOverlay();
          updateHud();
          return;
        }

        if (state === 'gameover' || state === 'clear') {
          state = 'select';
          renderOverlay();
          updateHud();
        }
      });

      canvas.addEventListener('pointerdown', e => {
        const rect = canvas.getBoundingClientRect();
        touchX = e.clientX - rect.left;
        dragActive = true;
      });
      canvas.addEventListener('pointermove', e => {
        if (!dragActive) return;
        const rect = canvas.getBoundingClientRect();
        touchX = e.clientX - rect.left;
      });
      const endDrag = () => { dragActive = false; };
      canvas.addEventListener('pointerup', endDrag);
      canvas.addEventListener('pointercancel', endDrag);
      canvas.addEventListener('pointerleave', endDrag);

      window.addEventListener('resize', resize);

      let audioCtx = null;
      let bgmTimer = null;

      function unlockAudio(){
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      function midiToFreq(m){
        return 440 * Math.pow(2, (m - 69) / 12);
      }

      const normalProgression = [
        [62, 66, 69],
        [57, 61, 64],
        [59, 62, 66],
        [54, 57, 61],
        [55, 59, 62],
        [62, 66, 69],
        [55, 59, 62],
        [57, 61, 64]
      ];

      const bossProgression = [
        [50, 57, 62],
        [52, 59, 64],
        [47, 54, 59],
        [45, 52, 57]
      ];

      function playTone(time, freq, dur, type='triangle', vol=0.03){
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + dur + 0.04);
      }

      function playTap(freq = 500){
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        playTone(t, freq, 0.08, 'square', 0.02);
      }

      function playDamage(){
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        playTone(now, 180, 0.18, 'sawtooth', 0.03);
        playTone(now + 0.06, 130, 0.22, 'sawtooth', 0.03);
      }

      function playMeow(){
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.exponentialRampToValueAtTime(420, now + 0.18);
        osc.frequency.exponentialRampToValueAtTime(520, now + 0.32);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(0.035, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.35);
      }

      function scheduleBar(startTime, chordIndex, isBoss){
        const progression = isBoss ? bossProgression : normalProgression;
        const chord = progression[chordIndex % progression.length];
        const bpm = isBoss ? 132 : 104;
        const beat = 60 / bpm;

        chord.forEach(n => {
          playTone(startTime, midiToFreq(n), beat * 3.5, isBoss ? 'sawtooth' : 'triangle', isBoss ? 0.016 : 0.018);
        });

        playTone(startTime, midiToFreq(chord[0] - 24), beat * 1.7, 'sine', isBoss ? 0.038 : 0.03);
        playTone(startTime + beat * 2, midiToFreq(chord[0] - 24), beat * 1.5, 'sine', isBoss ? 0.034 : 0.026);

        const melody = [chord[2] + 12, chord[1] + 12, chord[0] + 12, chord[1] + 12];
        for (let i = 0; i < 4; i++) {
          playTone(startTime + beat * i, midiToFreq(melody[i]), beat * 0.65, 'square', isBoss ? 0.013 : 0.010);
        }
      }

      function stopBGM(){
        if (bgmTimer) {
          clearInterval(bgmTimer);
          bgmTimer = null;
        }
      }

      function startBGM(isBoss){
        if (!audioCtx) return;
        stopBGM();

        const bpm = isBoss ? 132 : 104;
        let next = audioCtx.currentTime + 0.05;
        let i = 0;

        for (let k = 0; k < 4; k++) {
          scheduleBar(next, i++, isBoss);
          next += (60 / bpm) * 4;
        }

        bgmTimer = setInterval(() => {
          if (!audioCtx || audioCtx.state !== 'running') return;
          for (let k = 0; k < 2; k++) {
            scheduleBar(next, i++, isBoss);
            next += (60 / bpm) * 4;
          }
        }, isBoss ? 3600 : 4600);
      }

      resize();
      updateHud();
      renderOverlay();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
