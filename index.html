<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ヒデちゃん大冒険 ULTIMATE PLUS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
:root{--pk:#ff6eb4;--pk2:#ffd6ec;--pu:#c084fc;--yw:#ffd93d;--mn:#6ee7b7;--bg:#fff0f8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);font-family:'M PLUS Rounded 1c',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  height:100dvh;overflow:hidden;touch-action:none;
}
.screen{display:none;flex-direction:column;align-items:center;width:100%;}
.screen.active{display:flex;}

/* TITLE & UI */
#screen-title{justify-content:center;gap:14px;padding:16px;}
.title-logo{font-family:'Kaisei Decol',serif;font-size:26px;color:var(--pk);text-shadow:3px 3px 0 #ffd6ec;text-align:center;}
.menu-btn{
background:linear-gradient(180deg,#ff8dc7,var(--pk));color:white;border:none;
padding:14px 30px;font-size:16px;border-radius:50px;width:260px;
box-shadow:0 5px 0 #c2185b;font-weight:800;cursor:pointer;margin-top:10px;}
.menu-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #c2185b;}

/* CHARA SELECT */
.chara-grid{display:grid;grid-template-columns:repeat(2,140px);gap:10px;margin:15px 0;}
.chara-card{background:white;border:3px solid var(--pk2);border-radius:14px;padding:10px;text-align:center;cursor:pointer;}
.chara-card.selected{border-color:var(--pk);transform:scale(1.05);background:#fff9fc;}

/* GAME CANVAS */
#canvas-wrap{position:relative;width:320px;height:400px;border:4px solid var(--pk2);border-radius:15px;overflow:hidden;background:white;}
#gameCanvas,#fxCanvas{position:absolute;top:0;left:0;}
#fxCanvas{pointer-events:none;z-index:5;}

/* HUD */
#top-hud{display:flex;justify-content:space-between;width:320px;padding:5px;font-weight:800;color:var(--pk);}
#skill-bar-wrap{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:150px;height:12px;background:rgba(0,0,0,0.2);border-radius:10px;z-index:10;}
#skill-bar-fill{width:0%;height:100%;background:linear-gradient(90deg, #34d399, #6ee7b7);border-radius:10px;transition:width 0.2s;}
#skill-ready{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);color:var(--pk);font-size:10px;font-weight:800;animation:blink 0.5s infinite;display:none;z-index:10;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* CONTROLS */
.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:320px;margin-top:10px;}
.gbtn{background:#ff8dc7;color:white;border:none;padding:15px;border-radius:10px;font-weight:800;box-shadow:0 4px 0 #c2185b;}
.gbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #c2185b;}
#btn-special{grid-column: span 3; background:linear-gradient(to bottom, #fbbf24, #f59e0b); box-shadow:0 4px 0 #92400e; display:none;}
#btn-special.ready{animation:pulse 0.8s infinite;}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}

#overlay-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center;pointer-events:none;display:none;}
.ot-main{font-size:32px;color:var(--yw);text-shadow:2px 2px 0 #f59e0b, -2px -2px 0 var(--pk);font-weight:900;}
</style>
</head>
<body>

<div class="screen active" id="screen-title">
  <div class="title-logo">🐱 ヒデちゃん大冒険<br><small>ULTIMATE PLUS</small></div>
  <button class="menu-btn" onclick="showScreen('screen-chara')">スタート！</button>
</div>

<div class="screen" id="screen-chara">
  <div style="color:var(--pk);font-weight:800;">キャラを選んでね</div>
  <div class="chara-grid" id="chara-grid"></div>
  <button class="menu-btn" onclick="startGame()">冒険に出る！ ✨</button>
</div>

<div class="screen" id="screen-game">
  <div id="top-hud">
    <div id="lives-disp">❤️ 3</div>
    <div id="mode-disp">BREAKOUT</div>
    <div id="score-disp">⭐ 0</div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gameCanvas" width="320" height="400"></canvas>
    <canvas id="fxCanvas" width="320" height="400"></canvas>
    <div id="skill-ready">READY!</div>
    <div id="skill-bar-wrap"><div id="skill-bar-fill"></div></div>
    <div id="overlay-text"><div class="ot-main" id="ot-main"></div></div>
  </div>
  <div class="controls">
    <button class="gbtn" id="ctrl-left">◀</button>
    <button class="gbtn" id="ctrl-rotate">🔄</button>
    <button class="gbtn" id="ctrl-right">▶</button>
    <button class="gbtn" id="ctrl-down" style="grid-column: span 3;">▼</button>
    <button class="gbtn" id="btn-special">✨ SPECIAL SKILL ✨</button>
  </div>
</div>

<script>
// --- CONFIG & STATE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const fxCtx = document.getElementById('fxCanvas').getContext('2d');
const CW=320, CH=400;

let selectedChar = null;
let gameMode = 'breakout'; // 'breakout' | 'tetris' | 'transition'
let isPlaying = false;
let score = 0, lives = 3, skillGauge = 0, timeScale = 1.0;
let frameCount = 0, shake = 0;

// Characters
const CHARS = [
  {id:'hide', name:'ヒデ', face:'😄', color:'#ffd93d', skillName:'バーストビーム'},
  {id:'neko', name:'ネコ', face:'🐱', color:'#fb7185', skillName:'分身の術'},
  {id:'kuma', name:'クマ', face:'🐻', color:'#a78bfa', skillName:'ギガスマッシュ'},
  {id:'usa', name:'ウサ', face:'🐰', color:'#34d399', skillName:'ラッキーガード'}
];

// Objects
let paddle = { x: 120, w: 80, h: 15 };
let balls = [];
let bricks = [];
let boss = { active: false, x: 110, y: -100, w: 100, h: 60, hp: 20, maxHp: 20 };
let tetris = { board: [], current: null, next: null, timer: 0, speed: 30 };

// --- INIT ---
function initCharaSelect() {
  const grid = document.getElementById('chara-grid');
  CHARS.forEach(c => {
    const card = document.createElement('div');
    card.className = 'chara-card';
    if(c.id === 'hide') card.classList.add('selected'), selectedChar = c;
    card.innerHTML = `<div style="font-size:30px">${c.face}</div><div style="font-size:12px;font-weight:800">${c.name}</div>`;
    card.onclick = () => {
      document.querySelectorAll('.chara-card').forEach(el=>el.classList.remove('selected'));
      card.classList.add('selected');
      selectedChar = c;
    };
    grid.appendChild(card);
  });
}

function startGame() {
  showScreen('screen-game');
  resetBreakout();
  isPlaying = true;
  requestAnimationFrame(gameLoop);
}

function resetBreakout() {
  gameMode = 'breakout';
  score = 0; lives = 3; skillGauge = 0;
  balls = [{ x:160, y:300, dx:3, dy:-3, r:selectedChar.id==='kuma'?12:8 }];
  bricks = [];
  for(let r=0; r<4; r++) {
    for(let c=0; c<6; c++) {
      bricks.push({ x: c*50+10, y: r*25+50, w: 45, h: 20, status: 1 });
    }
  }
}

// --- CORE LOOP ---
function gameLoop() {
  if(!isPlaying) return;
  
  ctx.save();
  if(shake > 0) {
    ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
    shake *= 0.9;
  }
  
  update();
  draw();
  
  ctx.restore();
  requestAnimationFrame(gameLoop);
}

function update() {
  const ts = timeScale; // スローモーション用

  if(gameMode === 'breakout') {
    balls.forEach(ball => {
      ball.x += ball.dx * ts;
      ball.y += ball.dy * ts;

      // Walls
      if(ball.x<ball.r || ball.x>CW-ball.r) ball.dx *= -1;
      if(ball.y<ball.r) ball.dy *= -1;

      // Paddle
      if(ball.y+ball.r > CH-25 && ball.x > paddle.x && ball.x < paddle.x+paddle.w) {
        ball.dy = -Math.abs(ball.dy);
        ball.dx = (ball.x - (paddle.x + paddle.w/2)) * 0.15;
        skillGauge = Math.min(100, skillGauge + 2);
      }

      // Bricks
      bricks.forEach(b => {
        if(b.status > 0 && ball.x+ball.r>b.x && ball.x-ball.r<b.x+b.w && ball.y+ball.r>b.y && ball.y-ball.r<b.y+b.h) {
          b.status = 0; ball.dy *= -1; score += 10;
          skillGauge = Math.min(100, skillGauge + 5);
          if(bricks.every(br => br.status === 0) && !boss.active) spawnBoss();
        }
      });

      // Boss Hit
      if(boss.active && ball.x+ball.r>boss.x && ball.x-ball.r<boss.x+boss.w && ball.y+ball.r>boss.y && ball.y-ball.r<boss.y+boss.h) {
        boss.hp -= (selectedChar.id === 'kuma' ? 2 : 1);
        ball.dy *= -1;
        shake = 10;
        if(boss.hp <= 0) victory();
      }

      // Out
      if(ball.y > CH) {
        lives--;
        if(lives <= 0) gameOver();
        else ball.y = 300, ball.dy = -3;
      }
    });

    // Boss movement
    if(boss.active) {
      if(boss.y < 30) boss.y += 2 * ts;
      boss.x += Math.sin(frameCount * 0.05) * 2 * ts;
    }
  } else if (gameMode === 'tetris') {
    tetris.timer += ts;
    if(tetris.timer > tetris.speed) {
      moveTetris(0, 1);
      tetris.timer = 0;
    }
  }
  
  frameCount++;
  updateUI();
}

// --- DRAWING ---
function draw() {
  ctx.clearRect(0,0,CW,CH);
  fxCtx.clearRect(0,0,CW,CH);

  if(gameMode === 'breakout') {
    // Paddle
    ctx.fillStyle = selectedChar.color;
    ctx.beginPath(); ctx.roundRect(paddle.x, CH-25, paddle.w, paddle.h, 10); ctx.fill();
    ctx.fillStyle = "white"; ctx.fillText(selectedChar.face, paddle.x+30, CH-13);

    // Bricks
    bricks.forEach(b => {
      if(b.status > 0) {
        ctx.fillStyle = "#ff80ab";
        ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 4); ctx.fill();
      }
    });

    // Boss
    if(boss.active) {
      ctx.fillStyle = "#333";
      ctx.beginPath(); ctx.roundRect(boss.x, boss.y, boss.w, boss.h, 10); ctx.fill();
      ctx.fillStyle = "red"; ctx.fillRect(boss.x, boss.y-10, (boss.hp/boss.maxHp)*boss.w, 5);
      ctx.font = "30px Arial"; ctx.fillText("👾", boss.x+35, boss.y+40);
    }

    // Balls
    balls.forEach(ball => {
      ctx.fillStyle = selectedChar.color;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    });
  } else if (gameMode === 'tetris') {
    drawTetris();
  }
}

// --- SPECIAL SYSTEMS ---
function spawnBoss() {
  boss.active = true;
  showOverlay("BOSS APPEARED!");
}

function victory() {
  boss.active = false;
  timeScale = 0.1; // 超スローモーション開始！
  shake = 20;
  showOverlay("FINISH!!!", 2000);
  
  setTimeout(() => {
    timeScale = 1.0;
    startTetrisMode();
  }, 2000);
}

function showOverlay(txt, dur=1500) {
  const el = document.getElementById('overlay-text');
  document.getElementById('ot-main').innerText = txt;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', dur);
}

function updateUI() {
  document.getElementById('score-disp').innerText = "⭐ " + score;
  document.getElementById('lives-disp').innerText = "❤️ " + lives;
  document.getElementById('skill-bar-fill').style.width = skillGauge + "%";
  
  const btn = document.getElementById('btn-special');
  const ready = document.getElementById('skill-ready');
  if(skillGauge >= 100) {
    btn.style.display = 'block';
    btn.classList.add('ready');
    ready.style.display = 'block';
  } else {
    btn.classList.remove('ready');
    ready.style.display = 'none';
  }
}

// --- TETRIS LOGIC ---
function startTetrisMode() {
  gameMode = 'tetris';
  document.getElementById('mode-disp').innerText = "TETRIS MODE";
  tetris.board = Array.from({length: 20}, () => Array(10).fill(0));
  spawnTetromino();
}

function spawnTetromino() {
  const types = ['I','J','L','O','S','T','Z'];
  const type = types[Math.floor(Math.random()*types.length)];
  tetris.current = { x: 3, y: 0, type, shape: getShape(type) };
  if(checkCollision(0,0)) gameOver();
}

function getShape(t) {
  const s = {
    'I':[[1,1,1,1]], 'O':[[1,1],[1,1]], 'T':[[0,1,0],[1,1,1]], 
    'L':[[0,0,1],[1,1,1]], 'J':[[1,0,0],[1,1,1]], 'S':[[0,1,1],[1,1,0]], 'Z':[[1,1,0],[0,1,1]]
  };
  return s[t];
}

function moveTetris(dx, dy) {
  tetris.current.x += dx;
  tetris.current.y += dy;
  if(checkCollision(0,0)) {
    tetris.current.x -= dx;
    tetris.current.y -= dy;
    if(dy > 0) lockTetromino();
    return false;
  }
  return true;
}

function checkCollision(ox, oy) {
  return tetris.current.shape.some((row, y) => row.some((val, x) => {
    if(!val) return false;
    let nx = tetris.current.x + x + ox;
    let ny = tetris.current.y + y + oy;
    return nx<0 || nx>=10 || ny>=20 || (ny>=0 && tetris.board[ny][nx]);
  }));
}

function lockTetromino() {
  tetris.current.shape.forEach((row, y) => row.forEach((val, x) => {
    if(val) tetris.board[tetris.current.y + y][tetris.current.x + x] = selectedChar.color;
  }));
  clearLines();
  spawnTetromino();
}

function clearLines() {
  let cleared = 0;
  for(let y=19; y>=0; y--) {
    if(tetris.board[y].every(v => v !== 0)) {
      tetris.board.splice(y, 1);
      tetris.board.unshift(Array(10).fill(0));
      cleared++; y++;
    }
  }
  if(cleared > 0) {
    score += cleared * 100;
    skillGauge = Math.min(100, skillGauge + cleared * 20);
  }
}

function drawTetris() {
  const sz = 20;
  ctx.save(); ctx.translate(60, 0);
  // Board
  tetris.board.forEach((row, y) => row.forEach((val, x) => {
    ctx.strokeStyle = "#eee"; ctx.strokeRect(x*sz, y*sz, sz, sz);
    if(val) { ctx.fillStyle = val; ctx.fillRect(x*sz, y*sz, sz, sz); }
  }));
  // Current
  if(tetris.current) {
    ctx.fillStyle = selectedChar.color;
    tetris.current.shape.forEach((row, y) => row.forEach((val, x) => {
      if(val) ctx.fillRect((tetris.current.x+x)*sz, (tetris.current.y+y)*sz, sz, sz);
    }));
  }
  ctx.restore();
}

// --- SPECIAL SKILLS ---
document.getElementById('btn-special').onclick = () => {
  if(skillGauge < 100) return;
  skillGauge = 0;
  showOverlay("✨ " + selectedChar.skillName + "！");
  shake = 30;

  if(gameMode === 'breakout') {
    if(selectedChar.id === 'hide') { // Beam
      bricks.forEach(b => { if(Math.abs(b.x+b.w/2 - (paddle.x+paddle.w/2)) < 40) b.status = 0; });
      if(boss.active) boss.hp -= 5;
    } else if(selectedChar.id === 'neko') { // Multi
      balls.push({ ...balls[0], dx:-balls[0].dx });
    } else if(selectedChar.id === 'kuma') { // Giant
      balls.forEach(b => b.r = 30); setTimeout(()=>balls.forEach(b=>b.r=8), 5000);
    } else if(selectedChar.id === 'usa') { // Floor
      let floor = {active: true}; // Dummy logic
    }
  } else {
    // Tetris Special
    if(selectedChar.id === 'hide') { // Clear middle cols
      for(let y=0; y<20; y++) { tetris.board[y][4]=0; tetris.board[y][5]=0; }
    } else if(selectedChar.id === 'neko') { // Clear bottom 2
      tetris.board.splice(18, 2);
      tetris.board.unshift(Array(10).fill(0), Array(10).fill(0));
    } else if(selectedChar.id === 'kuma') { // Clear bottom 3
      tetris.board.splice(17, 3);
      tetris.board.unshift(Array(10).fill(0), Array(10).fill(0), Array(10).fill(0));
    } else if(selectedChar.id === 'usa') { // Clear top 5
      for(let y=0; y<5; y++) tetris.board[y] = Array(10).fill(0);
    }
  }
};

// --- CONTROLS ---
document.getElementById('ctrl-left').onclick = () => {
  if(gameMode==='breakout') paddle.x = Math.max(0, paddle.x-30);
  else moveTetris(-1, 0);
};
document.getElementById('ctrl-right').onclick = () => {
  if(gameMode==='breakout') paddle.x = Math.min(CW-paddle.w, paddle.x+30);
  else moveTetris(1, 0);
};
document.getElementById('ctrl-rotate').onclick = () => {
  if(gameMode==='tetris') {
    const r = tetris.current.shape[0].map((_, i) => tetris.current.shape.map(row => row[i]).reverse());
    const prev = tetris.current.shape; tetris.current.shape = r;
    if(checkCollision(0,0)) tetris.current.shape = prev;
  }
};
document.getElementById('ctrl-down').onclick = () => {
  if(gameMode==='tetris') moveTetris(0, 1);
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-chara') initCharaSelect();
}

function gameOver() {
  isPlaying = false;
  showOverlay("GAME OVER...");
  setTimeout(() => location.reload(), 2000);
}

</script>
</body>
</html>
