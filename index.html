<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヒデちゃん&クマちゃん ブロック崩し DX</title>
<style>
  :root{
    --bg1:#ffd9ea;
    --bg2:#f6bfd8;
    --bg3:#ee9fc5;
    --ink:#6f2858;
    --pink:#ff63ad;
    --yellow:#ffd84d;
    --shadow:0 10px 24px rgba(0,0,0,.18);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    font-family:
      "Hiragino Maru Gothic ProN",
      "Hiragino Sans",
      "Yu Gothic",
      system-ui,
      sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  }

  #app{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    touch-action:none;
  }

  canvas{
    display:block;
    width:100%;
    height:100%;
  }

  #hud{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    z-index:20;
    pointer-events:none;
  }

  .col{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .panel{
    min-width:96px;
    padding:9px 12px;
    border-radius:18px;
    background:rgba(255,255,255,.58);
    border:1px solid rgba(255,255,255,.92);
    box-shadow:var(--shadow);
    backdrop-filter:blur(6px);
  }

  .label{
    font-size:11px;
    font-weight:700;
    color:#9e5a83;
    margin-bottom:4px;
  }

  .value{
    font-size:17px;
    font-weight:900;
    color:var(--ink);
    white-space:nowrap;
  }

  #catBadge{
    position:absolute;
    top:8px;
    left:50%;
    transform:translateX(-50%);
    width:80px;
    height:80px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:0 10px 24px rgba(255,90,165,.22);
    z-index:26;
    transition:transform .18s ease, box-shadow .18s ease;
  }

  #catBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  #catBadgeFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
  }

  #catTalk{
    position:absolute;
    top:92px;
    left:50%;
    transform:translateX(-50%);
    z-index:27;
    font-size:12px;
    font-weight:900;
    color:#fff6a8;
    text-shadow:0 2px 8px rgba(0,0,0,.28);
    white-space:nowrap;
    pointer-events:none;
  }

  #message{
    position:absolute;
    top:38%;
    left:50%;
    transform:translateX(-50%);
    z-index:25;
    font-size:clamp(28px, 9vw, 54px);
    font-weight:900;
    color:var(--yellow);
    text-shadow:0 0 14px rgba(0,0,0,.22);
    pointer-events:none;
    opacity:0;
    transition:opacity .18s ease, transform .18s ease;
    white-space:nowrap;
  }

  #catSkillBadge{
    position:absolute;
    left:14px;
    bottom:126px;
    width:62px;
    height:62px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:var(--shadow);
    z-index:21;
    opacity:0;
    transform:scale(.8);
    transition:opacity .18s ease, transform .18s ease;
    pointer-events:none;
  }

  #catSkillBadge.show{
    opacity:1;
    transform:scale(1);
  }

  #catSkillBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  #catSkillFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
  }

  #skillsArea{
    position:absolute;
    left:14px;
    right:14px;
    bottom:12px;
    z-index:24;
  }

  #skillButton{
    width:100%;
    border:none;
    border-radius:20px;
    padding:12px 14px;
    background:linear-gradient(180deg,rgba(255,255,255,.74),rgba(255,255,255,.5));
    border:1px solid rgba(255,255,255,.96);
    box-shadow:var(--shadow);
    color:var(--ink);
    font:inherit;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    min-height:62px;
  }

  #skillButton.disabled{
    opacity:.55;
    filter:grayscale(.75);
  }

  #skillLeft{
    display:flex;
    align-items:center;
    gap:10px;
  }

  #skillEmoji{
    font-size:26px;
    line-height:1;
  }

  #skillTextWrap{
    text-align:left;
  }

  #skillName{
    font-size:16px;
    font-weight:900;
    line-height:1.1;
  }

  #skillDesc{
    font-size:11px;
    color:#8f5377;
    margin-top:3px;
  }

  #skillReady{
    font-size:11px;
    font-weight:900;
    color:#b65586;
    white-space:nowrap;
  }

  #skillLabel{
    font-size:12px;
    color:#fff;
    margin:8px 0 6px;
    text-shadow:0 2px 6px rgba(0,0,0,.25);
  }

  #skillBar{
    height:16px;
    border-radius:999px;
    background:rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.65);
    overflow:hidden;
    box-shadow:var(--shadow);
  }

  #skillFill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#72e5ff,#9cff8b,#ffe56a);
    border-radius:999px;
    transition:width .1s linear;
    box-shadow:0 0 16px rgba(126,255,211,.6);
  }

  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:40;
    background:rgba(255,228,239,.34);
    backdrop-filter:blur(4px);
  }

  #overlay.hidden{
    display:none;
  }

  .card{
    width:min(94vw,460px);
    padding:22px 18px 20px;
    border-radius:28px;
    background:linear-gradient(180deg,rgba(255,255,255,.68),rgba(255,255,255,.40));
    border:1px solid rgba(255,255,255,.92);
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    text-align:center;
    color:var(--ink);
  }

  .bigCat{
    font-size:72px;
    line-height:1;
    margin-bottom:10px;
  }

  .titlePhoto{
    width:104px;
    height:104px;
    margin:0 auto 12px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(255,255,255,.95);
    box-shadow:0 10px 24px rgba(255,90,165,.22);
    background:rgba(255,255,255,.35);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:56px;
  }

  .titlePhoto img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .title{
    font-size:clamp(28px, 7vw, 42px);
    font-weight:900;
    line-height:1.14;
    color:#ff5aa5;
    margin-bottom:10px;
    text-shadow:0 0 14px rgba(255,90,165,.2);
  }

  .sub{
    font-size:14px;
    line-height:1.6;
    color:#8f5377;
    margin-bottom:16px;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:16px 28px;
    font-size:22px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(180deg,#ff60ae,#ff2c92);
    box-shadow:0 8px 0 #b81f69, 0 10px 16px rgba(0,0,0,.16);
  }

  .btn:active{
    transform:translateY(4px);
    box-shadow:0 4px 0 #b81f69, 0 8px 12px rgba(0,0,0,.14);
  }

  .charGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:16px 0 12px;
  }

  .charBtn{
    border:none;
    border-radius:20px;
    padding:14px 10px;
    background:rgba(255,255,255,.52);
    border:2px solid rgba(255,255,255,.78);
    color:var(--ink);
    box-shadow:var(--shadow);
    font:inherit;
  }

  .charBtn.selected{
    border-color:#ff63ad;
    box-shadow:0 0 0 3px rgba(255,99,173,.18), var(--shadow);
    transform:scale(1.02);
  }

  .charBtn .emoji{
    font-size:40px;
    line-height:1.1;
  }

  .charBtn .name{
    font-size:17px;
    font-weight:900;
    margin-top:4px;
  }

  .charBtn .skill{
    font-size:11px;
    line-height:1.45;
    color:#8f5377;
    margin-top:4px;
  }

  .rankBadge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:52px;
    height:52px;
    border-radius:999px;
    background:linear-gradient(180deg,#fff8c8,#ffd84d);
    color:#7a315d;
    font-size:28px;
    font-weight:900;
    box-shadow:0 10px 18px rgba(0,0,0,.14);
    margin:8px auto 12px;
  }

  .achWrap{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin:12px 0 14px;
  }

  .achChip{
    padding:8px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    color:#7a315d;
    background:rgba(255,255,255,.7);
    border:1px solid rgba(255,255,255,.95);
    box-shadow:0 6px 14px rgba(0,0,0,.08);
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="col">
      <div class="panel">
        <div class="label">SCORE</div>
        <div class="value" id="scoreText">0</div>
      </div>
      <div class="panel">
        <div class="label">LIFE</div>
        <div class="value" id="lifeText">3</div>
      </div>
    </div>

    <div class="col">
      <div class="panel">
        <div class="label">STAGE</div>
        <div class="value" id="stageText">1 / 10</div>
      </div>
      <div class="panel">
        <div class="label">BEST</div>
        <div class="value" id="bestText">0</div>
      </div>
    </div>
  </div>

  <div id="catBadge">
    <img id="catBadgeImg" alt="cat">
    <div id="catBadgeFallback">🐱</div>
  </div>

  <div id="catSkillBadge">
    <img id="catSkillImg" alt="cat">
    <div id="catSkillFallback">🐱</div>
  </div>

  <div id="catTalk">にゃっ</div>
  <div id="message"></div>

  <div id="skillsArea">
    <button id="skillButton" class="disabled">
      <div id="skillLeft">
        <div id="skillEmoji">❔</div>
        <div id="skillTextWrap">
          <div id="skillName">チャージ中</div>
          <div id="skillDesc">ゲージをためてね</div>
        </div>
      </div>
      <div id="skillReady">RANDOM</div>
    </button>
    <div id="skillLabel">左右ドラッグで移動 / タップで再発射 / SKILLで必殺技</div>
    <div id="skillBar"><div id="skillFill"></div></div>
  </div>

  <div id="overlay"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreText = document.getElementById("scoreText");
  const lifeText = document.getElementById("lifeText");
  const stageText = document.getElementById("stageText");
  const bestText = document.getElementById("bestText");
  const skillFill = document.getElementById("skillFill");
  const message = document.getElementById("message");
  const catTalk = document.getElementById("catTalk");
  const overlay = document.getElementById("overlay");
  const app = document.getElementById("app");
  const hud = document.getElementById("hud");
  const skillsArea = document.getElementById("skillsArea");
  const catBadge = document.getElementById("catBadge");
  const catBadgeImg = document.getElementById("catBadgeImg");
  const catSkillImg = document.getElementById("catSkillImg");
  const catBadgeFallback = document.getElementById("catBadgeFallback");
  const catSkillFallback = document.getElementById("catSkillFallback");
  const catSkillBadge = document.getElementById("catSkillBadge");
  const skillButton = document.getElementById("skillButton");
  const skillEmojiEl = document.getElementById("skillEmoji");
  const skillNameEl = document.getElementById("skillName");
  const skillDescEl = document.getElementById("skillDesc");

  const MAX_STAGE = 10;
  const WORDS = [
    "夢","仕事","健康","旅行","ダイエット","ポテチ","睡眠","散歩",
    "筋トレ","ラーメン","貯金","ごほうび","野菜","チョコ","読書","有休",
    "温泉","締切","休日","猫","会議","サボり","水","お菓子"
  ];
  const COLORS = ["#ffd7a8","#bfe7ff","#c8ffd8","#e8c8ff","#ffd4e5","#fff0b8"];

  const CHARACTERS = [
    { id:"hide", emoji:"😄", name:"ヒデ", perk:"金色 / 幅広 + スコア10%UP" },
    { id:"cat", emoji:"🐱", name:"ネコ", perk:"ピンク / ゲージ速い + アイテム出やすい" },
    { id:"bear", emoji:"🐻", name:"クマ", perk:"青 / ビッグ長い + 安定" },
    { id:"rabbit", emoji:"🐰", name:"ウサ", perk:"緑 / 球やさしめ + 連射速い" }
  ];
  let selectedChar = CHARACTERS[1];

  const SKILLS = [
    { type:"cat", emoji:"🐱", name:"猫ラッシュ", desc:"猫が左から飛んできて3ボール化" },
    { type:"magnet", emoji:"🧲", name:"ぴたっ", desc:"1回だけ吸着、タップで再発射" },
    { type:"big", emoji:"🧸", name:"ビッグ", desc:"パドル巨大化" }
  ];

  const ITEM_TYPES = [
    { type:"gauge", emoji:"⚡", label:"ゲージ" },
    { type:"score", emoji:"💎", label:"スコア" },
    { type:"heal", emoji:"💖", label:"ライフ" },
    { type:"big", emoji:"⬌", label:"BIG" },
    { type:"rapid", emoji:"🔫", label:"連射" },
    { type:"clone", emoji:"🪞", label:"分身" }
  ];

  const BOSS_TYPES = {
    beam: {
      name:"ビームキャット",
      top:"#ffd4e8",
      bottom:"#ff4f93",
      aura:"rgba(255,100,170,.55)",
      beamGap:1.95,
      beamWidth:18,
      attackGap:2.25
    },
    zigzag: {
      name:"ジグザグキャット",
      top:"#d6e5ff",
      bottom:"#7265ff",
      aura:"rgba(130,120,255,.56)",
      beamGap:1.8,
      beamWidth:16,
      attackGap:1.95
    },
    warp: {
      name:"ワープキャット",
      top:"#d7fff0",
      bottom:"#37c6ad",
      aura:"rgba(100,255,220,.48)",
      beamGap:2.2,
      beamWidth:20,
      attackGap:2.35
    }
  };

  const CANON = [
    [62,66,69],[57,61,64],[59,62,66],[54,57,61],
    [55,59,62],[62,66,69],[55,59,62],[57,61,64]
  ];

  const CUTE_THEME = [
    [69,73,76],[67,71,74],[66,69,73],[64,67,71],
    [62,66,69],[64,67,71],[66,69,73],[67,71,74]
  ];

  const STORY_THEME = [
    [64,67,71],[62,66,69],[60,64,67],[62,65,69],
    [64,67,71],[67,71,74],[69,73,76],[71,74,78]
  ];

  const BOSS_THEME = [
    [38,45,50],[36,43,48],[35,42,47],[33,40,45],
    [31,38,43],[30,37,42],[29,36,41],[28,35,40]
  ];

  const CAT_CANDIDATES = [
    "./cat.png.JPG",
    "./cat.png.jpg",
    "./cat.JPG",
    "./cat.jpg",
    "./cat.jpeg",
    "./cat.png"
  ];

  let currentSkill = null;
  let W = 0;
  let H = 0;
  const DPR = Math.min(2, window.devicePixelRatio || 1);
  let field = { x:16, y:150, w:300, h:400 };
  let view = { x:0, y:0, w:0, h:0 };

  let state = "opening";
  let stage = 1;
  let score = 0;
  let lives = 3;
  let skill = 0;
  let best = Number(localStorage.getItem("hidecat_fun_best_v14") || 0);
  let stageMode = "breakout";
  let stageVariant = 0;

  let pointerX = 0;
  let shake = 0;
  let damageFlash = 0;
  let worldFlash = 0;
  let lastTime = 0;
  let sayLockUntil = 0;
  let speechLockUntil = 0;

  let openingTime = 0;
  let storyTime = 0;
  let celebrationTime = 0;

  let paddle = { x:0, y:0, w:116, h:18 };
  let balls = [];
  let blocks = [];
  let items = [];
  let particles = [];
  let stars = [];
  let rings = [];
  let playerShots = [];
  let boss = null;

  let paddleBoostUntil = 0;
  let magnetUntil = 0;
  let magnetCharges = 0;
  let rapidUntil = 0;
  let rapidShotCooldown = 0;

  let catDash = {
    active:false,
    x:-180,
    y:0,
    rot:0,
    until:0,
    trail:[]
  };

  let stats = null;

  let catImg = new Image();
  let catReady = false;

  let audioCtx = null;
  let musicStep = 0;
  let musicAccum = 0;
  let audioPrimed = false;
  let musicSceneKey = "";

  function rand(min, max){
    return Math.random() * (max - min) + min;
  }

  function randInt(min, max){
    return Math.floor(rand(min, max + 1));
  }

  function clamp(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function viewCenterX(){
    return view.x + view.w / 2;
  }

  function resetStats(){
    stats = {
      bossesDefeated:0,
      itemsCollected:0,
      totalBlocksBroken:0,
      combo:0,
      comboTimer:0,
      maxCombo:0,
      damageTaken:0,
      finalFormDefeated:false
    };
  }

  function getStageBaseSpeed(){
    return Math.min(5.9, 4.05 + (stage - 1) * 0.12);
  }

  function paddleTheme(){
    if(selectedChar.id === "hide"){
      return { top:"#fff3a5", bottom:"#ffbd52", accent:"#ffdf63" };
    }
    if(selectedChar.id === "cat"){
      return { top:"#ffd4ea", bottom:"#ff7fb6", accent:"#ff63ad" };
    }
    if(selectedChar.id === "bear"){
      return { top:"#d7ebff", bottom:"#72b6ff", accent:"#7ca9ff" };
    }
    return { top:"#dbffd9", bottom:"#7de188", accent:"#7fe38f" };
  }

  function currentPerks(){
    const base = getStageBaseSpeed();
    return {
      basePaddle:
        selectedChar.id === "hide" ? 132 :
        selectedChar.id === "bear" ? 120 :
        116,
      skillGainMult:
        selectedChar.id === "cat" ? 1.18 : 1.0,
      itemDropBonus:
        selectedChar.id === "cat" ? 0.12 : 0,
      scoreBonus:
        selectedChar.id === "hide" ? 1.10 : 1.0,
      bigDurationMult:
        selectedChar.id === "bear" ? 1.55 : 1.0,
      bigWidthBonus:
        selectedChar.id === "bear" ? 18 : 0,
      launchSpeed:
        selectedChar.id === "rabbit" ? base - 0.22 : base,
      rapidCooldownMult:
        selectedChar.id === "rabbit" ? 0.80 : 1.0,
      controlMult:
        selectedChar.id === "rabbit" ? 1.12 : 1.0
    };
  }

  function currentMusicMode(){
    if(state === "opening" || state === "title") return "cute";
    if(state === "story") return "story";
    if(state === "celebration") return "celebrate";
    if(state === "playing" && stageMode === "boss") return "boss";
    if(state === "playing") return "play";
    return "none";
  }

  function resetMusicForScene(){
    const key = `${state}:${stageMode}:${stage}`;
    if(key !== musicSceneKey){
      musicSceneKey = key;
      musicStep = 0;
      musicAccum = 0;
    }
  }

  function addScore(points){
    score += Math.round(points * currentPerks().scoreBonus);
  }

  function registerCombo(){
    stats.combo += 1;
    stats.comboTimer = 1.7;
    stats.maxCombo = Math.max(stats.maxCombo, stats.combo);
    if(stats.combo >= 4 && stats.combo % 4 === 0){
      showMessage(`${stats.combo} COMBO!`, 420);
    }
  }

  function resetCombo(){
    stats.combo = 0;
    stats.comboTimer = 0;
  }

  function loadCat(index = 0){
    if(index >= CAT_CANDIDATES.length){
      catReady = false;
      return;
    }
    const img = new Image();
    img.onload = () => {
      catImg = img;
      catReady = true;
      catBadgeImg.src = img.src;
      catSkillImg.src = img.src;
      catBadgeImg.style.display = "block";
      catSkillImg.style.display = "block";
      catBadgeFallback.style.display = "none";
      catSkillFallback.style.display = "none";
      if(state === "title") renderTitle();
    };
    img.onerror = () => loadCat(index + 1);
    img.src = CAT_CANDIDATES[index];
  }

  function unlockAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
  }

  function midiToFreq(m){
    return 440 * Math.pow(2, (m - 69) / 12);
  }

  function playTone(time, freq, dur, type="triangle", vol=0.03){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(vol, time + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + dur + 0.03);
  }

  function averageBallSpeed(){
    if(!balls.length) return currentPerks().launchSpeed;
    let sum = 0;
    let count = 0;
    for(const b of balls){
      if(b.stuck) continue;
      sum += Math.hypot(b.vx, b.vy);
      count++;
    }
    return sum / Math.max(1, count);
  }

  function tickCuteTheme(chords, lively = 1){
    const chord = chords[Math.floor(musicStep / 8) % chords.length];
    const step = musicStep % 8;
    const t = audioCtx.currentTime + 0.01;

    const arp = [0,1,2,1,2,1,0,1];
    const note = chord[arp[step]] + 12;
    playTone(t, midiToFreq(note), 0.12, "square", 0.011 * lively);
    playTone(t + 0.015, midiToFreq(note + 12), 0.07, "sine", 0.006 * lively);

    if(step === 0 || step === 4){
      playTone(t, midiToFreq(chord[0] - 12), 0.22, "triangle", 0.020 * lively);
      playTone(t + 0.02, midiToFreq(chord[1]), 0.16, "sine", 0.010 * lively);
    }

    if(step === 2 || step === 6){
      playTone(t, 2200, 0.03, "square", 0.004 * lively);
    }

    if(step === 7){
      playTone(t + 0.02, midiToFreq(chord[2] + 19), 0.11, "triangle", 0.007 * lively);
    }
  }

  function tickMusicStep(){
    if(!audioCtx) return;
    const mode = currentMusicMode();
    if(mode === "none") return;

    if(mode === "cute"){
      tickCuteTheme(CUTE_THEME, 1.15);
    } else if(mode === "story"){
      tickCuteTheme(STORY_THEME, 0.95);
    } else if(mode === "celebrate"){
      tickCuteTheme(CUTE_THEME, 1.35);
    } else if(mode === "boss"){
      const chord = BOSS_THEME[Math.floor(musicStep / 8) % BOSS_THEME.length];
      const step = musicStep % 8;
      const t = audioCtx.currentTime + 0.01;
      const low = chord[0];
      const mid = chord[1];
      const high = chord[2];

      if(step === 0 || step === 4){
        playTone(t, midiToFreq(low - 24), 0.46, "sawtooth", 0.050);
        playTone(t + 0.01, midiToFreq(low - 12), 0.36, "sawtooth", 0.040);
        playTone(t + 0.03, midiToFreq(low), 0.24, "triangle", 0.026);
      }

      if(step === 1 || step === 5){
        playTone(t, midiToFreq(high + 12), 0.12, "square", 0.014);
        playTone(t + 0.01, midiToFreq(high + 18), 0.08, "square", 0.010);
      }

      if(step === 2 || step === 6){
        playTone(t, midiToFreq(mid), 0.22, "triangle", 0.022);
        playTone(t + 0.01, midiToFreq(high), 0.20, "square", 0.014);
        playTone(t + 0.02, midiToFreq(high + 7), 0.18, "sine", 0.008);
      }

      if(step === 3 || step === 7){
        playTone(t, 90, 0.12, "sawtooth", 0.032);
        playTone(t + 0.02, 130, 0.08, "triangle", 0.018);
        playTone(t + 0.05, 66, 0.20, "sawtooth", 0.025);
      }

      if(step === 7){
        playTone(t + 0.03, midiToFreq(high + 19), 0.20, "sine", 0.010);
        playTone(t + 0.04, midiToFreq(high + 24), 0.12, "square", 0.010);
      }
    } else {
      const chord = CANON[Math.floor(musicStep / 8) % CANON.length];
      const step = musicStep % 8;
      const t = audioCtx.currentTime + 0.01;
      const arp = [0,1,2,1,2,1,0,1];
      const note = chord[arp[step]] + 12;

      playTone(t, midiToFreq(note), 0.13, "square", 0.009);

      if(step === 0 || step === 4){
        playTone(t, midiToFreq(chord[0] - 24), 0.26, "sine", 0.032);
        playTone(t, midiToFreq(chord[1]), 0.18, "triangle", 0.008);
      }

      if(step === 2 || step === 6){
        playTone(t, 2600, 0.025, "square", 0.0038);
      }
    }

    musicStep++;
  }

  function updateMusic(dt){
    if(!audioCtx || !audioPrimed) return;
    const mode = currentMusicMode();
    if(mode === "none") return;

    let interval = 0.22;

    if(mode === "cute") interval = 0.17;
    else if(mode === "story") interval = 0.20;
    else if(mode === "celebrate") interval = 0.15;
    else if(mode === "boss"){
      const speed = averageBallSpeed();
      interval = Math.max(0.17, Math.min(0.30, 0.26 - (speed - 5.2) * 0.008));
    } else if(mode === "play"){
      const speed = averageBallSpeed();
      interval = Math.max(0.16, Math.min(0.26, 0.24 - (speed - 6.0) * 0.01));
    }

    musicAccum += dt;
    while(musicAccum >= interval){
      musicAccum -= interval;
      tickMusicStep();
    }
  }

    musicAccum = 0;

  function stagePattern(variant, r, c, rows, cols){
    const centerR = (rows - 1) / 2;
    const centerC = (cols - 1) / 2;
    const dr = Math.abs(r - centerR);
    const dc = Math.abs(c - centerC);

    switch(variant){
      case 0: return true;
      case 1: return (r + c) % 2 === 0 || r < 2;
      case 2: return !(r >= 1 && r <= rows - 2 && c === Math.floor(cols/2));
      case 3: return c <= (r % cols);
      case 4: return dr + dc <= 2.6;
      case 5: return (r % 2 === 0 ? c < cols - 1 : c > 0);
      case 6: return r === 0 || r === rows - 1 || c === 0 || c === cols - 1 || (dr <= 0.5 && dc <= 1.5);
      case 7: return c !== Math.floor(cols/2) || r === 0 || r === rows - 1;
      case 8: return r < 2 || c === 0 || c === cols - 1 || (r + c) % 2 === 0;
      case 9: return c === Math.floor(cols/2) || r === Math.floor(rows/2) || (r % 2 === 0 && c !== 0 && c !== cols - 1);
      default: return true;
    }
  }

  function buildHardWallSet(rows, cols, stageNum){
    const set = new Set();
    const add = (r, c) => {
      if(r >= 0 && r < rows && c >= 0 && c < cols){
        set.add(r * cols + c);
      }
    };

    const p = (stageNum + stageVariant) % 8;

    if(stageNum >= 3){
      if(p === 0){
        for(let r=1; r<rows-1; r++) add(r, Math.floor(cols/2));
      } else if(p === 1){
        for(let r=0; r<rows; r++){
          add(r, 1);
          add(r, cols - 2);
        }
      } else if(p === 2){
        for(let r=0; r<rows; r++){
          add(r, r % cols);
          add(r, cols - 1 - (r % cols));
        }
      } else if(p === 3){
        for(let c=0; c<cols; c++) add(1, c);
        for(let c=0; c<cols; c++) add(rows - 2, c);
      } else if(p === 4){
        for(let r=0; r<rows; r++){
          if(r % 2 === 0) add(r, 0);
          else add(r, cols - 1);
        }
        add(Math.floor(rows / 2), Math.floor(cols / 2));
      } else if(p === 5){
        for(let r=1; r<rows-1; r++){
          add(r, 0);
          add(r, cols - 1);
          if(r % 2 === 0) add(r, Math.floor(cols / 2));
        }
      } else if(p === 6){
        for(let c=0; c<cols; c += 2){
          add(2, c);
          add(rows - 3, c);
        }
      } else {
        for(let r=1; r<rows-1; r++){
          add(r, (r + stageNum) % cols);
        }
      }
    }

    if(stageNum >= 7){
      add(0, 1);
      add(0, cols - 2);
      add(rows - 1, 1);
      add(rows - 1, cols - 2);
    }

    return set;
  }

  function createStageBlocks(stageNum){
    boss = null;
    blocks = [];
    items = [];
    playerShots = [];
    stageVariant = randInt(0, 9);

    const cols = 5;
    const rows = randInt(5, 7);
    const gapX = 8;
    const gapY = 9;
    const innerPad = 10;
    const bw = (field.w - innerPad * 2 - gapX * (cols - 1)) / cols;
    const bh = 26;

    const strong2Count = Math.min(3 + Math.floor(stageNum / 2), 10);
    const strong3Count = Math.min(Math.floor(stageNum / 2), 7);
    const hardWallSet = buildHardWallSet(rows, cols, stageNum);

    let candidateIndices = [];
    let idx = 0;
    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        if(stagePattern(stageVariant, r, c, rows, cols)) candidateIndices.push(idx);
        idx++;
      }
    }

    for(let i=candidateIndices.length - 1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [candidateIndices[i], candidateIndices[j]] = [candidateIndices[j], candidateIndices[i]];
    }

    const extraWalls = new Set([...hardWallSet].slice(0, Math.min(hardWallSet.size, stageNum >= 6 ? 9 : 6)));
    const strong3Set = new Set(candidateIndices.slice(0, strong3Count));
    const strong2Set = new Set(candidateIndices.slice(strong3Count, strong3Count + strong2Count));

    idx = 0;
    const wordShift = stageNum * 5 + randInt(0, WORDS.length - 1);

    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        if(!stagePattern(stageVariant, r, c, rows, cols)){
          idx++;
          continue;
        }

        let hp = 1;
        let label = WORDS[(idx + wordShift) % WORDS.length];
        let color = COLORS[(idx + stageNum + stageVariant) % COLORS.length];

        if(extraWalls.has(idx)){
          hp = Infinity;
          label = "壁";
          color = "#b88aa3";
        } else if(strong3Set.has(idx) && stageNum >= 3){
          hp = 3;
        } else if(strong2Set.has(idx) && stageNum >= 2){
          hp = 2;
        }

        blocks.push({
          x: field.x + innerPad + c * (bw + gapX),
          y: field.y + 16 + r * (bh + gapY),
          w: bw,
          h: bh,
          label,
          color,
          hp,
          maxHp: hp,
          alive:true
        });

        idx++;
      }
    }
  }

  function chooseBossType(exclude = null){
    const keys = Object.keys(BOSS_TYPES).filter(k => k !== exclude);
    return keys[Math.floor(Math.random() * keys.length)];
  }

  function applyBossType(targetBoss, type, stageNum, keepPosition = false){
    const meta = BOSS_TYPES[type];
    const prevY = targetBoss.y;
    targetBoss.type = type;
    targetBoss.meta = meta;
    targetBoss.baseY = field.y + 12;

    if(!keepPosition){
      targetBoss.y = targetBoss.baseY;
    } else if(type !== "zigzag"){
      targetBoss.y += (targetBoss.baseY - prevY) * 0.7;
    }

    targetBoss.vx =
      (type === "zigzag" ? 2.05 :
      type === "warp" ? 1.25 : 1.58) + stageNum * 0.04;
    targetBoss.beamGap = meta.beamGap - (stageNum === MAX_STAGE ? 0.10 : 0);
    targetBoss.beamWidth = meta.beamWidth;
    targetBoss.attackGap = meta.attackGap - (stageNum === MAX_STAGE ? 0.15 : 0);
    targetBoss.teleportTimer = type === "warp" ? 1.9 : 0;
    targetBoss.moveT = 0;
  }

  function createBoss(stageNum){
    blocks = [];
    items = [];
    playerShots = [];

    const maxHp = stageNum === MAX_STAGE ? 28 : 18;
    boss = {
      x: field.x + field.w/2 - 52,
      y: field.y + 12,
      w: 104,
      h: 78,
      hp: maxHp,
      maxHp,
      flash: 0,
      beamTimer: 0,
      beam:null,
      bob:0,
      secondForm:false,
      type:"",
      meta:null,
      baseY:field.y + 12,
      vx:1.5,
      moveT:0,
      teleportTimer:0,
      beamGap:2.1,
      beamWidth:18,
      attackGap:2.1,
      attackTimer:0,
      projectiles:[],
      markers:[]
    };

    applyBossType(boss, chooseBossType(), stageNum);
  }

  function buildStars(){
    stars = [];
    for(let i=0; i<74; i++){
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 2 + 0.5,
        a: Math.random() * 0.6 + 0.1
      });
    }
  }

  function startCatDash(){
    const now = performance.now();
    catDash.active = true;
    catDash.x = field.x - 120;
    catDash.y = field.y + field.h * 0.55;

  function spawnItem(x, y){
    const chance = 0.48 + currentPerks().itemDropBonus;
    if(Math.random() > chance) return;

    const pool = getItemPool();
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const data = ITEM_TYPES.find(v => v.type === pick);

    items.push({
      x, y,
      vx:(Math.random() - 0.5) * 1.1,
      vy:1.8 + Math.random() * 0.7,
      r:14,
      type:data.type,
      emoji:data.emoji,
      label:data.label
    });
  }

  function applyItem(type){
    worldFlash = Math.max(worldFlash, 0.12);
    stats.itemsCollected += 1;

    if(type === "gauge"){
      addSkill(26);
      showMessage("ゲージUP!", 480);
    }
    if(type === "score"){

  function useSkill(){
    if(state !== "playing" || skill < 100 || !currentSkill) return;
    const type = currentSkill.type;

    skill = 0;
    currentSkill = null;

    if(type === "cat"){
      startCatDash();
      playMeow();
      say("にゃーー!", 600);
      showMessage("猫ラッシュ!", 800);
      worldFlash = Math.max(worldFlash, 0.18);

      if(stageMode === "boss"){
        if(boss){
          boss.hp = Math.max(0, boss.hp - 5);
          boss.flash = 1;
          registerCombo();
          burst(boss.x + boss.w/2, boss.y + boss.h/2, "🐾", 18);
          addRing(boss.x + boss.w/2, boss.y + boss.h/2, "rgba(255,230,160,.95)", 78, 5);
          if(stage === MAX_STAGE && Math.random() < 0.16){
            spawnItem(boss.x + rand(16, boss.w - 16), boss.y + boss.h * 0.45);
          }
          if(boss.hp <= 0){
            addScore(120);
            stats.bossesDefeated += 1;
            if(boss.secondForm) stats.finalFormDefeated = true;
            boss = null;
            updateHud();
            goNextStage();
            return;
          }
        }
      } else {
        const base = balls.find(b => !b.stuck) || balls[0] || createBall();
        while(balls.length < 3){
          const extra = createBall(balls.length === 1 ? -4.8 : 4.8);
          extra.x = base.x;
          extra.y = base.y;
          extra.vy = -Math.abs(base.vy || currentPerks().launchSpeed);
          balls.push(extra);
        }
      }
    }

    if(type === "magnet"){
      magnetUntil = performance.now() + 6000;
      magnetCharges = 1;
      playTap(700);
      say("ぴたっ!", 520);
      showMessage("1回だけ吸着!", 700);
      addRing(paddle.x + paddle.w/2, paddle.y - 6, "rgba(160,160,255,.95)", 60, 5);
    }

    if(type === "big"){
      paddleBoostUntil = performance.now() + 8000 * currentPerks().bigDurationMult;
      playTap(300);
      say("どーん!", 520);
      showMessage("BIG PAD!", 700);
      addRing(paddle.x + paddle.w/2, paddle.y - 6, "rgba(255,214,112,.95)", 68, 5);
    }

    updateHud();
  }

  function calculateRank(clear){
    let value = score;
    value += lives * 160;
    value += stats.maxCombo * 20;
    value += stats.itemsCollected * 18;
    value += stats.bossesDefeated * 90;
    value -= stats.damageTaken * 50;
    if(clear) value += 320;
    if(stats.finalFormDefeated) value += 140;

    if(value >= 2600) return "S";
    if(value >= 1900) return "A";
    if(value >= 1250) return "B";
    return "C";
  }

  function buildAchievements(clear){
    const list = [];
    if(clear) list.push("10面制覇");
    if(clear && stats.damageTaken === 0) list.push("ノーダメ");
    if(stats.bossesDefeated >= 2) list.push("ボスハンター");
    if(stats.finalFormDefeated) list.push("真ボス突破");
    if(stats.itemsCollected >= 8) list.push("アイテムマスター");
    if(stats.maxCombo >= 12) list.push("コンボ職人");
    if(clear && lives === 5) list.push("フルライフ");
    if(selectedChar.id === "cat" && clear) list.push("ネコ推し完走");
    if(selectedChar.id === "hide" && score >= 1800) list.push("高得点職人");
    return list;
  }

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = `${W}px`;
    canvas.style.height = `${H}px`;
    ctx.setTransform(DPR,0,0,DPR,0,0);

    computeViewRect();
    applyResponsiveUI();
    layoutField();

    if(!pointerX) pointerX = viewCenterX();
    paddle.y = field.y + field.h - 24;
    buildStars();
  }

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawImageCover(img, x, y, w, h){
    const ir = img.width / img.height;
    const br = w / h;
    let dw, dh, dx, dy;
    if(ir > br){
      dh = h;
      dw = h * ir;
      dx = x - (dw - w) / 2;
      dy = y;
    } else {
      dw = w;
      dh = w / ir;
      dx = x;
      dy = y - (dh - h) / 2;
    }
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  function drawSideMats(styleA, styleB){
    if(view.w >= W - 4) return;
    const leftW = view.x;
    const rightX = view.x + view.w;
    const rightW = W - rightX;

    if(styleB){
      const lg = ctx.createLinearGradient(0, 0, view.x, 0);
      lg.addColorStop(0, styleA);
      lg.addColorStop(1, styleB);
      ctx.fillStyle = lg;
      ctx.fillRect(0, 0, leftW, H);

      const rg = ctx.createLinearGradient(rightX, 0, W, 0);
      rg.addColorStop(0, styleB);
      rg.addColorStop(1, styleA);
      ctx.fillStyle = rg;
      ctx.fillRect(rightX, 0, rightW, H);
    } else {
      ctx.fillStyle = styleA;
      ctx.fillRect(0, 0, leftW, H);
      ctx.fillRect(rightX, 0, rightW, H);
    }
  }

  function drawCatSticker(x, y, size, rot=0, alpha=1, photoBias=0.75){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(rot);

    if(catReady && Math.random() < photoBias){
      ctx.beginPath();
      ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(catImg, -size / 2, -size / 2, size, size);
    } else {
      ctx.font = `${Math.floor(size)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff";
      ctx.fillText("🐱", 0, 0);
    }
    ctx.restore();
  }

  function drawCatOrbit(count, centerX, centerY, radiusX, radiusY, sizeBase, time, alpha=0.92){
    for(let i=0; i<count; i++){
      const a = (i / count) * Math.PI * 2 + time;
      const x = centerX + Math.cos(a) * radiusX;
      const y = centerY + Math.sin(a * 1.15) * radiusY;
      drawCatSticker(x, y, sizeBase + Math.sin(a * 3) * 4, a * 0.2, alpha, 0.9);
    }
  }

  function drawTitleCats(time){
    for(let i=0; i<8; i++){
      const side = i % 2 === 0 ? -1 : 1;
      const row = Math.floor(i / 2);
      const x = viewCenterX() + side * (view.w * 0.34);
      const y = H * (0.16 + row * 0.15) + Math.sin(time * 2 + i) * 10;
      drawCatSticker(x, y, 34 + (i % 3) * 4, Math.sin(time * 1.5 + i) * 0.18, 0.86, 0.85);
    }
  }

  function drawBackground(){
    let g;
    if(stageMode === "boss"){
      g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, "#180d1f");
      g.addColorStop(.35, "#2a1433");
      g.addColorStop(.65, "#2f1239");
      g.addColorStop(1, "#09070f");
    } else {
      g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, "#ffd8ea");
      g.addColorStop(.52, "#f3bad5");
      g.addColorStop(1, "#ea96bd");
    }
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    if(view.w < W - 4){
      ctx.fillStyle = stageMode === "boss" ? "rgba(0,0,0,.42)" : "rgba(255,255,255,.18)";
      ctx.fillRect(0, 0, view.x, H);
      ctx.fillRect(view.x + view.w, 0, W - (view.x + view.w), H);
    }

    for(const s of stars){
      ctx.globalAlpha = stageMode === "boss" ? s.a * 1.2 : s.a;
      ctx.fillStyle = stageMode === "boss" ? "#d8d9ff" : "#ffffff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, stageMode === "boss" ? s.r * 1.1 : s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if(stageMode === "boss"){
      const vignette = ctx.createRadialGradient(viewCenterX(), H/2, 120, viewCenterX(), H/2, Math.max(view.w,H)*0.78);
      vignette.addColorStop(0, "rgba(0,0,0,0)");
      vignette.addColorStop(1, "rgba(0,0,0,.50)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0,0,W,H);
    }

    if(catReady){
      ctx.save();
      ctx.globalAlpha = stageMode === "boss" ? 0.16 : 0.28;
      roundRectPath(field.x, field.y, field.w, field.h, 26);
      ctx.clip();
      drawImageCover(catImg, field.x, field.y, field.w, field.h);
      ctx.restore();
    }

    ctx.strokeStyle = stageMode === "boss" ? "rgba(255,255,255,.38)" : "rgba(255,255,255,.58)";
    ctx.lineWidth = 2;
    roundRectPath(field.x, field.y, field.w, field.h, 26);
    ctx.stroke();

    if(worldFlash > 0){
      ctx.fillStyle = `rgba(255,255,255,${worldFlash * 0.22})`;
      ctx.fillRect(0,0,W,H);
    }

    if(damageFlash > 0){
      ctx.fillStyle = `rgba(255,80,90,${0.22 * damageFlash})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawBlocks(){
    for(const b of blocks){
      if(!b.alive) continue;

      roundRectPath(b.x, b.y, b.w, b.h, 10);
      ctx.fillStyle = b.color;
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.stroke();

      ctx.fillStyle = "#6f2858";
      ctx.font = "bold 14px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 + 1);

      if(Number.isFinite(b.hp) && b.hp > 1){
        ctx.fillStyle = "#7c2b59";
        ctx.font = "bold 10px sans-serif";
        ctx.fillText(String(b.hp), b.x + b.w - 10, b.y + 10);
      }

      if(!Number.isFinite(b.hp)){
        ctx.fillStyle = "#fff";
        ctx.font = "bold 10px sans-serif";
        ctx.fillText("∞", b.x + b.w - 10, b.y + 10);
      }
    }
  }

  function drawBoss(){
    if(!boss) return;

    const meta = boss.meta || BOSS_TYPES.beam;
    const cx = boss.x + boss.w/2;
    const cy = boss.y + boss.h/2 + Math.sin(boss.bob) * 2;

    ctx.save();
    ctx.translate(cx, cy);

    ctx.shadowColor = meta.aura;
    ctx.shadowBlur = 22;

    ctx.fillStyle = boss.flash > 0.1 ? "#fff0a8" : meta.bottom;
    ctx.beginPath();
    ctx.moveTo(-30, -10);
    ctx.lineTo(-16, -40);
    ctx.lineTo(-2, -12);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(30, -10);
    ctx.lineTo(16, -40);
    ctx.lineTo(2, -12);
    ctx.closePath();
    ctx.fill();

    const grad = ctx.createLinearGradient(0, -boss.h/2, 0, boss.h/2);
    grad.addColorStop(0, boss.flash > 0.1 ? "#fff0a8" : meta.top);
    grad.addColorStop(1, boss.flash > 0.1 ? "#ffd34d" : meta.bottom);
    roundRectPath(-boss.w/2, -boss.h/2, boss.w, boss.h, 22);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.82)";
    ctx.stroke();

    ctx.shadowBlur = 0;

    if(catReady){
      ctx.save();
      roundRectPath(-38, -26, 76, 52, 18);
      ctx.clip();
      ctx.drawImage(catImg, -38, -26, 76, 52);
      ctx.restore();
    } else {
      ctx.font = "52px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#6f2858";
      ctx.fillText("😾", 0, 2);
    }

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(-18, -6, 6, 0, Math.PI * 2);
    ctx.arc(18, -6, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#6f2858";
    ctx.beginPath();
    ctx.arc(-18, -6, 2.3, 0, Math.PI * 2);
    ctx.arc(18, -6, 2.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#6f2858";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-6, 10); ctx.lineTo(-26, 6);
    ctx.moveTo(-6, 13); ctx.lineTo(-26, 16);
    ctx.moveTo(6, 10); ctx.lineTo(26, 6);
    ctx.moveTo(6, 13); ctx.lineTo(26, 16);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 6); ctx.lineTo(-4, 12); ctx.lineTo(4, 12); ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-10, 18);
    ctx.quadraticCurveTo(0, 24, 10, 18);
    ctx.stroke();

    if(boss.secondForm){
      ctx.strokeStyle = "#fff6a8";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, 54, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();

    const barW = field.w - 24;
    roundRectPath(field.x + 12, field.y + 8, barW, 12, 8);
    ctx.fillStyle = "rgba(255,255,255,.2)";
    ctx.fill();
    roundRectPath(field.x + 12, field.y + 8, barW * Math.max(0, boss.hp / boss.maxHp), 12, 8);
    ctx.fillStyle = meta.bottom;
    ctx.fill();

    if(boss.beam){
      const beamX = boss.beam.x;
      const beamW = boss.beamWidth || 18;
      if(boss.beam.state === "charge"){
        ctx.strokeStyle = "rgba(255,255,255,.9)";
        ctx.lineWidth = 3;
        ctx.setLineDash([8,8]);
        ctx.beginPath();
        ctx.moveTo(beamX, boss.y + boss.h - 6);
        ctx.lineTo(beamX, field.y + field.h);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = "rgba(255,180,220,.15)";
        ctx.fillRect(beamX - beamW, boss.y + boss.h - 6, beamW * 2, field.y + field.h - (boss.y + boss.h - 6));
      } else {
        const gradB = ctx.createLinearGradient(beamX, boss.y, beamX, field.y + field.h);
        gradB.addColorStop(0, "rgba(255,255,255,1)");
        gradB.addColorStop(.12, "rgba(255,190,230,.98)");
        gradB.addColorStop(.34, meta.bottom);
        gradB.addColorStop(1, "rgba(255,122,170,.12)");
        ctx.fillStyle = gradB;
        ctx.fillRect(beamX - beamW/2, boss.y + boss.h - 6, beamW, field.y + field.h - (boss.y + boss.h - 6));

        ctx.fillStyle = "rgba(255,255,255,.25)";
        ctx.fillRect(beamX - beamW, boss.y + boss.h - 6, beamW * 2, field.y + field.h - (boss.y + boss.h - 6));
      }
    }

    drawBossExtras();
  }

  function drawBossExtras(){
    if(!boss) return;

    for(const m of boss.markers){
      ctx.strokeStyle = "rgba(255,255,255,.88)";
      ctx.lineWidth = 3;
      ctx.setLineDash([6,6]);
      ctx.beginPath();
      ctx.arc(m.x, paddle.y - 10, 18 + (1 - m.timer / m.max) * 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    for(const p of boss.projectiles){
      if(p.type === "orb"){
        const g = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, p.r);
        g.addColorStop(0, "#fff");
        g.addColorStop(.4, "#ffb9d9");
        g.addColorStop(1, "rgba(255,96,170,.2)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      } else if(p.type === "paw"){
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.fillStyle = "rgba(255,214,230,.95)";
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath(); ctx.arc(-p.r * 0.55, -p.r * 0.65, p.r * 0.36, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-p.r * 0.18, -p.r * 0.88, p.r * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(p.r * 0.18, -p.r * 0.88, p.r * 0.32, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(p.r * 0.55, -p.r * 0.65, p.r * 0.36, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
  }

  function performBossSubAttack(){
    if(!boss) return;

    const cx = boss.x + boss.w/2;

    if(boss.type === "beam"){
      boss.projectiles.push({
        type:"orb",
        x: cx,
        y: boss.y + boss.h - 6,
        vx: rand(-1.3, 1.3),
        vy: 3.8 + stage * 0.08,
        r: 12
      });
      playBossOrb();
    } else if(boss.type === "zigzag"){
      boss.markers.push({
        x: clamp(paddle.x + paddle.w/2 + rand(-30, 30), field.x + 24, field.x + field.w - 24),
        timer: 0.65,
        max: 0.65
      });
      playBossPaw();
    } else if(boss.type === "warp"){
      boss.projectiles.push({
        type:"orb",
        x: cx,
        y: boss.y + boss.h - 6,
        vx: rand(-1.8, 1.8),
        vy: 3.5 + stage * 0.10,
        r: 11
      });
      if(Math.random() < 0.55){
        boss.markers.push({
          x: clamp(paddle.x + paddle.w/2, field.x + 24, field.x + field.w - 24),
          timer: 0.55,
          max: 0.55
        });
      }
      playBossOrb();
    }

    if(boss.secondForm){
      if(Math.random() < 0.7){
        boss.projectiles.push({
          type:"orb",
          x: cx + rand(-18, 18),
          y: boss.y + boss.h - 6,
          vx: rand(-2.0, 2.0),
          vy: 4.3 + stage * 0.12,
          r: 12
        });
      }
      if(Math.random() < 0.55){
        boss.markers.push({
          x: clamp(paddle.x + paddle.w/2 + rand(-40, 40), field.x + 24, field.x + field.w - 24),
          timer: 0.50,
          max: 0.50
        });
      }
    }
  }

  function updateBoss(dt){
    if(!boss) return;

    boss.bob += dt * 4.5;
    boss.moveT += dt;

    if(stage === MAX_STAGE && !boss.secondForm && boss.hp <= boss.maxHp * 0.5){
      boss.secondForm = true;
      const prev = boss.type;
      applyBossType(boss, chooseBossType(prev), stage, true);
      boss.beamGap *= 0.84;
      boss.attackGap *= 0.82;
      worldFlash = Math.max(worldFlash, 0.2);
      shake = Math.max(shake, 8);
      showMessage("FINAL MODE!", 820);
      say("本気にゃ!", 650);
      playBeamCharge();
    }

    if(boss.type === "beam"){
      boss.x += boss.vx * dt * 60;
      boss.y += (boss.baseY - boss.y) * 0.08;
    } else if(boss.type === "zigzag"){
      boss.x += boss.vx * dt * 60;
      boss.y = boss.baseY + Math.sin(boss.moveT * 2.7) * 18;
    } else if(boss.type === "warp"){
      boss.x += boss.vx * dt * 60;
      boss.y += (boss.baseY - boss.y) * 0.08;
      boss.teleportTimer -= dt;
      if(boss.teleportTimer <= 0){
        boss.teleportTimer = boss.secondForm ? 1.25 : 1.9;
        burst(boss.x + boss.w/2, boss.y + boss.h/2, "💨", 10);
        boss.x = clamp(field.x + 20 + rand(0, field.w - boss.w - 40), field.x + 12, field.x + field.w - boss.w - 12);
        burst(boss.x + boss.w/2, boss.y + boss.h/2, "✨", 12);
        addRing(boss.x + boss.w/2, boss.y + boss.h/2, "rgba(180,255,220,.9)", 74, 4);
      }
    }

    if(boss.x < field.x + 12 || boss.x + boss.w > field.x + field.w - 12){
      boss.vx *= -1;
      boss.x = Math.max(field.x + 12, Math.min(field.x + field.w - boss.w - 12, boss.x));
    }

    boss.flash *= 0.88;

    boss.beamTimer += dt;
    if(!boss.beam && boss.beamTimer >= boss.beamGap){
      boss.beamTimer = 0;
      boss.beam = {
        x: boss.x + boss.w/2,
        state:"charge",
        timer: boss.secondForm ? 0.44 : 0.55,
        hit:false
      };
      playBeamCharge();
      showMessage("WARNING", 420);
    }

    boss.attackTimer += dt;
    if(boss.attackTimer >= boss.attackGap){
      boss.attackTimer = 0;
      performBossSubAttack();
    }

    for(let i=boss.markers.length - 1; i>=0; i--){
      const m = boss.markers[i];
      m.timer -= dt;
      if(m.timer <= 0){
        boss.projectiles.push({
          type:"paw",
          x: m.x,
          y: field.y - 20,
          vx: 0,
          vy: boss.secondForm ? 7.8 : 6.6,
          r: boss.secondForm ? 18 : 16
        });
        playBossPaw();
        boss.markers.splice(i, 1);
      }
    }

    for(let i=boss.projectiles.length - 1; i>=0; i--){
      const p = boss.projectiles[i];
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;

      if(p.type === "orb"){
        p.vx *= 1.002;
      }

      if(p.y > field.y + field.h + 50 || p.x < field.x - 50 || p.x > field.x + field.w + 50){
        boss.projectiles.splice(i, 1);
        continue;
      }

      const hitPaddle =
        p.x + p.r > paddle.x &&
        p.x - p.r < paddle.x + paddle.w &&
        p.y + p.r > paddle.y &&
        p.y - p.r < paddle.y + paddle.h;

      if(hitPaddle){
        burst(p.x, p.y, p.type === "paw" ? "💥" : "⚡", 10);
        boss.projectiles.splice(i, 1);
        loseLife();
        return;
      }
    }

    if(boss.beam){
      boss.beam.x = boss.x + boss.w/2;
      boss.beam.timer -= dt;

      if(boss.beam.state === "charge" && boss.beam.timer <= 0){
        boss.beam.state = "fire";
        boss.beam.timer = boss.secondForm ? 0.56 : 0.46;
        playBeamFire();
        worldFlash = Math.max(worldFlash, 0.18);
        shake = Math.max(shake, 7);
      } else if(boss.beam.state === "fire" && boss.beam.timer <= 0){
        boss.beam = null;
      }

      if(boss.beam && boss.beam.state === "fire"){
        const bx = boss.beam.x;
        const beamW = boss.beamWidth || 18;
        const paddleHit = bx + beamW/2 >= paddle.x && bx - beamW/2 <= paddle.x + paddle.w;
        if(paddleHit && !boss.beam.hit){
          boss.beam.hit = true;
          burst(bx, paddle.y, "💥", 10);
          addRing(bx, paddle.y, "rgba(255,120,160,.95)", 70, 5);
          loseLife();
          return;
        }
      }
    }
  }

  function handlePaddleHit(ball, now){
    playTap(620);
    playPaddleNyah();
    say("ニヤッ!", 360);
    worldFlash = Math.max(worldFlash, 0.08);
    shake = Math.max(shake, 3.5);

    if(magnetCharges > 0 && now < magnetUntil){
      ball.stuck = true;
      ball.stuckOffsetX = Math.max(ball.r, Math.min(paddle.w - ball.r, ball.x - paddle.x));
      magnetCharges--;
      burst(ball.x, paddle.y, "🧲", 9);
      updateHud();
      return true;
    }

    const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
    const minSpeed = currentPerks().launchSpeed;
    const currentSpeed = Math.hypot(ball.vx, ball.vy);
    const nextSpeed = Math.max(minSpeed, Math.min(currentSpeed * 0.94, minSpeed + 1.1));

    ball.vx = hit * nextSpeed * 0.92 * currentPerks().controlMult;
    ball.vy = -Math.sqrt(Math.max(minSpeed * minSpeed * 0.9, nextSpeed * nextSpeed - ball.vx * ball.vx));

    burst(ball.x, paddle.y, "🐾", 9);
    addRing(ball.x, paddle.y, "rgba(255,240,180,.95)", 48, 4);
    return false;
  }

  function hitRect(ball, rect){
    return ball.x + ball.r > rect.x &&
           ball.x - ball.r < rect.x + rect.w &&
           ball.y + ball.r > rect.y &&
           ball.y - ball.r < rect.y + rect.h;
  }

  function reflectBall(ball, rect){
    const prevX = ball.x - ball.vx;
    const prevY = ball.y - ball.vy;
    const fromLeft = prevX + ball.r <= rect.x;
    const fromRight = prevX - ball.r >= rect.x + rect.w;
    const fromTop = prevY + ball.r <= rect.y;
    const fromBottom = prevY - ball.r >= rect.y + rect.h;

    if(fromLeft || fromRight) ball.vx *= -1;
    else if(fromTop || fromBottom) ball.vy *= -1;
    else ball.vy *= -1;
  }

  function updateItems(dt){
    for(let i=items.length - 1; i>=0; i--){
      const it = items[i];
      it.x += it.vx * dt * 60;
      it.y += it.vy * dt * 60;
      if(it.y - it.r > H){
        items.splice(i, 1);
        continue;
      }
      const got = it.x + it.r > paddle.x && it.x - it.r < paddle.x + paddle.w && it.y + it.r > paddle.y && it.y - it.r < paddle.y + paddle.h;
      if(got){
        burst(it.x, it.y, it.emoji, 10);
        applyItem(it.type);
        items.splice(i, 1);
      }
    }
  }

  function spawnPlayerShot(){
    const px = paddle.x + paddle.w/2 + rand(-paddle.w * 0.24, paddle.w * 0.24);
    playerShots.push({ x:px, y:paddle.y - 4, vy:-10.5 });
    playTap(980);
  }

  function updatePlayerShots(dt){
    for(let i=playerShots.length - 1; i>=0; i--){
      const s = playerShots[i];
      s.y += s.vy * dt * 60;

      if(s.y < field.y - 26){
        playerShots.splice(i, 1);
        continue;
      }

      if(stageMode === "boss" && boss){
        const rect = { x:boss.x, y:boss.y, w:boss.w, h:boss.h };
        if(s.x > rect.x && s.x < rect.x + rect.w && s.y > rect.y && s.y < rect.y + rect.h){
          boss.hp -= 1;
          boss.flash = 1;
          registerCombo();
          addScore(4);
          addSkill(2);
          burst(s.x, s.y, "💥", 8);
          worldFlash = Math.max(worldFlash, 0.08);
          if(stage === MAX_STAGE && Math.random() < 0.08){
            spawnItem(boss.x + rand(16, boss.w - 16), boss.y + boss.h * 0.45);
          }
          playerShots.splice(i, 1);

          if(boss.hp <= 0){
            addScore(120);
            stats.bossesDefeated += 1;
            if(boss.secondForm) stats.finalFormDefeated = true;
            boss = null;
            goNextStage();
            return;
          }
          continue;
        }
      } else {
        let hit = false;
        for(const b of blocks){
          if(!b.alive) continue;
          if(s.x < b.x || s.x > b.x + b.w || s.y < b.y || s.y > b.y + b.h) continue;

          if(!Number.isFinite(b.hp)){
            burst(s.x, s.y, "💥", 5);
            playerShots.splice(i, 1);
            hit = true;
            break;
          }

          b.hp -= 1;
          registerCombo();
          addScore(b.maxHp >= 3 ? 8 : b.maxHp === 2 ? 6 : 5);
          addSkill(2);
          burst(s.x, s.y, "✨", 8);
          worldFlash = Math.max(worldFlash, 0.06);

          if(b.hp <= 0){
            b.alive = false;
            stats.totalBlocksBroken += 1;
            spawnItem(b.x + b.w/2, b.y + b.h/2);
          }

          playerShots.splice(i, 1);
          hit = true;
          break;
        }
        if(hit) continue;
      }
    }
  }

  function updateParticles(dt){
    for(let i=particles.length - 1; i>=0; i--){
      const p = particles[i];
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy += 0.03 * dt * 60;
      p.life -= 0.03 * dt * 60;
      if(p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateRings(dt){
    for(let i=rings.length - 1; i>=0; i--){
      const r = rings[i];
      r.r += (r.maxR - r.r) * 0.18;
      r.life -= dt * 2.1;
      if(r.life <= 0) rings.splice(i, 1);
    }
  }

  function updateOpening(dt){
    openingTime += dt;
    if(openingTime >= 8.8){
      renderTitle();
    }
  }

  function updateStory(dt){
    storyTime += dt;
    if(storyTime >= 3.3){
      startGameNow();
    }
  }

  function updateCelebration(dt){
    celebrationTime += dt;
    updateParticles(dt);
    updateRings(dt);
    if(Math.random() < 0.12){
      const px = rand(view.x + view.w * 0.18, view.x + view.w * 0.82);
      const py = rand(H * 0.2, H * 0.78);
      particles.push({
        x:px, y:py,
        vx:rand(-1.0,1.0),
        vy:rand(-1.2,0.4),
        life:1,
        emoji:Math.random() < 0.5 ? "✨" : "🎉"
      });
    }
    if(celebrationTime >= 5.2){
      showClearCard();
    }
  }

  function update(dt){
    resetMusicForScene();

    if(state === "opening"){
      updateOpening(dt);
      updateMusic(dt);
      updateHud();
      return;
    }
    if(state === "story"){
      updateStory(dt);
      updateMusic(dt);
      updateHud();
      return;
    }
    if(state === "title"){
      updateMusic(dt);
      updateHud();
      return;
    }
    if(state === "celebration"){
      updateCelebration(dt);
      updateMusic(dt);
      updateHud();
      return;
    }
    if(state !== "playing"){
      updateHud();
      return;
    }

    const now = performance.now();

    if(stats.comboTimer > 0){
      stats.comboTimer -= dt;
      if(stats.comboTimer <= 0){
        resetCombo();
      }
    }

    const basePaddle = currentPerks().basePaddle;
    const bigTarget = 170 + currentPerks().bigWidthBonus;
    if(now < paddleBoostUntil){
      paddle.w += (bigTarget - paddle.w) * 0.15;
    } else {
      paddle.w += (basePaddle - paddle.w) * 0.14;
    }

    paddle.x += ((pointerX - paddle.w/2) - paddle.x) * Math.min(1, 0.25 * dt * 60);
    paddle.x = Math.max(field.x + 8, Math.min(field.x + field.w - paddle.w - 8, paddle.x));

    if(catDash.active){
      catDash.trail.push({ x: catDash.x, y: catDash.y, rot: catDash.rot });
      if(catDash.trail.length > 8) catDash.trail.shift();
      catDash.x += 26 * dt * 60;
      catDash.y += Math.sin(now / 90) * 1.8;
      catDash.rot += 0.045 * dt * 60;
      if(now > catDash.until){
        catDash.active = false;
        catDash.trail = [];
      }
    }

    if(stageMode === "boss") updateBoss(dt);
    if(state !== "playing") return;

    if(now < rapidUntil){
      rapidShotCooldown -= dt;
      while(rapidShotCooldown <= 0){
        rapidShotCooldown += 0.16 * currentPerks().rapidCooldownMult;
        spawnPlayerShot();
      }
    }

    updatePlayerShots(dt);
    if(state !== "playing") return;

    for(let i=balls.length - 1; i>=0; i--){
      const ball = balls[i];

      if(ball.stuck){
        ball.x = paddle.x + ball.stuckOffsetX;
        ball.y = paddle.y - ball.r - 2;
        continue;
      }

      ball.trail.push({ x:ball.x, y:ball.y });
      if(ball.trail.length > 6) ball.trail.shift();

      ball.x += ball.vx * dt * 60;
      ball.y += ball.vy * dt * 60;

      if(ball.x < field.x + ball.r){
        ball.x = field.x + ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if(ball.x > field.x + field.w - ball.r){
        ball.x = field.x + field.w - ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if(ball.y < field.y + ball.r){
        ball.y = field.y + ball.r;
        ball.vy *= -1;
        playTap(420);
      }

      if(
        ball.y + ball.r > paddle.y &&
        ball.y - ball.r < paddle.y + paddle.h &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.w &&
        ball.vy > 0
      ){
        const stuckNow = handlePaddleHit(ball, now);
        if(stuckNow) continue;
      }

      if(stageMode === "boss" && boss){
        const rect = { x:boss.x, y:boss.y, w:boss.w, h:boss.h };
        if(hitRect(ball, rect)){
          boss.hp -= 1;
          boss.flash = 1;
          registerCombo();
          addScore(16);
          addSkill(6);
          burst(ball.x, ball.y, "⭐", 12);
          worldFlash = Math.max(worldFlash, 0.08);
          shake = Math.max(shake, 4.8);
          playTap(920);
          reflectBall(ball, rect);

          if(stage === MAX_STAGE && Math.random() < 0.12){
            spawnItem(boss.x + rand(16, boss.w - 16), boss.y + boss.h * 0.48);
          }

          if(boss.hp <= 0){
            addScore(120);
            stats.bossesDefeated += 1;
            if(boss.secondForm) stats.finalFormDefeated = true;
            boss = null;
            goNextStage();
            return;
          }
          updateHud();
        }

        if(boss && boss.beam && boss.beam.state === "fire"){
          const bx = boss.beam.x;
          const beamW = boss.beamWidth || 18;
          if(ball.x + ball.r > bx - beamW/2 && ball.x - ball.r < bx + beamW/2 && ball.y > boss.y + boss.h - 8){
            ball.vy *= -1;
            ball.vx *= 0.96;
            burst(ball.x, ball.y, "⚡", 7);
          }
        }
      } else {
        for(const b of blocks){
          if(!b.alive) continue;
          if(!hitRect(ball, b)) continue;

          if(!Number.isFinite(b.hp)){
            reflectBall(ball, b);
            burst(b.x + b.w/2, b.y + b.h/2, "💥", 6);
            shake = Math.max(shake, 2.6);
            playTap(280);
            break;
          }

          b.hp -= 1;
          registerCombo();
          addScore(b.maxHp >= 3 ? 14 : b.maxHp === 2 ? 12 : 10);
          addSkill(6);
          burst(b.x + b.w/2, b.y + b.h/2, "✨", 10);
          worldFlash = Math.max(worldFlash, 0.06);
          shake = Math.max(shake, 2.8);

          if(b.hp <= 0){
            b.alive = false;
            stats.totalBlocksBroken += 1;
            playTap(860);
            spawnItem(b.x + b.w/2, b.y + b.h/2);
            burst(b.x + b.w/2, b.y + b.h/2, "💫", 12);
          } else {
            playTap(560);
          }

          reflectBall(ball, b);
          if(score % 100 === 0) showMessage("GREAT!", 520);
          updateHud();
          break;
        }
      }

      if(ball.y > field.y + field.h + 44){
        balls.splice(i, 1);
      }
    }

    if(stageMode === "boss" && balls.length > 1){
      balls = [balls[0]];
    }

    if(balls.length === 0){
      loseLife();
      return;
    }

    if(stageMode === "breakout"){
      const remainingBreakable = blocks.some(b => b.alive && Number.isFinite(b.hp));
      if(!remainingBreakable){
        goNextStage();
        return;
      }
    }

    updateItems(dt);
    updateParticles(dt);
    updateRings(dt);

    if(shake > 0.08) shake *= 0.88;
    else shake = 0;

    if(damageFlash > 0.02) damageFlash *= 0.88;
    else damageFlash = 0;

    if(worldFlash > 0.01) worldFlash *= 0.86;
    else worldFlash = 0;

    updateMusic(dt);
    updateHud();
  }

  function drawIdleBackground(){
    const prevMode = stageMode;
    stageMode = "breakout";
    drawBackground();
    drawTitleCats(performance.now() / 900);
    stageMode = prevMode;
  }

  function draw(){
    if(state === "opening"){
      drawOpeningMovie();
      return;
    }
    if(state === "story"){
      drawStoryMovie();
      return;
    }
    if(state === "celebration"){
      drawCelebrationMovie();
      return;
    }
    if(state !== "playing"){
      drawIdleBackground();
      return;
    }

    ctx.save();
    if(shake > 0){
      ctx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
    }
    drawBackground();
    if(stageMode === "boss") drawBoss();
    else drawBlocks();
    drawItems();
    drawPlayerShots();
    drawPaddle();
    drawBalls();
    drawRings();
    drawParticles();
    ctx.restore();
    drawCatDash();
  }

  function loop(ts){
    if(!lastTime) lastTime = ts;
    const dt = Math.min(0.033, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function setPointerX(clientX){
    const rect = canvas.getBoundingClientRect();
    pointerX = clientX - rect.left;
  }

  function releaseStuckBalls(){
    let released = false;
    for(const ball of balls){
      if(ball.stuck){
        ball.stuck = false;
        const hit = (pointerX - (paddle.x + paddle.w/2)) / (paddle.w/2);
        ball.vx = hit * 5.2 * currentPerks().controlMult;
        ball.vy = -Math.max(currentPerks().launchSpeed, 4.8);
        released = true;
      }
    }
    if(released) playTap(760);
  }

  canvas.addEventListener("pointerdown", e => {
    setPointerX(e.clientX);

    if(!audioPrimed){
      unlockAudio();
      audioPrimed = true;
      resetMusic();
      if(state === "opening"){
        return;
      }
    }

    if(state === "opening"){
      renderTitle();
      return;
    }
    if(state === "story"){
      startGameNow();
      return;
    }
    if(state === "celebration"){
      showClearCard();
      return;
    }
    if(state === "playing"){
      releaseStuckBalls();
    }
  });

  canvas.addEventListener("pointermove", e => {
    setPointerX(e.clientX);
  });

  canvas.addEventListener("touchstart", () => {
    if(!audioPrimed){
      unlockAudio();
      audioPrimed = true;
      resetMusic();
    }
  }, {passive:true});

  skillButton.addEventListener("click", () => {
    if(!audioPrimed){
      unlockAudio();
      audioPrimed = true;
      resetMusic();
    }
    useSkill();
  });

  window.addEventListener("resize", () => {
    resize();
    if(state === "playing"){
      paddle.x = Math.max(field.x + 8, Math.min(field.x + field.w - paddle.w - 8, paddle.x));
      paddle.y = field.y + field.h - 24;
    }
  });

  loadCat();
  resize();
  updateHud();
  overlay.classList.add("hidden");
  requestAnimationFrame(loop);
})();
</script>
</body>
