<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヒデちゃん：突然のバードウォーク</title>
<style>
  :root { --bg-pink: #f9dbe7; --block-pink: #f56c9d; --paddle-purple: #a467c9; }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background-color: var(--bg-pink); font-family: monospace; }
  #game-container { position: relative; width: 100vw; height: 100dvh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
  #canvas-wrap { position: relative; width: 90vw; height: 70vh; background: #fff; border: 4px solid #f9cbdc; border-radius: 10px; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  #controls { margin-top: 20px; display: flex; gap: 10px; }
  .btn { border: none; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #a476e3; padding: 15px 30px; box-shadow: 0 4px 0 #7e4db0; }
  #msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 24px; color: yellow; font-weight: bold; text-shadow: 2px 2px #000; display: none; z-index: 100; }
</style>
</head>
<body>

<div id="game-container">
  <div id="msg">!!! BIRD WALK MODE !!!</div>
  <div id="canvas-wrap"><canvas id="game"></canvas></div>
  <div id="controls"><button class="btn" id="startBtn">START!</button></div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const startBtn = document.getElementById("startBtn");
  const msg = document.getElementById("msg");

  let w, h, ball, paddle, bricks, mode = "breakout", active = false;
  let score = 0, birdY, birdV = 0, pipes = [], frame = 0;
  const WORDS = ["仕事", "夢", "ダイエット", "ご飯", "健康"];

  function init() {
    const rect = canvas.parentNode.getBoundingClientRect();
    w = canvas.width = rect.width;
    h = canvas.height = rect.height;
    mode = "breakout";
    score = 0;
    pipes = [];
    paddle = { w: 80, h: 12, x: w/2 - 40, y: h - 40 };
    ball = { x: w/2, y: h/2, r: 10, vx: 3, vy: 3 };
    buildBricks();
  }

  function buildBricks() {
    bricks = [];
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 4; c++) {
        bricks.push({ x: 15+c*(w/4), y: 30+r*30, w: w/4-10, h: 20, alive: true, text: WORDS[Math.floor(Math.random()*WORDS.length)] });
      }
    }
  }

  function switchMode() {
    active = false;
    msg.style.display = "block";
    setTimeout(() => {
      msg.style.display = "none";
      mode = "bird";
      birdY = h / 2;
      birdV = 0;
      active = true;
    }, 1500);
  }

  function update() {
    if (!active) return;

    if (mode === "breakout") {
      ball.x += ball.vx; ball.y += ball.vy;
      if (ball.x < 0 || ball.x > w) ball.vx *= -1;
      if (ball.y < 0) ball.vy *= -1;
      if (ball.y > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w) ball.vy = -Math.abs(ball.vy);
      
      bricks.forEach(b => {
        if (b.alive && ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
          b.alive = false; ball.vy *= -1; score++;
          if (score >= 10) switchMode(); // 10個壊すとモードチェンジ！
        }
      });
      if (ball.y > h) init();
    } else {
      // バードウォークモード
      birdV += 0.4; birdY += birdV;
      if (frame % 90 === 0) {
        let gap = 100;
        let pos = Math.random() * (h - 200) + 50;
        pipes.push({ x: w, top: pos, bot: pos + gap });
      }
      pipes.forEach(p => {
        p.x -= 3;
        if (p.x < 40 && p.x > 0 && (birdY < p.top || birdY > p.bot)) init();
      });
      if (birdY > h || birdY < 0) init();
      frame++;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    if (mode === "breakout") {
      ctx.fillStyle = "#fff0f5"; ctx.fillRect(0,0,w,h);
      bricks.forEach(b => {
        if (!b.alive) return;
        ctx.fillStyle = "#f56c9d"; ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = "white"; ctx.font = "10px sans-serif"; ctx.fillText(b.text, b.x+5, b.y+15);
      });
      ctx.fillStyle = "#a467c9"; ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 7); ctx.fill();
    } else {
      // バード背景（黒）
      ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = "#0f0"; // 緑の土管
      pipes.forEach(p => {
        ctx.fillRect(p.x, 0, 40, p.top);
        ctx.fillRect(p.x, p.bot, 40, h - p.bot);
      });
      ctx.fillStyle = "yellow"; // ヒデ鳥
      ctx.font = "30px serif"; ctx.fillText("🐤", 20, birdY);
    }
    update();
    requestAnimationFrame(draw);
  }

  // 操作
  const handleAction = () => {
    if (mode === "breakout") return; // ブロック崩し中は自動追従かマウス移動
    birdV = -6; // バードジャンプ！
  };
  canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleAction(); });
  canvas.addEventListener("mousedown", handleAction);
  window.addEventListener("mousemove", (e) => {
    if (mode === "breakout") paddle.x = e.clientX - canvas.offsetLeft - paddle.w/2;
  });

  startBtn.onclick = () => { init(); active = true; draw(); startBtn.style.display="none";};
  init(); draw();
})();
</script>
</body>
</html>
