<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヒデちゃん＆猫ちゃん：転生モード</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f9dbe7; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #fff; margin: 0 auto; border: 4px solid #f9cbdc; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #701d44; font-weight: bold; pointer-events: none; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 30px; color: #ff0; text-shadow: 2px 2px #000; display: none; z-index: 10; }
        #btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: #a476e3; color: white; border: none; border-radius: 50px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">壊した数: <span id="count">0</span></div>
    <div id="msg">BIRD WALK!!</div>
    <button id="btn">音楽＆START!</button>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");
    const countEl = document.getElementById("count");

    let w, h, ball, paddle, bricks, active = false, mode = "breakout";
    let score = 0, birdY, birdV = 0, pipes = [], frame = 0;
    const WORDS = ["仕事", "ダイエット", "夢", "ご飯", "健康", "旅行"];

    function init() {
        w = canvas.width = window.innerWidth * 0.95;
        h = canvas.height = window.innerHeight * 0.7;
        score = 0;
        mode = "breakout";
        pipes = [];
        frame = 0;
        paddle = { w: 100, h: 15, x: w / 2 - 50 };
        ball = { x: w / 2, y: h - 60, vx: 4, vy: -4, r: 10 };
        buildBricks();
        countEl.innerText = score;
    }

    function buildBricks() {
        bricks = [];
        const rows = 5, cols = 4;
        const bw = (w - 30) / cols;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                bricks.push({ x: 15 + c * bw, y: 40 + r * 30, w: bw - 5, h: 25, alive: true, text: WORDS[Math.floor(Math.random() * WORDS.length)] });
            }
        }
    }

    function loop() {
        if (!active) return;
        ctx.clearRect(0, 0, w, h);

        if (mode === "breakout") {
            // 背景
            ctx.fillStyle = "#fff0f5"; ctx.fillRect(0,0,w,h);
            
            // パドル描画
            ctx.fillStyle = "#a467c9";
            ctx.fillRect(paddle.x, h - 30, paddle.w, paddle.h);

            // ボール（ヒデちゃん）
            ball.x += ball.vx; ball.y += ball.vy;
            if (ball.x < 0 || ball.x > w) ball.vx *= -1;
            if (ball.y < 0) ball.vy *= -1;
            if (ball.y > h - 30 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                ball.vy = -Math.abs(ball.vy);
            }
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black"; ctx.font = "10px sans-serif"; ctx.fillText("ヒデ", ball.x-10, ball.y+3);

            // ブロック
            bricks.forEach(b => {
                if (!b.alive) return;
                ctx.fillStyle = "#f56c9d"; ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = "white"; ctx.font = "12px sans-serif"; ctx.fillText(b.text, b.x + 5, b.y + 18);

                if (ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                    b.alive = false; ball.vy *= -1; score++;
                    countEl.innerText = score;
                    if (score >= 10) { 
                        mode = "transition"; 
                        msg.style.display = "block";
                        setTimeout(() => { mode = "bird"; birdY = h/2; msg.style.display = "none"; }, 1500);
                    }
                }
            });
            if (ball.y > h) init();

        } else if (mode === "bird") {
            // ファミコン背景
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
            
            birdV += 0.5; birdY += birdV;
            if (frame % 80 === 0) {
                let gap = 120;
                let pos = Math.random() * (h - 200) + 50;
                pipes.push({ x: w, top: pos, bot: pos + gap });
            }
            pipes.forEach((p, i) => {
                p.x -= 3;
                ctx.fillStyle = "#0f0";
                ctx.fillRect(p.x, 0, 50, p.top);
                ctx.fillRect(p.x, p.bot, 50, h - p.bot);
                if (p.x < 50 && p.x > 0 && (birdY < p.top || birdY > p.bot)) init();
            });
            ctx.fillStyle = "yellow"; ctx.font = "30px serif"; ctx.fillText("🐤", 30, birdY);
            if (birdY > h || birdY < 0) init();
            frame++;
        }
        requestAnimationFrame(loop);
    }

    // 操作
    const movePaddle = (clientX) => {
        let rect = canvas.getBoundingClientRect();
        let x = (clientX - rect.left);
        paddle.x = x - paddle.w / 2;
    };

    window.addEventListener("touchmove", (e) => {
        if (mode === "breakout") movePaddle(e.touches[0].clientX);
        e.preventDefault();
    }, {passive: false});

    window.addEventListener("mousemove", (e) => {
        if (mode === "breakout") movePaddle(e.clientX);
    });

    window.addEventListener("touchstart", () => {
        if (mode === "bird") birdV = -8;
    });
    window.addEventListener("mousedown", () => {
        if (mode === "bird") birdV = -8;
    });

    btn.onclick = () => {
        btn.style.display = "none";
        active = true;
        init();
        loop();
    };

    init();
</script>
</body>
</html>
