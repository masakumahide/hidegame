<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ヒデちゃん大冒険：超速ULTIMATE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&display=swap');
:root{--pk:#ff1493;--yw:#ffcc00;--bg:#1a1a1a;--txt:#ffffff;}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);font-family:'M PLUS Rounded 1c',sans-serif;
  color:var(--txt);display:flex;flex-direction:column;align-items:center;
  height:100dvh;overflow:hidden;touch-action:none;
}
#game-wrap{position:relative;width:100vw;height:100dvh;max-width:450px;background:#000;overflow:hidden;}
canvas{width:100%;height:100%;display:block;}

/* UI Layer */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:100;}
.hidden{display:none !important;}
.title{font-size:40px;color:var(--pk);text-align:center;line-height:1.2;margin-bottom:30px;text-shadow:0 0 15px var(--pk);}
.btn{background:var(--pk);color:#white;border:none;padding:20px 50px;font-size:24px;border-radius:50px;font-weight:900;box-shadow:0 8px 0 #880e4f;cursor:pointer;}
.btn:active{transform:translateY(4px);box-shadow:0 4px 0 #880e4f;}

#hud{position:absolute;top:10px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 20px;font-size:20px;font-weight:900;pointer-events:none;z-index:50;}
#skill-gauge{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:80%;height:10px;background:rgba(255,255,255,0.2);border-radius:5px;}
#skill-fill{width:0%;height:100%;background:linear-gradient(90deg, #00ffcc, #00ffff);border-radius:5px;box-shadow:0 0 10px #00ffff;}
#msg{position:absolute;top:40%;width:100%;text-align:center;font-size:50px;color:var(--yw);font-weight:900;text-shadow:0 0 20px #000;pointer-events:none;z-index:150;}
</style>
</head>
<body>

<div id="game-wrap">
  <div id="hud">
    <div id="score-val">SCORE: 0</div>
    <div id="mode-name">BREAKOUT</div>
  </div>
  <div id="msg"></div>
  <canvas id="c"></canvas>
  <div id="skill-gauge"><div id="skill-fill"></div></div>

  <div id="screen-title" class="overlay">
    <div class="title">ヒデちゃん<br>大冒険：超速</div>
    <button class="btn" onclick="initGame()">スタート！</button>
  </div>

  <div id="screen-chara" class="overlay hidden">
    <div class="title" style="font-size:24px;">キャラを選択</div>
    <div id="chara-list" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px;"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');
const charaList = document.getElementById('chara-list');

let W, H, scale;
let gameMode = 'title'; // breakout, tetris, racing, result
let score = 0;
let frame = 0;
let shake = 0;
let skill = 0;
let touchX = 0, touchY = 0, isTouching = false;

const CHARS = [
  {name:'ヒデ', f:'😄', color:'#ffcc00'},
  {name:'ネコ', f:'🐱', color:'#ff66aa'},
  {name:'クマ', f:'🐻', color:'#aa88ff'},
  {name:'ウサ', f:'🐰', color:'#55ffaa'}
];
let player = CHARS[0];

// --- Audio ---
let audioCtx;
const playSound = (f, d, t='sine') => {
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = t; o.frequency.value = f;
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + d);
};

// --- Resizing ---
function resize() {
  W = canvas.width = window.innerWidth > 450 ? 450 : window.innerWidth;
  H = canvas.height = window.innerHeight;
  scale = W / 360;
}
window.onresize = resize;
resize();

// --- Input ---
const getPos = (e) => {
  const t = e.touches ? e.touches[0] : e;
  const rect = canvas.getBoundingClientRect();
  return { x: (t.clientX - rect.left), y: (t.clientY - rect.top) };
};
canvas.addEventListener('touchstart', e => {
  isTouching = true;
  const p = getPos(e);
  touchX = p.x; touchY = p.y;
  if(gameMode === 'tetris' && p.y < H*0.3) hardDrop(); // 上の方タップでハードドロップ
  if(!audioCtx) audioCtx = new AudioContext();
});
canvas.addEventListener('touchmove', e => {
  const p = getPos(e);
  if(gameMode === 'tetris' && Math.abs(p.x - touchX) > 30) {
    moveTetris(p.x > touchX ? 1 : -1);
    touchX = p.x;
  }
  touchX = p.x; touchY = p.y;
});
canvas.addEventListener('touchend', () => isTouching = false);

// --- Game Logic ---
let pad = { x: 150, w: 80 };
let ball = { x: 0, y: 0, dx: 0, dy: 0, r: 10 };
let bricks = [];
let tetris = { board: [], cur: null, timer: 0, speed: 20 };
let car = { x: 180, lane: 1 };
let obstacles = [];

function initGame() {
  document.getElementById('screen-title').classList.add('hidden');
  document.getElementById('screen-chara').classList.remove('hidden');
  charaList.innerHTML = CHARS.map((c, i) => `
    <div onclick="selectChara(${i})" style="background:#333; padding:20px; border-radius:15px; text-align:center; border:3px solid ${c.color}">
      <div style="font-size:40px">${c.f}</div>
      <div style="font-weight:900">${c.name}</div>
    </div>
  `).join('');
}

function selectChara(i) {
  player = CHARS[i];
  document.getElementById('screen-chara').classList.add('hidden');
  startBreakout();
}

// 1. BREAKOUT
function startBreakout() {
  gameMode = 'breakout';
  showMsg("GO!!", 1000);
  score = 0;
  ball = { x: W/2, y: H-150, dx: 5*scale, dy: -5*scale, r: 10 };
  bricks = [];
  for(let i=0; i<18; i++) {
    bricks.push({ x: (i%6)* (W/6)+5, y: Math.floor(i/6)*30 + 80, w: W/6-10, h: 20, active: true });
  }
}

// 2. TETRIS
function startTetris() {
  gameMode = 'tetris';
  document.getElementById('mode-name').innerText = "TETRIS";
  showMsg("TETRIS!", 1000);
  tetris.board = Array.from({length: 20}, () => Array(10).fill(0));
  spawnPiece();
}

// 3. RACING
function startRacing() {
  gameMode = 'racing';
  document.getElementById('mode-name').innerText = "DRIVE";
  showMsg("RACING!!", 1000);
  obstacles = [];
  car.x = W/2;
}

// --- Loops ---
function update() {
  if(shake > 0) shake *= 0.9;
  
  if(gameMode === 'breakout') {
    pad.x += (touchX - (pad.x + pad.w/2)) * 0.2;
    ball.x += ball.dx; ball.y += ball.dy;
    if(ball.x < 0 || ball.x > W) { ball.dx *= -1; playSound(400,0.05); }
    if(ball.y < 0) { ball.dy *= -1; playSound(400,0.05); }
    if(ball.y > H-100 && ball.x > pad.x && ball.x < pad.x+pad.w) {
      ball.dy = -Math.abs(ball.dy);
      ball.dx = (ball.x - (pad.x+pad.w/2)) * 0.2;
      playSound(600,0.05);
    }
    bricks.forEach(b => {
      if(b.active && ball.x > b.x && ball.x < b.x+b.w && ball.y > b.y && ball.y < b.y+b.h) {
        b.active = false; ball.dy *= -1; score += 10;
        shake = 10; playSound(800,0.05);
      }
    });
    if(bricks.every(b => !b.active)) startTetris();
    if(ball.y > H) ball.y = H/2, ball.dy = -5;
  }

  if(gameMode === 'tetris') {
    tetris.timer++;
    if(tetris.timer > tetris.speed) {
      if(!moveTetris(0, 1)) lockPiece();
      tetris.timer = 0;
    }
  }

  if(gameMode === 'racing') {
    car.x += (touchX - car.x) * 0.15;
    if(frame % 40 === 0) obstacles.push({x: Math.random()*W, y: -50, w: 50, h: 50});
    obstacles.forEach((o, i) => {
      o.y += 8;
      if(o.y > H) obstacles.splice(i, 1), score += 5;
      if(Math.abs(car.x - o.x) < 40 && Math.abs(H-150 - o.y) < 40) {
        shake = 20; playSound(100, 0.2, 'sawtooth');
        obstacles.splice(i, 1);
      }
    });
    if(score > 300) { gameMode = 'result'; showMsg("CLEAR!!!", 5000); }
  }
  
  frame++;
  document.getElementById('score-val').innerText = "SCORE: " + score;
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);
  
  ctx.save();
  if(shake > 1) ctx.translate(Math.random()*shake, Math.random()*shake);

  if(gameMode === 'breakout') {
    ctx.fillStyle = player.color;
    ctx.fillRect(pad.x, H-100, pad.w, 15);
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    bricks.forEach(b => {
      if(b.active) {
        ctx.fillStyle = '#ff1493';
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }
    });
  }

  if(gameMode === 'tetris') {
    const sz = 25 * scale;
    ctx.translate(W/2 - sz*5, 100);
    tetris.board.forEach((row, y) => row.forEach((v, x) => {
      ctx.strokeStyle = '#333'; ctx.strokeRect(x*sz, y*sz, sz, sz);
      if(v) { ctx.fillStyle = v; ctx.fillRect(x*sz, y*sz, sz, sz); }
    }));
    if(tetris.cur) {
      ctx.fillStyle = player.color;
      tetris.cur.shape.forEach((row, y) => row.forEach((v, x) => {
        if(v) ctx.fillRect((tetris.cur.x+x)*sz, (tetris.cur.y+y)*sz, sz, sz);
      }));
    }
  }

  if(gameMode === 'racing') {
    // Road lines
    ctx.strokeStyle = '#444'; ctx.lineWidth = 5;
    for(let i=0; i<10; i++) {
      ctx.beginPath(); ctx.moveTo(W/2, (frame*10 + i*100)%H); ctx.lineTo(W/2, (frame*10 + i*100)%H + 50); ctx.stroke();
    }
    // Car
    ctx.font = '50px Arial'; ctx.textAlign = 'center';
    ctx.fillText('🏎️', car.x, H-120);
    // Obstacles
    ctx.fillStyle = '#ff4444';
    obstacles.forEach(o => { ctx.fillText('🚧', o.x, o.y); });
  }

  ctx.restore();
}

// --- Tetris Helpers ---
const SHAPES = {
  I: [[1,1,1,1]], T: [[0,1,0],[1,1,1]], L: [[1,0],[1,0],[1,1]], O: [[1,1],[1,1]]
};
function spawnPiece() {
  const keys = Object.keys(SHAPES);
  const type = keys[Math.floor(Math.random()*keys.length)];
  tetris.cur = { x: 4, y: 0, shape: SHAPES[type] };
  if(collide()) startRacing();
}
function moveTetris(dx, dy=0) {
  tetris.cur.x += dx; tetris.cur.y += dy;
  if(collide()) { tetris.cur.x -= dx; tetris.cur.y -= dy; return false; }
  return true;
}
function hardDrop() {
  while(moveTetris(0,1)) {}
  lockPiece();
  shake = 15; playSound(200, 0.1, 'square');
}
function collide() {
  return tetris.cur.shape.some((row, y) => row.some((v, x) => {
    if(!v) return false;
    let nx = tetris.cur.x + x, ny = tetris.currentY + y; // Fixed typo here
    return nx<0 || nx>=10 || tetris.cur.y+y >= 20 || tetris.board[tetris.cur.y+y][nx];
  }));
}
function lockPiece() {
  tetris.cur.shape.forEach((row, y) => row.forEach((v, x) => {
    if(v) tetris.board[tetris.cur.y+y][tetris.cur.x+x] = player.color;
  }));
  let lines = 0;
  for(let y=19; y>=0; y--) {
    if(tetris.board[y].every(v => v)) {
      tetris.board.splice(y, 1);
      tetris.board.unshift(Array(10).fill(0));
      lines++; y++;
    }
  }
  if(lines > 0) { score += lines*100; shake = 20; playSound(1000, 0.1); if(score > 200) startRacing(); }
  spawnPiece();
}

// --- Utils ---
function showMsg(t, dur) {
  msgEl.innerText = t;
  setTimeout(() => msgEl.innerText = "", dur);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
