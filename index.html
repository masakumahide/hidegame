<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヒデちゃん＆猫ちゃん BREAKOUT</title>
    <style>
        :root { --p: #ff69b4; --bg: #fff0f5; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: var(--p); font-weight: bold; pointer-events: none; z-index: 5; }
        #menu { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .char-btn { padding: 15px; border: 2px solid var(--p); border-radius: 15px; background: white; text-align: center; cursor: pointer; }
        .char-btn span { font-size: 30px; }
        .skill-info { font-size: 10px; color: #666; }
        #skill-btn { position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; border-radius: 50%; background: gold; border: 4px solid white; font-size: 30px; display: none; z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>LIFE: <span id="life">3</span></div>
        <div id="char-display"></div>
    </div>
    <div id="menu">
        <h2 style="color:var(--p)">キャラをえらんでね！</h2>
        <div class="char-grid" id="charGrid"></div>
    </div>
    <button id="skill-btn">✨</button>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const charGrid = document.getElementById("charGrid");
    const skillBtn = document.getElementById("skill-btn");
    
    let w, h, score, life, ball, paddle, bricks, gameActive = false, selectedChar;

    const CHARS = [
        { name: "ヒデ", icon: "😄", skill: "全消し", color: "#ffd700", action: () => { bricks.forEach(b => b.alive = false); score += 500; }},
        { name: "ネコ", icon: "🐱", skill: "3個に増える", color: "#ffb6c1", action: () => { ball.vx = 5; balls.push({x:ball.x, y:ball.y, vx:-5, vy:ball.vy, r:ball.r}); }},
        { name: "クマ", icon: "🐻", skill: "パドル巨大化", color: "#deb887", action: () => { paddle.w = 250; setTimeout(() => paddle.w = 100, 5000); }},
        { name: "ウサ", icon: "🐰", skill: "スロー", color: "#98fb98", action: () => { ball.vx *= 0.5; ball.vy *= 0.5; setTimeout(() => {ball.vx *= 2; ball.vy *= 2;}, 5000); }}
    ];

    let balls = [];

    function init(charIndex) {
        selectedChar = CHARS[charIndex];
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        score = 0; life = 3;
        paddle = { w: 100, h: 15, x: w / 2 - 50 };
        ball = { x: w / 2, y: h / 2, vx: 5, vy: 5, r: 10 };
        balls = [ball];
        createBricks();
        gameActive = true;
        document.getElementById("menu").style.display = "none";
        document.getElementById("char-display").innerText = selectedChar.icon;
        skillBtn.style.display = "block";
        updateUI();
        draw();
    }

    function createBricks() {
        bricks = [];
        const rows = 4, cols = 6, gap = 5;
        const bw = (w - (gap * (cols + 1))) / cols;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                bricks.push({ x: gap + c * (bw + gap), y: 60 + r * (30 + gap), w: bw, h: 25, alive: true });
            }
        }
    }

    function updateUI() {
        document.getElementById("score").innerText = score;
        document.getElementById("life").innerText = life;
    }

    function draw() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, w, h);

        // パドル
        ctx.fillStyle = selectedChar.color;
        ctx.fillRect(paddle.x, h - 100, paddle.w, paddle.h);
        ctx.fillText(selectedChar.icon, paddle.x + paddle.w/2 - 10, h - 110);

        // ブロック
        bricks.forEach(b => {
            if (!b.alive) return;
            ctx.fillStyle = "#ff69b4";
            ctx.fillRect(b.x, b.y, b.w, b.h);
        });

        // ボール移動と描画
        balls.forEach((b, idx) => {
            b.x += b.vx; b.y += b.vy;
            if (b.x < 0 || b.x > w) b.vx *= -1;
            if (b.y < 0) b.vy *= -1;

            if (b.y > h - 100 && b.y < h - 85 && b.x > paddle.x && b.x < paddle.x + paddle.w) {
                b.vy = -Math.abs(b.vy);
            }

            bricks.forEach(br => {
                if (br.alive && b.x > br.x && b.x < br.x + br.w && b.y > br.y && b.y < br.y + br.h) {
                    br.alive = false; b.vy *= -1; score += 10; updateUI();
                }
            });

            ctx.fillStyle = "#4b2346";
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();

            if (b.y > h) balls.splice(idx, 1);
        });

        if (balls.length === 0) {
            life--; updateUI();
            if (life <= 0) { gameActive = false; location.reload(); }
            else { ball = { x: w / 2, y: h / 2, vx: 5, vy: 5, r: 10 }; balls = [ball]; }
        }

        if (bricks.every(b => !b.alive)) { createBricks(); }

        requestAnimationFrame(draw);
    }

    // メニュー作成
    CHARS.forEach((c, i) => {
        const btn = document.createElement("div");
        btn.className = "char-btn";
        btn.innerHTML = `<span>${c.icon}</span><br>${c.name}<br><div class="skill-info">${c.skill}</div>`;
        btn.onclick = () => init(i);
        charGrid.appendChild(btn);
    });

    window.addEventListener("touchmove", e => { paddle.x = e.touches[0].clientX - paddle.w / 2; });
    window.addEventListener("mousemove", e => { paddle.x = e.clientX - paddle.w / 2; });
    skillBtn.onclick = () => { selectedChar.action(); skillBtn.style.opacity = 0.5; skillBtn.disabled = true; };

</script>
</body>
</html>
