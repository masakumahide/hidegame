<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヒデちゃん&クマちゃん ブロック崩し DX</title>
<style>
  :root{
    --bg1:#ffd9ea;
    --bg2:#f6bfd8;
    --bg3:#ee9fc5;
    --ink:#6f2858;
    --pink:#ff63ad;
    --yellow:#ffd84d;
    --shadow:0 10px 24px rgba(0,0,0,.18);
  }
  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    font-family:
      "Hiragino Maru Gothic ProN",
      "Hiragino Sans",
      "Yu Gothic",
      system-ui,
      sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  }
  #app{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    touch-action:none;
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
  }

  #hud{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    z-index:20;
    pointer-events:none;
  }
  .col{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .panel{
    min-width:96px;
    padding:9px 12px;
    border-radius:18px;
    background:rgba(255,255,255,.58);
    border:1px solid rgba(255,255,255,.92);
    box-shadow:var(--shadow);
    backdrop-filter:blur(6px);
  }
  .label{
    font-size:11px;
    font-weight:700;
    color:#9e5a83;
    margin-bottom:4px;
  }
  .value{
    font-size:17px;
    font-weight:900;
    color:var(--ink);
    white-space:nowrap;
  }

  #catBadge{
    position:absolute;
    top:8px;
    left:50%;
    transform:translateX(-50%);
    width:80px;
    height:80px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:0 10px 24px rgba(255,90,165,.22);
    z-index:26;
    transition:transform .18s ease, box-shadow .18s ease;
    pointer-events:none;
  }
  #catBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }
  #catBadgeFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
  }

  #catTalk{
    position:absolute;
    top:92px;
    left:50%;
    transform:translateX(-50%);
    z-index:27;
    font-size:12px;
    font-weight:900;
    color:#fff6a8;
    text-shadow:0 2px 8px rgba(0,0,0,.28);
    white-space:nowrap;
    pointer-events:none;
  }

  #message{
    position:absolute;
    left:50%;
    transform:translateX(-50%) scale(1);
    z-index:25;
    font-size:clamp(24px, 7vw, 42px);
    font-weight:900;
    color:var(--yellow);
    text-shadow:0 0 14px rgba(0,0,0,.22);
    pointer-events:none;
    opacity:0;
    transition:opacity .18s ease, transform .18s ease;
    white-space:nowrap;
  }

  #comboDisplay{
    position:absolute;
    z-index:24;
    min-width:88px;
    padding:10px 12px;
    border-radius:18px;
    background:rgba(255,255,255,.65);
    border:1px solid rgba(255,255,255,.92);
    box-shadow:var(--shadow);
    backdrop-filter:blur(6px);
    text-align:center;
    opacity:0;
    transform:translateY(-6px) scale(.92);
    transition:opacity .14s ease, transform .14s ease;
    pointer-events:none;
  }
  #comboDisplay.show{
    opacity:1;
    transform:translateY(0) scale(1);
  }
  #comboLabel{
    font-size:10px;
    font-weight:900;
    color:#9e5a83;
    letter-spacing:.06em;
  }
  #comboValue{
    margin-top:2px;
    font-size:26px;
    line-height:1;
    font-weight:900;
    color:#ff5aa5;
    text-shadow:0 0 12px rgba(255,90,165,.16);
  }

  #catSkillBadge{
    position:absolute;
    left:14px;
    bottom:126px;
    width:62px;
    height:62px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:var(--shadow);
    z-index:21;
    opacity:0;
    transform:scale(.8);
    transition:opacity .18s ease, transform .18s ease;
    pointer-events:none;
  }
  #catSkillBadge.show{
    opacity:1;
    transform:scale(1);
  }
  #catSkillBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }
  #catSkillFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
  }

  #skillsArea{
    position:absolute;
    left:14px;
    right:14px;
    bottom:12px;
    z-index:24;
  }
  #skillButton{
    width:100%;
    border:none;
    border-radius:20px;
    padding:12px 14px;
    background:linear-gradient(180deg,rgba(255,255,255,.74),rgba(255,255,255,.5));
    border:1px solid rgba(255,255,255,.96);
    box-shadow:var(--shadow);
    color:var(--ink);
    font:inherit;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    min-height:62px;
  }
  #skillButton.disabled{
    opacity:.55;
    filter:grayscale(.75);
  }
  #skillLeft{
    display:flex;
    align-items:center;
    gap:10px;
  }
  #skillEmoji{
    font-size:26px;
    line-height:1;
  }
  #skillTextWrap{
    text-align:left;
  }
  #skillName{
    font-size:16px;
    font-weight:900;
    line-height:1.1;
  }
  #skillDesc{
    font-size:11px;
    color:#8f5377;
    margin-top:3px;
  }
  #skillReady{
    font-size:11px;
    font-weight:900;
    color:#b65586;
    white-space:nowrap;
  }
  #skillLabel{
    font-size:12px;
    color:#fff;
    margin:8px 0 6px;
    text-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  #skillBar{
    height:16px;
    border-radius:999px;
    background:rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.65);
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  #skillFill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#72e5ff,#9cff8b,#ffe56a);
    border-radius:999px;
    transition:width .1s linear;
    box-shadow:0 0 16px rgba(126,255,211,.6);
  }

  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:40;
    background:rgba(255,228,239,.34);
    backdrop-filter:blur(4px);
  }
  #overlay.hidden{
    display:none;
  }
  .card{
    width:min(94vw,460px);
    padding:22px 18px 20px;
    border-radius:28px;
    background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));
    border:1px solid rgba(255,255,255,.92);
    box-shadow:0 20px 40px rgba(0,0,0,.22);
    text-align:center;
    color:var(--ink);
  }
  .titlePhoto{
    width:104px;
    height:104px;
    margin:0 auto 12px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(255,255,255,.95);
    box-shadow:0 10px 24px rgba(255,90,165,.22);
    background:rgba(255,255,255,.35);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:56px;
  }
  .titlePhoto img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .bigCat{
    font-size:72px;
    line-height:1;
    margin-bottom:10px;
  }
  .title{
    font-size:clamp(28px, 7vw, 42px);
    font-weight:900;
    line-height:1.14;
    color:#ff5aa5;
    margin-bottom:10px;
    text-shadow:0 0 14px rgba(255,90,165,.2);
  }
  .sub{
    font-size:14px;
    line-height:1.6;
    color:#8f5377;
    margin-bottom:16px;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:16px 28px;
    font-size:22px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(180deg,#ff60ae,#ff2c92);
    box-shadow:0 8px 0 #b81f69, 0 10px 16px rgba(0,0,0,.16);
  }
  .btn:active{
    transform:translateY(4px);
    box-shadow:0 4px 0 #b81f69, 0 8px 12px rgba(0,0,0,.14);
  }
  .charGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:16px 0 12px;
  }
  .charBtn{
    border:none;
    border-radius:20px;
    padding:14px 10px;
    background:rgba(255,255,255,.52);
    border:2px solid rgba(255,255,255,.78);
    color:var(--ink);
    box-shadow:var(--shadow);
    font:inherit;
  }
  .charBtn.selected{
    border-color:#ff63ad;
    box-shadow:0 0 0 3px rgba(255,99,173,.18), var(--shadow);
    transform:scale(1.02);
  }
  .charBtn .emoji{
    font-size:40px;
    line-height:1.1;
  }
  .charBtn .name{
    font-size:17px;
    font-weight:900;
    margin-top:4px;
  }
  .charBtn .skill{
    font-size:11px;
    line-height:1.45;
    color:#8f5377;
    margin-top:4px;
  }
  .rankBadge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:52px;
    height:52px;
    border-radius:999px;
    background:linear-gradient(180deg,#fff8c8,#ffd84d);
    color:#7a315d;
    font-size:28px;
    font-weight:900;
    box-shadow:0 10px 18px rgba(0,0,0,.14);
    margin:8px auto 12px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="col">
      <div class="panel"><div class="label">SCORE</div><div class="value" id="scoreText">0</div></div>
      <div class="panel"><div class="label">LIFE</div><div class="value" id="lifeText">3</div></div>
    </div>
    <div class="col">
      <div class="panel"><div class="label">STAGE</div><div class="value" id="stageText">1 / 10</div></div>
      <div class="panel"><div class="label">BEST</div><div class="value" id="bestText">0</div></div>
    </div>
  </div>

  <div id="catBadge">
    <img id="catBadgeImg" alt="kuma">
    <div id="catBadgeFallback">🐱</div>
  </div>

  <div id="catSkillBadge">
    <img id="catSkillImg" alt="kuma">
    <div id="catSkillFallback">🐱</div>
  </div>

  <div id="catTalk">にゃっ</div>
  <div id="message"></div>

  <div id="comboDisplay">
    <div id="comboLabel">COMBO</div>
    <div id="comboValue">x3</div>
  </div>

  <div id="skillsArea">
    <button id="skillButton" class="disabled">
      <div id="skillLeft">
        <div id="skillEmoji">❔</div>
        <div id="skillTextWrap">
          <div id="skillName">チャージ中</div>
          <div id="skillDesc">ゲージをためてね</div>
        </div>
      </div>
      <div id="skillReady">RANDOM</div>
    </button>
    <div id="skillLabel">左右ドラッグで移動 / タップで再発射 / SKILLで必殺技</div>
    <div id="skillBar"><div id="skillFill"></div></div>
  </div>

  <div id="overlay"></div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const canvas = $("game");
  const ctx = canvas.getContext("2d");

  const ui = {
    app:$("app"), hud:$("hud"), overlay:$("overlay"),
    score:$("scoreText"), life:$("lifeText"), stage:$("stageText"), best:$("bestText"),
    catBadge:$("catBadge"), catBadgeImg:$("catBadgeImg"), catBadgeFallback:$("catBadgeFallback"),
    catSkillBadge:$("catSkillBadge"), catSkillImg:$("catSkillImg"), catSkillFallback:$("catSkillFallback"),
    catTalk:$("catTalk"), message:$("message"),
    combo:$("comboDisplay"), comboValue:$("comboValue"),
    skillButton:$("skillButton"), skillEmoji:$("skillEmoji"), skillName:$("skillName"), skillDesc:$("skillDesc"), skillFill:$("skillFill"),
    skillsArea:$("skillsArea")
  };

  const DPR = Math.min(2, window.devicePixelRatio || 1);
  const MAX_STAGE = 10;
  const BOSS_STAGES = new Set([3,6,10]);
  const CAT_FILES = ["./cat.png.JPG","./cat.png.jpg","./cat.JPG","./cat.jpg","./cat.jpeg","./cat.png"];
  const WORDS = ["夢","仕事","健康","旅行","筋トレ","ラーメン","貯金","ごほうび","温泉","締切","休日","猫","会議","水","読書","散歩","チョコ","野菜"];
  const COLORS = ["#ffd7a8","#bfe7ff","#c8ffd8","#e8c8ff","#ffd4e5","#fff0b8"];

  const CHARS = [
    { id:"hide", emoji:"😄", name:"ヒデ", perk:"金色 / 幅広 + スコア10%UP" },
    { id:"cat", emoji:"🐱", name:"ネコ", perk:"ピンク / ゲージ速い + アイテム出やすい" },
    { id:"bear", emoji:"🐻", name:"クマ", perk:"青 / ビッグ長い + 安定" },
    { id:"rabbit", emoji:"🐰", name:"ウサ", perk:"緑 / 球やさしめ + 連射速い" }
  ];

  const SKILLS = [
    { type:"cat", emoji:"🐱", name:"猫ラッシュ", desc:"猫が飛んできて3ボール化" },
    { type:"magnet", emoji:"🧲", name:"ぴたっ", desc:"1回だけ吸着" },
    { type:"big", emoji:"🧸", name:"ビッグ", desc:"パドル巨大化" }
  ];

  const ITEMS = [
    { type:"gauge", emoji:"⚡" },
    { type:"score", emoji:"💎" },
    { type:"heal", emoji:"💖" },
    { type:"big", emoji:"⬌" },
    { type:"rapid", emoji:"🔫" },
    { type:"clone", emoji:"🪞" }
  ];

  const BOSS_META = {
    beam:{ top:"#ffd4e8", bottom:"#ff4f93", aura:"rgba(255,100,170,.55)", beamGap:2.0, beamWidth:18, attackGap:2.2 },
    zigzag:{ top:"#d6e5ff", bottom:"#7265ff", aura:"rgba(130,120,255,.56)", beamGap:1.85, beamWidth:16, attackGap:1.95 },
    warp:{ top:"#d7fff0", bottom:"#37c6ad", aura:"rgba(100,255,220,.48)", beamGap:1.8, beamWidth:20, attackGap:1.8 }
  };

  const PLAY_THEME = [
    [62,66,69],[57,61,64],[59,62,66],[54,57,61],
    [55,59,62],[62,66,69],[55,59,62],[57,61,64]
  ];
  const CUTE_THEME = [
    [69,73,76],[67,71,74],[66,69,73],[64,67,71],
    [62,66,69],[64,67,71],[66,69,73],[67,71,74]
  ];
  const STORY_THEME = [
    [64,67,71],[62,66,69],[60,64,67],[62,65,69],
    [64,67,71],[67,71,74],[69,73,76],[71,74,78]
  ];
  const BOSS_THEME = [
    [38,45,50],[36,43,48],[35,42,47],[33,40,45],
    [31,38,43],[30,37,42],[29,36,41],[28,35,40]
  ];

  const rand = (a,b)=>Math.random()*(b-a)+a;
  const randint = (a,b)=>Math.floor(rand(a,b+1));
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const midi = m=>440*Math.pow(2,(m-69)/12);

  let W=0, H=0;
  let view={x:0,y:0,w:0,h:0};
  let field={x:16,y:170,w:300,h:400};

  let state="opening";
  let stage=1;
  let score=0;
  let best=Number(localStorage.getItem("hidecat_fun_best_v17")||0);
  let lives=3;
  let skill=0;
  let stageMode="breakout";
  let selectedChar=CHARS[1];
  let currentSkill=null;

  let pointerX=0;
  let shake=0;
  let damageFlash=0;
  let worldFlash=0;
  let lastTime=0;
  let openingTime=0;
  let storyTime=0;
  let celebrationTime=0;
  let sayLockUntil=0;
  let speechLockUntil=0;

  let paddle={x:0,y:0,w:116,h:18};
  let balls=[], blocks=[], items=[], particles=[], rings=[], stars=[], shots=[];
  let boss=null;

  let paddleBoostUntil=0;
  let magnetUntil=0;
  let magnetCharges=0;
  let rapidUntil=0;
  let rapidCooldown=0;

  let catDash={active:false,x:-180,y:0,rot:0,until:0,trail:[]};
  let stageData={rows:0,cols:0,variant:0};

  let stats={combo:0,comboTimer:0,maxCombo:0,bosses:0,items:0,damage:0,finalBoss:false};

  let catImg=new Image(), catReady=false;
  let audioCtx=null, audioPrimed=false, musicStep=0, musicAccum=0, musicKey="";

  function currentPerks(){
    const base=Math.min(5.9,4.05+(stage-1)*0.12);
    return {
      paddle:selectedChar.id==="hide"?132:selectedChar.id==="bear"?120:116,
      skillGain:selectedChar.id==="cat"?1.18:1,
      itemDrop:selectedChar.id==="cat"?0.12:0,
      scoreBonus:selectedChar.id==="hide"?1.10:1,
      bigDuration:selectedChar.id==="bear"?1.55:1,
      bigWidth:selectedChar.id==="bear"?18:0,
      launch:selectedChar.id==="rabbit"?base-0.22:base,
      rapid:selectedChar.id==="rabbit"?0.80:1,
      control:selectedChar.id==="rabbit"?1.12:1
    };
  }

  function paddleTheme(){
    if(selectedChar.id==="hide") return {top:"#fff3a5",bottom:"#ffbd52",accent:"#ffdf63"};
    if(selectedChar.id==="cat") return {top:"#ffd4ea",bottom:"#ff7fb6",accent:"#ff63ad"};
    if(selectedChar.id==="bear") return {top:"#d7ebff",bottom:"#72b6ff",accent:"#7ca9ff"};
    return {top:"#dbffd9",bottom:"#7de188",accent:"#7fe38f"};
  }

  function comboTempo(){
    if(stats.combo>=8) return 1.22;
    if(stats.combo>=4) return 1.10;
    return 1;
  }

  function unlockAudio(){
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
    audioPrimed=true;
  }

  function tone(t,f,d,type="triangle",v=0.03){
    if(!audioCtx) return;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=type;
    osc.frequency.setValueAtTime(f,t);
    gain.gain.setValueAtTime(0.0001,t);
    gain.gain.linearRampToValueAtTime(v,t+0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+d);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t+d+0.03);
  }

  function playTap(freq=520){ if(audioCtx) tone(audioCtx.currentTime,freq,0.08,"square",0.02); }
  function playDamage(){
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    tone(t,170,0.16,"sawtooth",0.035);
    tone(t+0.05,125,0.22,"sawtooth",0.03);
  }
  function playExplosion(){
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    tone(t,110,0.20,"sawtooth",0.055);
    tone(t+0.01,80,0.28,"triangle",0.05);
    tone(t+0.02,52,0.34,"sawtooth",0.04);
  }
  function playMeow(){
    if(!audioCtx) return;
    const now=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type="sawtooth";
    osc.frequency.setValueAtTime(680,now);
    osc.frequency.exponentialRampToValueAtTime(430,now+0.16);
    osc.frequency.exponentialRampToValueAtTime(520,now+0.30);
    gain.gain.setValueAtTime(0.0001,now);
    gain.gain.linearRampToValueAtTime(0.04,now+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001,now+0.33);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now+0.35);
  }
  function playPaddleNyah(){
    if(!audioCtx) return;
    const now=audioCtx.currentTime;
    const o1=audioCtx.createOscillator(), o2=audioCtx.createOscillator();
    const g1=audioCtx.createGain(), g2=audioCtx.createGain();
    o1.type="triangle"; o2.type="sine";
    o1.frequency.setValueAtTime(980,now);
    o1.frequency.exponentialRampToValueAtTime(720,now+0.06);
    o1.frequency.exponentialRampToValueAtTime(820,now+0.12);
    o2.frequency.setValueAtTime(1480,now);
    o2.frequency.exponentialRampToValueAtTime(1080,now+0.08);
    g1.gain.setValueAtTime(0.0001,now);
    g1.gain.linearRampToValueAtTime(0.032,now+0.01);
    g1.gain.exponentialRampToValueAtTime(0.0001,now+0.17);
    g2.gain.setValueAtTime(0.0001,now);
    g2.gain.linearRampToValueAtTime(0.012,now+0.01);
    g2.gain.exponentialRampToValueAtTime(0.0001,now+0.13);
    o1.connect(g1); o2.connect(g2); g1.connect(audioCtx.destination); g2.connect(audioCtx.destination);
    o1.start(now); o2.start(now); o1.stop(now+0.18); o2.stop(now+0.15);

    if("speechSynthesis" in window && performance.now()>speechLockUntil){
      speechLockUntil=performance.now()+120;
      try{
        speechSynthesis.cancel();
        const ut=new SpeechSynthesisUtterance("ニヤッ");
        ut.lang="ja-JP";
        ut.rate=1.2;
        ut.pitch=1.8;
        ut.volume=0.35;
        speechSynthesis.speak(ut);
      }catch(e){}
    }
  }

  function playBossOrb(){ if(audioCtx){ const t=audioCtx.currentTime; tone(t,330,0.10,"square",0.03); tone(t+0.02,240,0.16,"triangle",0.022);} }

  function averageBallSpeed(){
    const moving=balls.filter(b=>!b.stuck);
    if(!moving.length) return currentPerks().launch;
    return moving.reduce((s,b)=>s+Math.hypot(b.vx,b.vy),0)/moving.length;
  }

  function currentMusicMode(){
    if(state==="opening"||state==="title") return "cute";
    if(state==="story") return "story";
    if(state==="celebration") return "celebrate";
    if(state==="playing" && stageMode==="boss") return "boss";
    if(state==="playing") return "play";
    return "none";
  }

  function resetMusicIfNeeded(){
    const key=`${state}:${stageMode}:${stage}`;
    if(key!==musicKey){
      musicKey=key;
      musicStep=0;
      musicAccum=0;

  function tickCute(chords,lively=1){
    const chord=chords[Math.floor(musicStep/8)%chords.length];
    const step=musicStep%8;
    const t=audioCtx.currentTime+0.01;
    const arp=[0,1,2,1,2,1,0,1];
    const note=chord[arp[step]]+12;
    tone(t,midi(note),0.12,"square",0.011*lively);
    tone(t+0.015,midi(note+12),0.07,"sine",0.006*lively);
    if(step===0||step===4){
      tone(t,midi(chord[0]-12),0.22,"triangle",0.020*lively);
      tone(t+0.02,midi(chord[1]),0.16,"sine",0.010*lively);
    }
    if(step===2||step===6) tone(t,2200,0.03,"square",0.004*lively);
    if(step===7) tone(t+0.02,midi(chord[2]+19),0.11,"triangle",0.007*lively);
  }

  function tickMusic(){
    if(!audioCtx || !audioPrimed) return;
    const mode=currentMusicMode();
    if(mode==="none") return;

    if(mode==="cute") tickCute(CUTE_THEME,1.15);
    else if(mode==="story") tickCute(STORY_THEME,0.95);
    else if(mode==="celebrate") tickCute(CUTE_THEME,1.35);
    else if(mode==="play"){
      const chord=PLAY_THEME[Math.floor(musicStep/8)%PLAY_THEME.length];
      const step=musicStep%8;
      const t=audioCtx.currentTime+0.01;
      const arp=[0,1,2,1,2,1,0,1];
      const note=chord[arp[step]]+12;
      tone(t,midi(note),0.13,"square",0.009);
      tone(t+0.015,midi(note+12),0.07,"sine",0.005);
      if(step===0||step===4){
        tone(t,midi(chord[0]-24),0.26,"sine",0.032);
        tone(t,midi(chord[1]),0.18,"triangle",0.008);
      }
      if(step===2||step===6) tone(t,2600,0.025,"square",0.0038);
    } else if(mode==="boss"){
      const chord=BOSS_THEME[Math.floor(musicStep/8)%BOSS_THEME.length];
      const step=musicStep%8;
      const t=audioCtx.currentTime+0.01;
      const [low,mid,high]=chord;
      if(step===0||step===4){
        tone(t,midi(low-24),0.46,"sawtooth",0.05);
        tone(t+0.01,midi(low-12),0.36,"sawtooth",0.04);
        tone(t+0.03,midi(low),0.24,"triangle",0.026);
      }
      if(step===1||step===5){
        tone(t,midi(high+12),0.12,"square",0.014);
        tone(t+0.01,midi(high+18),0.08,"square",0.010);
      }
      if(step===2||step===6){
        tone(t,midi(mid),0.22,"triangle",0.022);
        tone(t+0.01,midi(high),0.20,"square",0.014);
      }
      if(step===3||step===7){
        tone(t,90,0.12,"sawtooth",0.032);
        tone(t+0.02,130,0.08,"triangle",0.018);
      }
    }
    musicStep++;
  }

  function updateMusic(dt){
    if(!audioCtx || !audioPrimed) return;
    const mode=currentMusicMode();
    if(mode==="none") return;

    let interval=0.22;
    if(mode==="cute") interval=0.17;
    else if(mode==="story") interval=0.20;
    else if(mode==="celebrate") interval=0.15;
    else if(mode==="play"){
      interval=Math.max(0.16,Math.min(0.26,0.24-(averageBallSpeed()-6.0)*0.01));
      interval/=comboTempo();
    } else if(mode==="boss"){
      interval=Math.max(0.17,Math.min(0.30,0.26-(averageBallSpeed()-5.2)*0.008));
      interval/=comboTempo();
    }

    musicAccum+=dt;
    while(musicAccum>=interval){
      musicAccum-=interval;
      tickMusic();
    }
  }

  function computeView(){
    const margin=Math.max(8,Math.min(24,W*0.03));
    const usable=W-margin*2;
    let portraitW=usable;
    if(W>H*0.9){
      portraitW=Math.min(usable,Math.max(360,Math.min(520,H*0.62)));
    } else if(W>540){
      portraitW=Math.min(usable,520);
    }
    view.w=portraitW;
    view.h=H;
    view.x=Math.floor((W-view.w)/2);
    view.y=0;
  }

  function layoutUI(){
    const left=view.x+10;
    const right=W-(view.x+view.w)+10;
    ui.hud.style.left=`${left}px`;
    ui.hud.style.right=`${right}px`;
    ui.skillsArea.style.left=`${view.x+14}px`;
    ui.skillsArea.style.right=`${W-(view.x+view.w)+14}px`;
    ui.catBadge.style.left=`${view.x+view.w/2}px`;
    ui.catTalk.style.left=`${view.x+view.w/2}px`;
    ui.catSkillBadge.style.left=`${view.x+14}px`;
    ui.combo.style.right=`${W-(view.x+view.w)+14}px`;

    const hudRect=ui.hud.getBoundingClientRect();
    const badgeRect=ui.catBadge.getBoundingClientRect();
    const talkRect=ui.catTalk.getBoundingClientRect();
    const skillsRect=ui.skillsArea.getBoundingClientRect();
    const appRect=ui.app.getBoundingClientRect();

    const topSafe=Math.max(
      hudRect.bottom - appRect.top,
      badgeRect.bottom - appRect.top,
      talkRect.bottom - appRect.top

    ui.combo.style.top=`${topSafe}px`;

    field.x=view.x+14;
    field.y=Math.max(182,topSafe+48);

    ui.message.style.top=`${field.y-48}px`;

  function resize(){
    W=window.innerWidth;

    canvas.width=Math.floor(W*DPR);
    canvas.height=Math.floor(H*DPR);
    canvas.style.width=W+"px";
    canvas.style.height=H+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);

    layoutUI();

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawImageCover(img,x,y,w,h){
    const ir=img.width/img.height;
    const br=w/h;
    let dw,dh,dx,dy;
    if(ir>br){
      dh=h;
      dw=h*ir;
      dx=x-(dw-w)/2;
      dy=y;
    } else {
      dw=w;
      dh=w/ir;
      dx=x;
      dy=y-(dh-h)/2;
    }
    ctx.drawImage(img,dx,dy,dw,dh);
  }

  function drawSideMats(a,b){
    if(view.w>=W-4) return;
    const leftW=view.x;
    const rightX=view.x+view.w;
    const rightW=W-rightX;
    if(b){
      const lg=ctx.createLinearGradient(0,0,view.x,0);
      lg.addColorStop(0,a);
      lg.addColorStop(1,b);
      ctx.fillStyle=lg;
      ctx.fillRect(0,0,leftW,H);

      const rg=ctx.createLinearGradient(rightX,0,W,0);
      rg.addColorStop(0,b);
      rg.addColorStop(1,a);
      ctx.fillStyle=rg;
      ctx.fillRect(rightX,0,rightW,H);
    } else {
      ctx.fillStyle=a;
      ctx.fillRect(0,0,leftW,H);
      ctx.fillRect(rightX,0,rightW,H);
    }
  }

  function drawBackground(){
    let g;
    if(stageMode==="boss"){
      g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,"#180d1f");
      g.addColorStop(.35,"#2a1433");
      g.addColorStop(.65,"#2f1239");
      g.addColorStop(1,"#09070f");
    } else {
      g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,"#ffd8ea");
      g.addColorStop(.52,"#f3bad5");
      g.addColorStop(1,"#ea96bd");
    }
    ctx.fillStyle=g;
    ctx.fillRect(0,0,W,H);

    if(view.w < W-4){
      ctx.fillStyle=stageMode==="boss" ? "rgba(0,0,0,.42)" : "rgba(255,255,255,.18)";
      ctx.fillRect(0,0,view.x,H);
      ctx.fillRect(view.x+view.w,0,W-(view.x+view.w),H);
    }

    for(const s of stars){
      ctx.globalAlpha=stageMode==="boss" ? s.a*1.2 : s.a;
      ctx.fillStyle=stageMode==="boss" ? "#d8d9ff" : "#fff";
      ctx.beginPath();
      ctx.arc(s.x,s.y,stageMode==="boss" ? s.r*1.1 : s.r,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;

    if(stageMode==="boss"){
      const vg=ctx.createRadialGradient(view.x+view.w/2,H/2,120,view.x+view.w/2,H/2,Math.max(view.w,H)*0.78);
      vg.addColorStop(0,"rgba(0,0,0,0)");
      vg.addColorStop(1,"rgba(0,0,0,.50)");
      ctx.fillStyle=vg;
      ctx.fillRect(0,0,W,H);
    }

    if(catReady){
      ctx.save();
      ctx.globalAlpha=stageMode==="boss" ? 0.16 : 0.28;
      roundRectPath(field.x,field.y,field.w,field.h,26);
      ctx.clip();
      drawImageCover(catImg,field.x,field.y,field.w,field.h);
      ctx.restore();
    }

    ctx.strokeStyle=stageMode==="boss" ? "rgba(255,255,255,.38)" : "rgba(255,255,255,.58)";
    ctx.lineWidth=2;
    roundRectPath(field.x,field.y,field.w,field.h,26);
    ctx.stroke();

    const warn=getFallWarning();
    if(warn>0){
      const pulse=0.45+0.55*(0.5+0.5*Math.sin(performance.now()/120));
      const alpha=warn*pulse*0.48;
      const bandH=22+warn*10;
      const y=field.y+field.h-bandH;
      const grad=ctx.createLinearGradient(0,y,0,y+bandH);
      grad.addColorStop(0,"rgba(255,70,90,0)");
      grad.addColorStop(1,`rgba(255,40,70,${alpha})`);
      ctx.fillStyle=grad;
      ctx.fillRect(field.x+6,y,field.w-12,bandH);
      ctx.strokeStyle=`rgba(255,120,140,${Math.min(.85,alpha+.15)})`;
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(field.x+10,field.y+field.h-4);
      ctx.lineTo(field.x+field.w-10,field.y+field.h-4);
      ctx.stroke();
    }

    if(worldFlash>0){
      ctx.fillStyle=`rgba(255,255,255,${worldFlash*0.22})`;
      ctx.fillRect(0,0,W,H);
    }
    if(damageFlash>0){
      ctx.fillStyle=`rgba(255,80,90,${0.22*damageFlash})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawIdleBackground(){
    const prev=stageMode;
    stageMode="breakout";
    drawBackground();
    stageMode=prev;
  }

  function buildStars(){
    stars=[];
    for(let i=0;i<68;i++){
      stars.push({
        x:Math.random()*W,
        y:Math.random()*H,
        r:Math.random()*2+0.5,
        a:Math.random()*0.6+0.1
      });
    }
  }

  function getFallWarning(){
    if(state!=="playing" || !balls.length) return 0;
    const threshold=field.y+field.h*0.66;
    let m=0;
    for(const b of balls){
      if(b.stuck) continue;
      const over=clamp((b.y-threshold)/(field.y+field.h-threshold),0,1);
      if(over>m) m=over;
    }
    return m;
  }

      y:field.y+field.h-92,
      vx:vx ?? (Math.random()>0.5 ? sp*0.52 : -sp*0.52),

      trail:[],
      stuck:false,

  function resetBalls(single=false){

  function cloneBalls(){
    if(stageMode==="boss"){
      if(boss){
        boss.hp=Math.max(0,boss.hp-2);

        registerCombo();
        burst(boss.x+boss.w/2,boss.y+boss.h/2,"⭐",12);
        if(stage===10 && Math.random()<0.14) spawnItem(boss.x+boss.w/2,boss.y+boss.h/2);
        if(boss.hp<=0){
          addScore(120);
          stats.bosses++;
          if(stage===10) stats.finalBoss=true;
          boss=null;
          goNextStage();
        }
      }
      return;
    }

    const active=balls.filter(b=>!b.stuck);
    if(!active.length) return;
    const base=active[0];
    while(balls.length<3){
      const angle=balls.length===1 ? -0.72 : 0.72;
      const sp=Math.max(currentPerks().launch,Math.hypot(base.vx,base.vy));
      balls.push({
        x:base.x,y:base.y,
        vx:Math.sin(angle)*sp,
        vy:-Math.cos(angle)*sp,
        r:9,trail:[],stuck:false,stuckOffsetX:0
      });
    }
  }

  function blockScore(b){
    if(b.type==="bomb") return 16;
    return b.maxHp>=3 ? 14 : b.maxHp===2 ? 12 : 10;
  }

  function pointRectDistance(px,py,b){
    const nx=Math.max(b.x,Math.min(px,b.x+b.w));
    const ny=Math.max(b.y,Math.min(py,b.y+b.h));
    return Math.hypot(px-nx,py-ny);
  }

  function destroyBlock(b, byExplosion=false){
    if(!b.alive || b.type==="wall") return;
    b.alive=false;
    const mx=b.x+b.w/2, my=b.y+b.h/2;
    if(b.type==="bomb" && !byExplosion){
      triggerBomb(b);
    } else {
      burst(mx,my,byExplosion?"💥":"💫",byExplosion?10:12);
      if(byExplosion) addRing(mx,my,"rgba(255,180,90,.95)",66,4);
    }
    spawnItem(mx,my);
  }

  function triggerBomb(source){

    playExplosion();
    worldFlash=Math.max(worldFlash,0.24);
    shake=Math.max(shake,10);
    burst(mx,my,"💥",18);

    for(const t of blocks){
      if(!t.alive || t===source || t.type==="wall") continue;
      if(pointRectDistance(mx,my,t)<=60){
        registerCombo();
        addScore(Math.max(5,Math.round(blockScore(t)*0.75)));
        addSkill(4);
        destroyBlock(t,true);
      }
    }
  }

  function stagePattern(variant,r,c,rows,cols){
    const centerR=(rows-1)/2;
    const centerC=(cols-1)/2;
    const dr=Math.abs(r-centerR);
    const dc=Math.abs(c-centerC);
    switch(variant){
      case 0:return true;
      case 1:return (r+c)%2===0 || r<2;
      case 2:return !(r>=1 && r<=rows-2 && c===Math.floor(cols/2));
      case 3:return c <= (r%cols);
      case 4:return dr+dc <= 2.6;
      case 5:return (r%2===0 ? c<cols-1 : c>0);
      case 6:return r===0 || r===rows-1 || c===0 || c===cols-1 || (dr<=0.5 && dc<=1.5);
      case 7:return c!==Math.floor(cols/2) || r===0 || r===rows-1;
      case 8:return r<2 || c===0 || c===cols-1 || (r+c)%2===0;
      default:return c===Math.floor(cols/2) || r===Math.floor(rows/2) || (r%2===0 && c!==0 && c!==cols-1);
    }
  }

  function buildBreakoutStage(){
    blocks=[]; items=[]; shots=[]; boss=null;
    const cols=5;
    const rows=randint(5,7);
    const gapX=8, gapY=9, pad=10;
    const bw=(field.w-pad*2-gapX*(cols-1))/cols;
    const bh=26;
    const variant=randint(0,9);
    stageData={rows,cols,variant};

    const cells=[];
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(stagePattern(variant,r,c,rows,cols)){
          cells.push({r,c,index:r*cols+c});
        }
      }
    }

    const rowCells=Array.from({length:rows},()=>[]);
    const colCells=Array.from({length:cols},()=>[]);
    cells.forEach(v=>{
      rowCells[v.r].push(v.index);
      colCells[v.c].push(v.index);
    });

    const wallTarget = stage<=2 ? 0 : stage<=4 ? 1 : stage<=7 ? 2 : 3;
    const wallSet=new Set();

    function isWallIndex(idx){ return wallSet.has(idx); }
    function idxOf(r,c){ return r*cols+c; }
    function hasCell(r,c){ return cells.some(v=>v.index===idxOf(r,c)); }

    function lineTooLong(r,c){
      const test=idxOf(r,c);
      const wall = (rr,cc) => hasCell(rr,cc) && (isWallIndex(idxOf(rr,cc)) || idxOf(rr,cc)===test);
      const h1 = wall(r,c-1) && wall(r,c-2);
      const h2 = wall(r,c+1) && wall(r,c+2);
      const h3 = wall(r,c-1) && wall(r,c+1);
      const v1 = wall(r-1,c) && wall(r-2,c);
      const v2 = wall(r+1,c) && wall(r+2,c);
      const v3 = wall(r-1,c) && wall(r+1,c);
      return h1 || h2 || h3 || v1 || v2 || v3;
    }

    function rowWouldSeal(r,c){
      const ids=rowCells[r];
      const after=ids.filter(id=>wallSet.has(id) || id===idxOf(r,c)).length;
      return after>=ids.length;
    }

    function colWouldSeal(r,c){
      const ids=colCells[c];
      const after=ids.filter(id=>wallSet.has(id) || id===idxOf(r,c)).length;
      return after>=ids.length;
    }

    const shuffled=[...cells].sort(()=>Math.random()-0.5);
    for(const cell of shuffled){
      if(wallSet.size>=wallTarget) break;
      if(rowWouldSeal(cell.r,cell.c) || colWouldSeal(cell.r,cell.c)) continue;
      if(lineTooLong(cell.r,cell.c)) continue;
      wallSet.add(cell.index);
    }

    const nonWalls=cells.filter(v=>!wallSet.has(v.index));
    if(nonWalls.length===0 && wallSet.size){
      const first=[...wallSet][0];
      wallSet.delete(first);
    }

    const breakable = cells.filter(v=>!wallSet.has(v.index)).sort(()=>Math.random()-0.5);
    const bombTarget=Math.min(stage<=2?0:Math.floor((stage-1)/3),2);
    const bombSet=new Set(breakable.slice(0,bombTarget).map(v=>v.index));
    const remain=breakable.filter(v=>!bombSet.has(v.index));
    const hp3Set=new Set(remain.slice(0,Math.min(Math.floor(stage/2),4)).map(v=>v.index));
    const hp2Set=new Set(remain.slice(Math.min(Math.floor(stage/2),4), Math.min(Math.floor(stage/2),4)+Math.min(2+Math.floor(stage/2),6)).map(v=>v.index));

    for(const cell of cells){
      const x=field.x+pad+cell.c*(bw+gapX);
      const y=field.y+16+cell.r*(bh+gapY);
      let type="normal", hp=1, label=WORDS[(cell.index+stage*5)%WORDS.length], color=COLORS[(cell.index+stage)%COLORS.length];

      if(wallSet.has(cell.index)){
        type="wall"; hp=Infinity; label="壁"; color="#b88aa3";
      } else if(bombSet.has(cell.index)){
        type="bomb"; hp=1; label="💣"; color="#ffb24d";
      } else if(hp3Set.has(cell.index)){
        hp=3;
      } else if(hp2Set.has(cell.index)){
        hp=2;
      }

      blocks.push({x,y,w:bw,h:bh,type,hp,maxHp:hp,label,color,alive:true,row:cell.r,col:cell.c});
    }

    if(!blocks.some(b=>b.alive && b.type!=="wall")){
      const firstWall=blocks.find(b=>b.type==="wall");
      if(firstWall){
        firstWall.type="normal";
        firstWall.hp=1;
        firstWall.maxHp=1;
        firstWall.label="猫";
        firstWall.color=COLORS[0];
      }
    }
  }

      boss.projectiles.push({type:"orb",x:cx,y:boss.y+boss.h-6,vx:rand(-1.8,1.8),vy:3.8+stage*0.10,r:11});

        boss.markers.push({x:clamp(paddle.x+paddle.w/2,field.x+24,field.x+field.w-24),timer:0.55,max:0.55});
      }
      playBossOrb();
    }

    if(boss.secondForm && Math.random()<0.6){
      boss.projectiles.push({
        type:"orb",
        x:cx+rand(-18,18),
        y:boss.y+boss.h-6,
        vx:rand(-2.0,2.0),

  function updateBoss(dt){
    if(!boss) return;
    boss.bob += dt*4.5;

    if(stage===10 && !boss.secondForm && boss.hp<=boss.maxHp*0.5){
      boss.secondForm=true;
      boss.beamTimer=0;
      boss.attackTimer=0;
      boss.meta.beamGap*=0.85;
      boss.meta.attackGap*=0.84;
      worldFlash=Math.max(worldFlash,0.2);
      shake=Math.max(shake,8);
      showMessage("FINAL MODE!",820);
      say("本気にゃ!",650);
      playBeamCharge();
    }

    if(boss.type==="beam"){
      boss.x += boss.vx*dt*60;
    } else if(boss.type==="zigzag"){
      boss.x += boss.vx*dt*60;
      boss.y = field.y+12 + Math.sin(performance.now()/180)*18;
    } else {
      boss.x += boss.vx*dt*60;
      boss.teleportTimer -= dt;
      if(boss.teleportTimer<=0){
        boss.teleportTimer = boss.secondForm ? 1.1 : 1.75;
        burst(boss.x+boss.w/2,boss.y+boss.h/2,"💨",10);
        boss.x = clamp(field.x+20+rand(0,field.w-boss.w-40), field.x+12, field.x+field.w-boss.w-12);
        burst(boss.x+boss.w/2,boss.y+boss.h/2,"✨",12);
        addRing(boss.x+boss.w/2,boss.y+boss.h/2,"rgba(180,255,220,.9)",74,4);
      }
    }

    if(boss.x<field.x+12 || boss.x+boss.w>field.x+field.w-12){
      boss.vx*=-1;
      boss.x=clamp(boss.x, field.x+12, field.x+field.w-boss.w-12);
    }

    boss.flash*=0.88;

    boss.beamTimer += dt;
    if(!boss.beam && boss.beamTimer>=boss.meta.beamGap){
      boss.beamTimer=0;
      boss.beam={x:boss.x+boss.w/2,state:"charge",timer:boss.secondForm?0.42:0.55,hit:false};
      playBeamCharge();
      showMessage("WARNING",420);
    }

    boss.attackTimer += dt;
    if(boss.attackTimer>=boss.meta.attackGap){
      boss.attackTimer=0;
      performBossAttack();
    }

    for(let i=boss.markers.length-1;i>=0;i--){
      const m=boss.markers[i];
      m.timer-=dt;
      if(m.timer<=0){
        boss.projectiles.push({
          type:"paw",
          x:m.x,
          y:field.y-20,
          vx:0,
          vy:boss.secondForm?7.8:6.6,
          r:boss.secondForm?18:16
        });
        playBossPaw();
        boss.markers.splice(i,1);
      }
    }

    for(let i=boss.projectiles.length-1;i>=0;i--){
      const p=boss.projectiles[i];
      p.x += p.vx*dt*60;
      p.y += p.vy*dt*60;
      if(p.type==="orb") p.vx*=1.002;

      if(p.y>field.y+field.h+50 || p.x<field.x-50 || p.x>field.x+field.w+50){
        boss.projectiles.splice(i,1);
        continue;
      }

      const hitPaddle =
        p.x+p.r>paddle.x && p.x-p.r<paddle.x+paddle.w &&
        p.y+p.r>paddle.y && p.y-p.r<paddle.y+paddle.h;
      if(hitPaddle){
        burst(p.x,p.y,p.type==="paw"?"💥":"⚡",10);
        boss.projectiles.splice(i,1);
        loseLife();
        return;
      }
    }

    if(boss.beam){
      boss.beam.x=boss.x+boss.w/2;
      boss.beam.timer-=dt;
      if(boss.beam.state==="charge" && boss.beam.timer<=0){
        boss.beam.state="fire";
        boss.beam.timer=boss.secondForm?0.56:0.46;
        playBeamFire();
        worldFlash=Math.max(worldFlash,0.18);
        shake=Math.max(shake,7);
      } else if(boss.beam.state==="fire" && boss.beam.timer<=0){
        boss.beam=null;
      }

      if(boss.beam && boss.beam.state==="fire"){
        const bx=boss.beam.x, bw=boss.meta.beamWidth||18;
        const paddleHit=bx+bw/2>=paddle.x && bx-bw/2<=paddle.x+paddle.w;
        if(paddleHit && !boss.beam.hit){
          boss.beam.hit=true;
          burst(bx,paddle.y,"💥",10);
          addRing(bx,paddle.y,"rgba(255,120,160,.95)",70,5);
          loseLife();
          return;
        }
      }
    }
  }

  function drawBoss(){
    if(!boss) return;
    const meta=boss.meta;
    const cx=boss.x+boss.w/2;
    const cy=boss.y+boss.h/2+Math.sin(boss.bob)*2;

    ctx.save();
    ctx.translate(cx,cy);
    ctx.shadowColor=meta.aura;
    ctx.shadowBlur=22;

    ctx.fillStyle=boss.flash>0.1 ? "#fff0a8" : meta.bottom;
    ctx.beginPath(); ctx.moveTo(-30,-10); ctx.lineTo(-16,-40); ctx.lineTo(-2,-12); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(30,-10); ctx.lineTo(16,-40); ctx.lineTo(2,-12); ctx.closePath(); ctx.fill();

    const grad=ctx.createLinearGradient(0,-boss.h/2,0,boss.h/2);
    grad.addColorStop(0,boss.flash>0.1 ? "#fff0a8" : meta.top);
    grad.addColorStop(1,boss.flash>0.1 ? "#ffd34d" : meta.bottom);
    roundRectPath(-boss.w/2,-boss.h/2,boss.w,boss.h,22);

  function reflectBall(ball,rect){
    const prevX=ball.x-ball.vx;
    const prevY=ball.y-ball.vy;
    const fromLeft=prevX+ball.r<=rect.x;
    const fromRight=prevX-ball.r>=rect.x+rect.w;
    const fromTop=prevY+ball.r<=rect.y;
    const fromBottom=prevY-ball.r>=rect.y+rect.h;
    if(fromLeft || fromRight) ball.vx*=-1;
    else if(fromTop || fromBottom) ball.vy*=-1;
    else ball.vy*=-1;
  }

  function hitRect(ball,rect){
    return ball.x+ball.r>rect.x &&
      ball.x-ball.r<rect.x+rect.w &&
      ball.y+ball.r>rect.y &&
      ball.y-ball.r<rect.y+rect.h;
  }

  function handlePaddleHit(ball, now){
    playTap(620);
    playPaddleNyah();
    say("ニヤッ!",360);

    const power=stats.combo>=8 ? 1 : stats.combo>=4 ? 0.55 : stats.combo>=1 ? 0.2 : 0;
    worldFlash=Math.max(worldFlash,0.08+power*0.08);
    shake=Math.max(shake,3.5+power*4.5);

    if(magnetCharges>0 && now<magnetUntil){
      ball.stuck=true;
      ball.stuckOffsetX=Math.max(ball.r,Math.min(paddle.w-ball.r,ball.x-paddle.x));
      magnetCharges--;
      burst(ball.x,paddle.y,"🧲",9);
      return true;
    }

    const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    const minSpeed=currentPerks().launch;
    const currentSpeed=Math.hypot(ball.vx,ball.vy);
    const nextSpeed=Math.max(minSpeed,Math.min(currentSpeed*0.94,minSpeed+1.1));
    ball.vx=hit*nextSpeed*0.92*currentPerks().control;
    ball.vy=-Math.sqrt(Math.max(minSpeed*minSpeed*0.9,nextSpeed*nextSpeed-ball.vx*ball.vx));

    burst(ball.x,paddle.y,"🐾",9+Math.floor(power*6));
    addRing(ball.x,paddle.y,"rgba(255,240,180,.95)",48+power*18,4+power*1.5);
    return false;
  }

  function updateShots(dt){
    for(let i=shots.length-1;i>=0;i--){
      const s=shots[i];
      s.y += s.vy*dt*60;
      if(s.y<field.y-26){
        shots.splice(i,1);
        continue;
      }

      if(stageMode==="boss" && boss){
        const rect={x:boss.x,y:boss.y,w:boss.w,h:boss.h};
        if(s.x>rect.x && s.x<rect.x+rect.w && s.y>rect.y && s.y<rect.y+rect.h){
          boss.hp--;
          boss.flash=1;
          registerCombo();
          addScore(4);
          addSkill(2);
          burst(s.x,s.y,"💥",8);
          worldFlash=Math.max(worldFlash,0.08);
          if(stage===10 && Math.random()<0.08){
            spawnItem(boss.x+rand(16,boss.w-16),boss.y+boss.h*0.45);
          }
          shots.splice(i,1);
          if(boss.hp<=0){
            addScore(120);
            stats.bosses++;
            if(stage===10) stats.finalBoss=true;
            boss=null;
            goNextStage();
            return;
          }
          continue;
        }
      } else {
        let hit=false;
        for(const b of blocks){
          if(!b.alive) continue;
          if(s.x<b.x || s.x>b.x+b.w || s.y<b.y || s.y>b.y+b.h) continue;

          if(b.type==="wall"){
            burst(s.x,s.y,"💥",5);
            shots.splice(i,1);
            hit=true;
            break;
          }

          registerCombo();
          addScore(blockScore(b));
          addSkill(2);

          if(b.type==="bomb"){
            destroyBlock(b,false);
          } else {
            b.hp--;
            burst(s.x,s.y,"✨",8);
            worldFlash=Math.max(worldFlash,0.06);
            if(b.hp<=0) destroyBlock(b,false);
          }

          shots.splice(i,1);
          hit=true;
          break;
        }
        if(hit) continue;
      }
    }
  }

  function updateItems(dt){
    for(let i=items.length-1;i>=0;i--){
      const it=items[i];
      it.x += it.vx*dt*60;
      it.y += it.vy*dt*60;
      if(it.y-it.r>H){
        items.splice(i,1);
        continue;
      }
      const got = it.x+it.r>paddle.x && it.x-it.r<paddle.x+paddle.w && it.y+it.r>paddle.y && it.y-it.r<paddle.y+paddle.h;
      if(got){
        burst(it.x,it.y,it.emoji,10);
        applyItem(it.type);
        items.splice(i,1);
      }
    }
  }

  function updateParticles(dt){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x += p.vx*dt*60;
      p.y += p.vy*dt*60;
      p.vy += 0.03*dt*60;
      p.life -= 0.03*dt*60;
      if(p.life<=0) particles.splice(i,1);
    }
  }

  function updateRings(dt){
    for(let i=rings.length-1;i>=0;i--){
      const r=rings[i];
      r.r += (r.maxR-r.r)*0.18;
      r.life -= dt*2.1;
      if(r.life<=0) rings.splice(i,1);
    }
  }

  function update(dt){
    resetMusicIfNeeded();

    if(state==="opening"){
      openingTime += dt;
      if(openingTime>=3.2) showTitle();
      updateMusic(dt);
      updateHud();
      return;
    }

    if(state==="story"){
      storyTime += dt;
      if(storyTime>=3.0) startGame();
      updateMusic(dt);
      updateHud();
      return;
    }

    if(state==="title"){
      updateMusic(dt);
      updateHud();
      return;
    }

    if(state==="celebration"){
      celebrationTime += dt;
      updateParticles(dt);
      updateRings(dt);
      if(Math.random()<0.12){
        particles.push({
          x:rand(view.x+view.w*0.18, view.x+view.w*0.82),
          y:rand(H*0.2,H*0.78),
          vx:rand(-1,1),
          vy:rand(-1.2,0.4),
          life:1,
          emoji:Math.random()<0.5?"✨":"🎉"
        });
      }
      if(celebrationTime>=5.2) showResult(true);
      updateMusic(dt);
      updateHud();
      return;
    }

    if(state!=="playing"){
      updateHud();
      return;
    }

    const now=performance.now();

    if(stats.comboTimer>0){
      stats.comboTimer -= dt;
      if(stats.comboTimer<=0) resetCombo();
    }

    const base=currentPerks().paddle;
    const targetBig=170+currentPerks().bigWidth;
    if(now<paddleBoostUntil) paddle.w += (targetBig-paddle.w)*0.15;
    else paddle.w += (base-paddle.w)*0.14;

    paddle.x += ((pointerX-paddle.w/2)-paddle.x) * Math.min(1,0.25*dt*60);
    paddle.x = clamp(paddle.x, field.x+8, field.x+field.w-paddle.w-8);

    if(catDash.active){
      catDash.trail.push({x:catDash.x,y:catDash.y,rot:catDash.rot});
      if(catDash.trail.length>8) catDash.trail.shift();
      catDash.x += 26*dt*60;
      catDash.y += Math.sin(now/90)*1.8;
      catDash.rot += 0.045*dt*60;
      if(now>catDash.until){
        catDash.active=false;
        catDash.trail=[];
      }
    }

    if(stageMode==="boss") updateBoss(dt);
    if(state!=="playing") return;

    if(now<rapidUntil){
      rapidCooldown -= dt;
      while(rapidCooldown<=0){
        rapidCooldown += 0.16*currentPerks().rapid;
        const px=paddle.x+paddle.w/2+rand(-paddle.w*0.24,paddle.w*0.24);
        shots.push({x:px,y:paddle.y-4,vy:-10.5});
        playTap(980);
      }
    }

    updateShots(dt);
    if(state!=="playing") return;

    for(let i=balls.length-1;i>=0;i--){
      const ball=balls[i];

      if(ball.stuck){
        ball.x = paddle.x + ball.stuckOffsetX;
        ball.y = paddle.y - ball.r - 2;
        continue;
      }

      ball.trail.push({x:ball.x,y:ball.y});
      if(ball.trail.length>6) ball.trail.shift();

      ball.x += ball.vx*dt*60;
      ball.y += ball.vy*dt*60;

      if(ball.x<field.x+ball.r){ ball.x=field.x+ball.r; ball.vx*=-1; playTap(360); }
      if(ball.x>field.x+field.w-ball.r){ ball.x=field.x+field.w-ball.r; ball.vx*=-1; playTap(360); }
      if(ball.y<field.y+ball.r){ ball.y=field.y+ball.r; ball.vy*=-1; playTap(420); }

      if(ball.y+ball.r>paddle.y && ball.y-ball.r<paddle.y+paddle.h && ball.x>paddle.x && ball.x<paddle.x+paddle.w && ball.vy>0){
        const stuck=handlePaddleHit(ball,now);
        if(stuck) continue;
      }

      if(stageMode==="boss" && boss){
        const rect={x:boss.x,y:boss.y,w:boss.w,h:boss.h};
        if(hitRect(ball,rect)){
          boss.hp--;
          boss.flash=1;
          registerCombo();
          addScore(16);
          addSkill(6);
          burst(ball.x,ball.y,"⭐",12);
          worldFlash=Math.max(worldFlash,0.08);
          shake=Math.max(shake,4.8);
          playTap(920);
          reflectBall(ball,rect);

          if(stage===10 && Math.random()<0.12){
            spawnItem(boss.x+rand(16,boss.w-16),boss.y+boss.h*0.48);
          }

          if(boss.hp<=0){
            addScore(120);
            stats.bosses++;
            if(stage===10) stats.finalBoss=true;
            boss=null;
            goNextStage();
            return;
          }
          updateHud();
        }

        if(boss && boss.beam && boss.beam.state==="fire"){
          const bx=boss.beam.x, bw=boss.meta.beamWidth||18;
          if(ball.x+ball.r>bx-bw/2 && ball.x-ball.r<bx+bw/2 && ball.y>boss.y+boss.h-8){
            ball.vy*=-1;
            ball.vx*=0.96;
            burst(ball.x,ball.y,"⚡",7);
          }
        }
      } else {
        for(const b of blocks){
          if(!b.alive) continue;
          if(!hitRect(ball,b)) continue;

          if(b.type==="wall"){
            reflectBall(ball,b);
            burst(b.x+b.w/2,b.y+b.h/2,"💥",6);
            shake=Math.max(shake,2.6);
            playTap(280);
            break;
          }

          if(b.type==="bomb"){
            registerCombo();
            addScore(blockScore(b));
            addSkill(6);
            reflectBall(ball,b);
            destroyBlock(b,false);
            updateHud();
            break;
          }

          b.hp--;
          registerCombo();
          addScore(blockScore(b));
          addSkill(6);
          burst(b.x+b.w/2,b.y+b.h/2,"✨",10);
          worldFlash=Math.max(worldFlash,0.06);
          shake=Math.max(shake,2.8);

          if(b.hp<=0){
            destroyBlock(b,false);
            playTap(860);
          } else {
            playTap(560);
          }

          reflectBall(ball,b);
          if(score%100===0) showMessage("GREAT!",520);
          updateHud();
          break;
        }
      }

      if(ball.y>field.y+field.h+44){
        balls.splice(i,1);
      }
    }

    if(stageMode==="boss" && balls.length>1){
      balls=[balls[0]];
    }

    if(balls.length===0){
      loseLife();
      return;
    }

    if(stageMode==="breakout" && !blocks.some(b=>b.alive && b.type!=="wall")){
      goNextStage();
      return;
    }

    updateItems(dt);
    updateParticles(dt);
    updateRings(dt);

    if(shake>0.08) shake*=0.88; else shake=0;
    if(damageFlash>0.02) damageFlash*=0.88; else damageFlash=0;
    if(worldFlash>0.01) worldFlash*=0.86; else worldFlash=0;

    updateMusic(dt);
    updateHud();
  }

  function draw(){
    if(state==="opening"){
      drawOpeningMovie();
      return;
    }
    if(state==="story"){
      drawStoryMovie();
      return;
    }
    if(state==="celebration"){
      drawCelebrationMovie();
      return;
    }
    if(state!=="playing"){
      drawIdleBackground();
      return;
    }

    ctx.save();
    if(shake>0){
      ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
    }
    drawBackground();
    if(stageMode==="boss") drawBoss();
    else drawBlocks();
    drawItems();
    drawShots();
    drawPaddle();
    drawBalls();
    drawRings();
    drawParticles();
    ctx.restore();
    drawCatDash();
  }

  function releaseStuckBalls(){
    let released=false;
    for(const b of balls){
      if(b.stuck){
        b.stuck=false;
        const hit=(pointerX-(paddle.x+paddle.w/2))/(paddle.w/2);
        b.vx=hit*5.2*currentPerks().control;
        b.vy=-Math.max(currentPerks().launch,4.8);
        released=true;
      }
    }
    if(released) playTap(760);
  }

  function loop(ts){
    if(!lastTime) lastTime=ts;
    const dt=Math.min(0.033,(ts-lastTime)/1000);
    lastTime=ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  canvas.addEventListener("pointerdown", e=>{
    pointerX = e.clientX - canvas.getBoundingClientRect().left;

    if(!audioPrimed){
      unlockAudio();
      musicStep=0;
      musicAccum=0;
      if(state==="opening") return;
    }

    if(state==="opening"){
      showTitle();
      return;
    }
    if(state==="story"){
      startGame();
      return;
    }
    if(state==="celebration"){
      showResult(true);
      return;
    }
    if(state==="playing"){
      releaseStuckBalls();
    }
  });

  canvas.addEventListener("pointermove", e=>{
    pointerX = e.clientX - canvas.getBoundingClientRect().left;
  });

  canvas.addEventListener("touchstart", ()=>{
    if(!audioPrimed){
      unlockAudio();
      musicStep=0;
      musicAccum=0;
    }
  }, { passive:true });

  ui.skillButton.addEventListener("click", ()=>{
    if(!audioPrimed){
      unlockAudio();
      musicStep=0;
      musicAccum=0;
    }
    useSkill();
  });

  window.addEventListener("resize", ()=>{
    resize();
    if(state==="playing"){
      paddle.x=clamp(paddle.x,field.x+8,field.x+field.w-paddle.w-8);
      paddle.y=field.y+field.h-24;
    }
  });

  loadCat();
  resize();
  updateHud();
  showTitle();
  state="opening";
  ui.overlay.classList.add("hidden");
  requestAnimationFrame(loop);
})();
</script>
</body>
