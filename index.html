<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヒデちゃん&猫ちゃん ブロック崩し DX</title>
<style>
  :root{
    --bg1:#ffd9ea;
    --bg2:#f6bfd8;
    --bg3:#ee9fc5;
    --ink:#6f2858;
    --pink:#ff63ad;
    --yellow:#ffd84d;
    --shadow:0 10px 24px rgba(0,0,0,.18);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    font-family:
      "Hiragino Maru Gothic ProN",
      "Hiragino Sans",
      "Yu Gothic",
      system-ui,
      sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  }

  #app{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    touch-action:none;
  }

  canvas{
    display:block;
    width:100%;
    height:100%;
  }

  #hud{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    z-index:20;
    pointer-events:none;
  }

  .col{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .panel{
    min-width:96px;
    padding:9px 12px;
    border-radius:18px;
    background:rgba(255,255,255,.58);
    border:1px solid rgba(255,255,255,.92);
    box-shadow:var(--shadow);
    backdrop-filter:blur(6px);
  }

  .label{
    font-size:11px;
    font-weight:700;
    color:#9e5a83;
    margin-bottom:4px;
  }

  .value{
    font-size:17px;
    font-weight:900;
    color:var(--ink);
    white-space:nowrap;
  }

  #catBadge{
    position:absolute;
    top:8px;
    left:50%;
    transform:translateX(-50%);
    width:80px;
    height:80px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:0 10px 24px rgba(255,90,165,.22);
    z-index:26;
    transition:transform .18s ease, box-shadow .18s ease;
  }

  #catBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  #catBadgeFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
  }

  #catTalk{
    position:absolute;
    top:92px;
    left:50%;
    transform:translateX(-50%);
    z-index:27;
    font-size:12px;
    font-weight:900;
    color:#fff6a8;
    text-shadow:0 2px 8px rgba(0,0,0,.28);
    white-space:nowrap;
    pointer-events:none;
  }

  #message{
    position:absolute;
    top:38%;
    left:50%;
    transform:translateX(-50%);
    z-index:25;
    font-size:clamp(28px, 9vw, 54px);
    font-weight:900;
    color:var(--yellow);
    text-shadow:0 0 14px rgba(0,0,0,.22);
    pointer-events:none;
    opacity:0;
    transition:opacity .18s ease;
    white-space:nowrap;
  }

  #catSkillBadge{
    position:absolute;
    left:14px;
    bottom:126px;
    width:62px;
    height:62px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:var(--shadow);
    z-index:21;
    opacity:0;
    transform:scale(.8);
    transition:opacity .18s ease, transform .18s ease;
    pointer-events:none;
  }

  #catSkillBadge.show{
    opacity:1;
    transform:scale(1);
  }

  #catSkillBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  #catSkillFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
  }

  #skillsArea{
    position:absolute;
    left:14px;
    right:14px;
    bottom:12px;
    z-index:24;
  }

  #skillButton{
    width:100%;
    border:none;
    border-radius:20px;
    padding:12px 14px;
    background:linear-gradient(180deg,rgba(255,255,255,.74),rgba(255,255,255,.5));
    border:1px solid rgba(255,255,255,.96);
    box-shadow:var(--shadow);
    color:var(--ink);
    font:inherit;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    min-height:62px;
  }

  #skillButton.disabled{
    opacity:.55;
    filter:grayscale(.75);
  }

  #skillLeft{
    display:flex;
    align-items:center;
    gap:10px;
  }

  #skillEmoji{
    font-size:26px;
    line-height:1;
  }

  #skillTextWrap{
    text-align:left;
  }

  #skillName{
    font-size:16px;
    font-weight:900;
    line-height:1.1;
  }

  #skillDesc{
    font-size:11px;
    color:#8f5377;
    margin-top:3px;
  }

  #skillReady{
    font-size:11px;
    font-weight:900;
    color:#b65586;
    white-space:nowrap;
  }

  #skillLabel{
    font-size:12px;
    color:#fff;
    margin:8px 0 6px;
    text-shadow:0 2px 6px rgba(0,0,0,.25);
  }

  #skillBar{
    height:16px;
    border-radius:999px;
    background:rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.65);
    overflow:hidden;
    box-shadow:var(--shadow);
  }

  #skillFill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#72e5ff,#9cff8b,#ffe56a);
    border-radius:999px;
    transition:width .1s linear;
    box-shadow:0 0 16px rgba(126,255,211,.6);
  }

  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:40;
    background:rgba(255,228,239,.34);
    backdrop-filter:blur(4px);
  }

  #overlay.hidden{
    display:none;
  }

  .card{
    width:min(94vw,460px);
    padding:22px 18px 20px;
    border-radius:28px;
    background:linear-gradient(180deg,rgba(255,255,255,.64),rgba(255,255,255,.38));
    border:1px solid rgba(255,255,255,.9);
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    text-align:center;
    color:var(--ink);
  }

  .bigCat{
    font-size:72px;
    line-height:1;
    margin-bottom:10px;
  }

  .title{
    font-size:clamp(28px, 7vw, 42px);
    font-weight:900;
    line-height:1.14;
    color:#ff5aa5;
    margin-bottom:10px;
    text-shadow:0 0 14px rgba(255,90,165,.2);
  }

  .sub{
    font-size:14px;
    line-height:1.6;
    color:#8f5377;
    margin-bottom:16px;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:16px 28px;
    font-size:22px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(180deg,#ff60ae,#ff2c92);
    box-shadow:0 8px 0 #b81f69, 0 10px 16px rgba(0,0,0,.16);
  }

  .btn:active{
    transform:translateY(4px);
    box-shadow:0 4px 0 #b81f69, 0 8px 12px rgba(0,0,0,.14);
  }

  .charGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:16px 0 12px;
  }

  .charBtn{
    border:none;
    border-radius:20px;
    padding:14px 10px;
    background:rgba(255,255,255,.48);
    border:2px solid rgba(255,255,255,.72);
    color:var(--ink);
    box-shadow:var(--shadow);
    font:inherit;
  }

  .charBtn.selected{
    border-color:#ff63ad;
    box-shadow:0 0 0 3px rgba(255,99,173,.18), var(--shadow);
  }

  .charBtn .emoji{
    font-size:40px;
    line-height:1.1;
  }

  .charBtn .name{
    font-size:17px;
    font-weight:900;
    margin-top:4px;
  }

  .charBtn .skill{
    font-size:11px;
    line-height:1.45;
    color:#8f5377;
    margin-top:4px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="col">
      <div class="panel">
        <div class="label">SCORE</div>
        <div class="value" id="scoreText">0</div>
      </div>
      <div class="panel">
        <div class="label">LIFE</div>
        <div class="value" id="lifeText">3</div>
      </div>
    </div>

    <div class="col">
      <div class="panel">
        <div class="label">STAGE</div>
        <div class="value" id="stageText">1 / 20</div>
      </div>
      <div class="panel">
        <div class="label">BEST</div>
        <div class="value" id="bestText">0</div>
      </div>
    </div>
  </div>

  <div id="catBadge">
    <img id="catBadgeImg" alt="cat">
    <div id="catBadgeFallback">🐱</div>
  </div>

  <div id="catSkillBadge">
    <img id="catSkillImg" alt="cat">
    <div id="catSkillFallback">🐱</div>
  </div>

  <div id="catTalk">にゃっ</div>
  <div id="message"></div>

  <div id="skillsArea">
    <button id="skillButton" class="disabled">
      <div id="skillLeft">
        <div id="skillEmoji">❔</div>
        <div id="skillTextWrap">
          <div id="skillName">チャージ中</div>
          <div id="skillDesc">ゲージをためてね</div>
        </div>
      </div>
      <div id="skillReady">RANDOM</div>
    </button>
    <div id="skillLabel">タップで吸着球を再発射 / SKILLで必殺技</div>
    <div id="skillBar"><div id="skillFill"></div></div>
  </div>

  <div id="overlay"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreText = document.getElementById("scoreText");
  const lifeText = document.getElementById("lifeText");
  const stageText = document.getElementById("stageText");
  const bestText = document.getElementById("bestText");
  const skillFill = document.getElementById("skillFill");
  const message = document.getElementById("message");
  const catTalk = document.getElementById("catTalk");
  const overlay = document.getElementById("overlay");
  const app = document.getElementById("app");
  const hud = document.getElementById("hud");
  const skillsArea = document.getElementById("skillsArea");
  const catBadge = document.getElementById("catBadge");
  const catBadgeImg = document.getElementById("catBadgeImg");
  const catSkillImg = document.getElementById("catSkillImg");
  const catBadgeFallback = document.getElementById("catBadgeFallback");
  const catSkillFallback = document.getElementById("catSkillFallback");
  const catSkillBadge = document.getElementById("catSkillBadge");
  const skillButton = document.getElementById("skillButton");
  const skillEmojiEl = document.getElementById("skillEmoji");
  const skillNameEl = document.getElementById("skillName");
  const skillDescEl = document.getElementById("skillDesc");

  const MAX_STAGE = 20;
  const WORDS = [
    "夢","仕事","健康","旅行","ダイエット","ポテチ","睡眠","散歩",
    "筋トレ","ラーメン","貯金","ごほうび","野菜","チョコ","読書","有休",
    "温泉","締切","休日","猫","会議","サボり","水","お菓子"
  ];
  const COLORS = ["#ffd7a8","#bfe7ff","#c8ffd8","#e8c8ff","#ffd4e5","#fff0b8"];

  const CHARACTERS = [
    { id:"hide", emoji:"😄", name:"ヒデ", perk:"金色パドル / 少し広め" },
    { id:"cat", emoji:"🐱", name:"ネコ", perk:"ピンクパドル / ゲージ少し早い" },
    { id:"bear", emoji:"🐻", name:"クマ", perk:"青パドル / ビッグ長め" },
    { id:"rabbit", emoji:"🐰", name:"ウサ", perk:"緑パドル / 球が少しやさしい" }
  ];
  let selectedChar = CHARACTERS[1];

  const SKILLS = [
    { type:"cat", emoji:"🐱", name:"猫ラッシュ", desc:"猫が左から飛んできて3ボール化" },
    { type:"magnet", emoji:"🧲", name:"ぺたっ", desc:"3回まで吸着、タップで再発射" },
    { type:"big", emoji:"🧸", name:"ビッグ", desc:"パドル巨大化" }
  ];

  const ITEM_TYPES = [
    { type:"gauge", emoji:"⚡", label:"ゲージ" },
    { type:"score", emoji:"💎", label:"スコア" },
    { type:"heal", emoji:"💖", label:"ライフ" },
    { type:"big", emoji:"⬌", label:"BIG" },
    { type:"rapid", emoji:"🔫", label:"連射" },
    { type:"clone", emoji:"🪞", label:"分身" }
  ];

  const CANON = [
    [62,66,69],[57,61,64],[59,62,66],[54,57,61],
    [55,59,62],[62,66,69],[55,59,62],[57,61,64]
  ];

  let currentSkill = null;
  let W = 0;
  let H = 0;
  const DPR = Math.min(2, window.devicePixelRatio || 1);
  let field = { x:16, y:150, w:300, h:400 };

  let state = "title";
  let stage = 1;
  let score = 0;
  let lives = 3;
  let skill = 0;
  let best = Number(localStorage.getItem("hidecat_fun_best_v9") || 0);
  let stageMode = "breakout";
  let stageVariant = 0;

  let pointerX = 0;
  let shake = 0;
  let damageFlash = 0;
  let worldFlash = 0;
  let lastTime = 0;
  let sayLockUntil = 0;
  let speechLockUntil = 0;

  let paddle = { x:0, y:0, w:116, h:18 };
  let balls = [];
  let blocks = [];
  let items = [];
  let particles = [];
  let stars = [];
  let rings = [];
  let playerShots = [];
  let boss = null;

  let paddleBoostUntil = 0;
  let magnetUntil = 0;
  let magnetCharges = 0;
  let rapidUntil = 0;
  let rapidShotCooldown = 0;

  let catDash = {
    active:false,
    x:-180,
    y:0,
    rot:0,
    until:0,
    trail:[]
  };

  let catImg = new Image();
  let catReady = false;

  let audioCtx = null;
  let musicStep = 0;
  let musicAccum = 0;

  function rand(min, max){
    return Math.random() * (max - min) + min;
  }

  function randInt(min, max){
    return Math.floor(rand(min, max + 1));
  }

  function clamp(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function getStageBaseSpeed(){
    return Math.min(5.9, 4.12 + (stage - 1) * 0.09);
  }

  function paddleTheme(){
    if(selectedChar.id === "hide"){
      return { top:"#fff3a5", bottom:"#ffbd52", accent:"#ffdf63" };
    }
    if(selectedChar.id === "cat"){
      return { top:"#ffd4ea", bottom:"#ff7fb6", accent:"#ff63ad" };
    }
    if(selectedChar.id === "bear"){
      return { top:"#d7ebff", bottom:"#72b6ff", accent:"#7ca9ff" };
    }
    return { top:"#dbffd9", bottom:"#7de188", accent:"#7fe38f" };
  }

  function currentPerks(){
    const base = getStageBaseSpeed();
    return {
      basePaddle:
        selectedChar.id === "hide" ? 126 :
        selectedChar.id === "bear" ? 120 :
        116,
      skillGainMult:
        selectedChar.id === "cat" ? 1.12 : 1.0,
      bigDurationMult:
        selectedChar.id === "bear" ? 1.35 : 1.0,
      launchSpeed:
        selectedChar.id === "rabbit" ? base - 0.18 : base
    };
  }

  function loadCat(){
    catImg = new Image();
    catImg.onload = () => {
      catReady = true;
      catBadgeImg.src = catImg.src;
      catSkillImg.src = catImg.src;
      catBadgeImg.style.display = "block";
      catSkillImg.style.display = "block";
      catBadgeFallback.style.display = "none";
      catSkillFallback.style.display = "none";
    };
    catImg.onerror = () => {
      catReady = false;
    };
    catImg.src = "./cat.png.JPG";
  }

  function unlockAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
  }

  function midiToFreq(m){
    return 440 * Math.pow(2, (m - 69) / 12);
  }

  function playTone(time, freq, dur, type="triangle", vol=0.03){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(vol, time + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + dur + 0.03);
  }

  function playTap(freq=520){
    if(!audioCtx) return;
    playTone(audioCtx.currentTime, freq, 0.08, "square", 0.02);
  }

  function playDamage(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    playTone(t, 170, 0.16, "sawtooth", 0.035);
    playTone(t + 0.05, 125, 0.22, "sawtooth", 0.03);
  }

  function playMeow(){
    if(!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(680, now);
    osc.frequency.exponentialRampToValueAtTime(430, now + 0.16);
    osc.frequency.exponentialRampToValueAtTime(520, now + 0.30);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.04, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.33);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  }

  function playPaddleNyah(){
    if(!audioCtx) return;
    const now = audioCtx.currentTime;

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    const gain2 = audioCtx.createGain();

    osc1.type = "triangle";
    osc1.frequency.setValueAtTime(980, now);
    osc1.frequency.exponentialRampToValueAtTime(720, now + 0.06);
    osc1.frequency.exponentialRampToValueAtTime(820, now + 0.12);

    osc2.type = "sine";
    osc2.frequency.setValueAtTime(1480, now);
    osc2.frequency.exponentialRampToValueAtTime(1080, now + 0.08);

    gain1.gain.setValueAtTime(0.0001, now);
    gain1.gain.linearRampToValueAtTime(0.032, now + 0.01);
    gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.17);

    gain2.gain.setValueAtTime(0.0001, now);
    gain2.gain.linearRampToValueAtTime(0.012, now + 0.01);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    osc1.connect(gain1);
    osc2.connect(gain2);
    gain1.connect(audioCtx.destination);
    gain2.connect(audioCtx.destination);

    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 0.18);
    osc2.stop(now + 0.15);

    if("speechSynthesis" in window && performance.now() > speechLockUntil){
      speechLockUntil = performance.now() + 120;
      try{
        speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance("ニヤッ");
        ut.lang = "ja-JP";
        ut.rate = 1.2;
        ut.pitch = 1.8;
        ut.volume = 0.35;
        speechSynthesis.speak(ut);
      }catch(e){}
    }
  }

  function averageBallSpeed(){
    if(!balls.length) return currentPerks().launchSpeed;
    let sum = 0;
    let count = 0;
    for(const b of balls){
      if(b.stuck) continue;
      sum += Math.hypot(b.vx, b.vy);
      count++;
    }
    return sum / Math.max(1, count);
  }

  function tickMusicStep(){
    if(!audioCtx || state !== "playing") return;

    const chord = CANON[Math.floor(musicStep / 8) % CANON.length];
    const stepInChord = musicStep % 8;
    const t = audioCtx.currentTime + 0.01;

    const arpPattern = [0,1,2,1,2,1,0,1];
    const arpNote = chord[arpPattern[stepInChord]] + 12;
    playTone(t, midiToFreq(arpNote), 0.13, "square", 0.009);

    if(stepInChord === 0 || stepInChord === 4){
      playTone(t, midiToFreq(chord[0] - 24), 0.26, "sine", 0.032);
      playTone(t, midiToFreq(chord[1]), 0.18, "triangle", 0.008);
    }

    if(stepInChord === 2 || stepInChord === 6){
      playTone(t, 2600, 0.025, "square", 0.0038);
    }

    musicStep++;
  }

  function updateMusic(dt){
    if(!audioCtx || state !== "playing") return;
    const speed = averageBallSpeed();
    const interval = Math.max(0.16, Math.min(0.26, 0.24 - (speed - 6.0) * 0.01));
    musicAccum += dt;
    while(musicAccum >= interval){
      musicAccum -= interval;
      tickMusicStep();
    }
  }

  function startMusic(){
    unlockAudio();
    musicStep = 0;
    musicAccum = 0;
  }

  function stopMusic(){
    musicAccum = 0;
  }

  function showMessage(text, ms=700){
    message.textContent = text;
    message.style.opacity = "1";
    message.style.transform = "translateX(-50%) scale(1.12)";
    clearTimeout(showMessage._timer);
    clearTimeout(showMessage._timer2);
    showMessage._timer2 = setTimeout(() => {
      message.style.transform = "translateX(-50%) scale(1)";
    }, 80);
    showMessage._timer = setTimeout(() => {
      message.style.opacity = "0";
    }, ms);
  }

  function layoutField(){

      hudRect.bottom - appRect.top,

  function createBall(vx = null){
    const launchSpeed = currentPerks().launchSpeed;
    return {
      x: field.x + field.w / 2,
      y: field.y + field.h - 92,
      vx: vx ?? (Math.random() > 0.5 ? launchSpeed * 0.52 : -launchSpeed * 0.52),
      vy: -launchSpeed,
      r: 9,
      trail:[],
      stuck:false,
      stuckOffsetX:0
    };
  }

  function cloneBalls(){
    if(stageMode === "boss"){
      if(boss){
        boss.hp = Math.max(0, boss.hp - 2);
        boss.flash = 1;
        burst(boss.x + boss.w/2, boss.y + boss.h/2, "⭐", 12);
        if(boss.hp <= 0){
          score += 120;
          boss = null;
          goNextStage();
        }
      }
      return;
    }

    const active = balls.filter(b => !b.stuck);
    if(!active.length) return;
    const base = active[0];
    while(balls.length < 3){
      const angle = balls.length === 1 ? -0.72 : 0.72;
      const speed = Math.max(currentPerks().launchSpeed, Math.hypot(base.vx, base.vy));
      balls.push({
        x: base.x,
        y: base.y,
        vx: Math.sin(angle) * speed,
        vy: -Math.cos(angle) * speed,
        r: 9,
        trail:[],
        stuck:false,
        stuckOffsetX:0
      });
    }
  }

  function resetBalls(single=false){
    balls = [createBall()];
    if(single){
      balls = [createBall(0)];
      balls[0].vx = currentPerks().launchSpeed * 0.32;
      balls[0].vy = -currentPerks().launchSpeed;
    }
  }

  function stagePattern(variant, r, c, rows, cols){
    const centerR = (rows - 1) / 2;
    const centerC = (cols - 1) / 2;
    const dr = Math.abs(r - centerR);
    const dc = Math.abs(c - centerC);

    switch(variant){
      case 0: return true;
      case 1: return (r + c) % 2 === 0 || r < 2;
      case 2: return !(r >= 1 && r <= rows - 2 && c === Math.floor(cols/2));
      case 3: return c <= (r % cols);
      case 4: return dr + dc <= 2.6;
      case 5: return (r % 2 === 0 ? c < cols - 1 : c > 0);
      case 6: return r === 0 || r === rows - 1 || c === 0 || c === cols - 1 || (dr <= 0.5 && dc <= 1.5);
      case 7: return c !== Math.floor(cols/2) || r === 0 || r === rows - 1;
      default: return true;
    }
  }

  function createStageBlocks(stageNum){
    boss = null;
    blocks = [];
    items = [];
    playerShots = [];
    stageVariant = randInt(0, 7);

    const cols = 4;
    const rows = randInt(5, 6);
    const gapX = 10;
    const gapY = 9;
    const innerPad = 12;
    const bw = (field.w - innerPad * 2 - gapX * (cols - 1)) / cols;
    const bh = 28;

    const strong2Count = Math.min(2 + Math.floor(stageNum / 2), 8);
    const strong3Count = Math.min(Math.floor(stageNum / 4), 5);
    const wallCount = stageNum >= 4 ? Math.min(1 + Math.floor((stageNum - 4) / 4), 3) : 0;

    let candidateIndices = [];
    let idx = 0;
    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        if(stagePattern(stageVariant, r, c, rows, cols)) candidateIndices.push(idx);
        idx++;
      }
    }

    for(let i=candidateIndices.length - 1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [candidateIndices[i], candidateIndices[j]] = [candidateIndices[j], candidateIndices[i]];
    }

    const wallSet = new Set(candidateIndices.slice(0, wallCount));
    const strong3Set = new Set(candidateIndices.slice(wallCount, wallCount + strong3Count));
    const strong2Set = new Set(candidateIndices.slice(wallCount + strong3Count, wallCount + strong3Count + strong2Count));

    idx = 0;
    const wordShift = stageNum * 5 + randInt(0, WORDS.length - 1);

    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        if(!stagePattern(stageVariant, r, c, rows, cols)){
          idx++;
          continue;
        }

        let hp = 1;
        let label = WORDS[(idx + wordShift) % WORDS.length];
        let color = COLORS[(idx + stageNum + stageVariant) % COLORS.length];

        if(wallSet.has(idx)){
          hp = Infinity;
          label = "壁";
          color = "#b88aa3";
        } else if(strong3Set.has(idx)){
          hp = 3;
        } else if(strong2Set.has(idx)){
          hp = 2;
        }

        blocks.push({
          x: field.x + innerPad + c * (bw + gapX),
          y: field.y + 16 + r * (bh + gapY),
          w: bw,
          h: bh,
          label,
          color,
          hp,
          maxHp: hp,
          alive:true
        });

        idx++;
      }
    }
  }

  function useSkill(){

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = `${W}px`;

    layoutField();

    paddle.y = field.y + field.h - 24;

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawImageCover(img, x, y, w, h){
    const ir = img.width / img.height;
    const br = w / h;
    let dw, dh, dx, dy;
    if(ir > br){
      dh = h;
      dw = h * ir;
      dx = x - (dw - w) / 2;
      dy = y;
    } else {
      dw = w;
      dh = w / ir;
      dx = x;
      dy = y - (dh - h) / 2;
    }
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, "#ffd8ea");
    g.addColorStop(.52, "#f3bad5");
    g.addColorStop(1, "#ea96bd");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    for(const s of stars){
      ctx.globalAlpha = s.a;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if(catReady){
      ctx.save();
      ctx.globalAlpha = 0.28;
      roundRectPath(field.x, field.y, field.w, field.h, 26);
      ctx.clip();
      drawImageCover(catImg, field.x, field.y, field.w, field.h);
      ctx.restore();
    }

    ctx.strokeStyle = "rgba(255,255,255,.58)";
    ctx.lineWidth = 2;
    roundRectPath(field.x, field.y, field.w, field.h, 26);
    ctx.stroke();

    if(worldFlash > 0){
      ctx.fillStyle = `rgba(255,255,255,${worldFlash * 0.22})`;
      ctx.fillRect(0,0,W,H);
    }

    if(damageFlash > 0){
      ctx.fillStyle = `rgba(255,80,90,${0.22 * damageFlash})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawBlocks(){
    for(const b of blocks){
      if(!b.alive) continue;

      roundRectPath(b.x, b.y, b.w, b.h, 10);
      ctx.fillStyle = b.color;
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.stroke();

      ctx.fillStyle = "#6f2858";
      ctx.font = "bold 15px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 + 1);

      if(Number.isFinite(b.hp) && b.hp > 1){
        ctx.fillStyle = "#7c2b59";
        ctx.font = "bold 10px sans-serif";
        ctx.fillText(String(b.hp), b.x + b.w - 10, b.y + 10);
      }

      if(!Number.isFinite(b.hp)){
        ctx.fillStyle = "#fff";
        ctx.font = "bold 10px sans-serif";
        ctx.fillText("∞", b.x + b.w - 10, b.y + 10);
      }
    }
  }

  function drawBoss(){
    if(!boss) return;

    const cx = boss.x + boss.w/2;
    const cy = boss.y + boss.h/2 + Math.sin(boss.bob) * 2;

    ctx.save();
    ctx.translate(cx, cy);

    ctx.fillStyle = boss.flash > 0.1 ? "#fff0a8" : "#ff9ac4";
    ctx.beginPath();
    ctx.moveTo(-30, -10);
    ctx.lineTo(-16, -40);
    ctx.lineTo(-2, -12);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(30, -10);
    ctx.lineTo(16, -40);
    ctx.lineTo(2, -12);
    ctx.closePath();
    ctx.fill();

    const grad = ctx.createLinearGradient(0, -boss.h/2, 0, boss.h/2);
    grad.addColorStop(0, boss.flash > 0.1 ? "#fff0a8" : "#ffd4e8");
    grad.addColorStop(1, boss.flash > 0.1 ? "#ffd34d" : "#ff7dae");
    roundRectPath(-boss.w/2, -boss.h/2, boss.w, boss.h, 22);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.7)";
    ctx.stroke();

    if(catReady){
      ctx.save();
      roundRectPath(-38, -26, 76, 52, 18);
      ctx.clip();
      ctx.drawImage(catImg, -38, -26, 76, 52);
      ctx.restore();
    } else {
      ctx.font = "52px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#6f2858";
      ctx.fillText("😾", 0, 2);
    }

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(-18, -6, 6, 0, Math.PI * 2);
    ctx.arc(18, -6, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#6f2858";
    ctx.beginPath();
    ctx.arc(-18, -6, 2.3, 0, Math.PI * 2);
    ctx.arc(18, -6, 2.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#6f2858";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-6, 10); ctx.lineTo(-26, 6);
    ctx.moveTo(-6, 13); ctx.lineTo(-26, 16);
    ctx.moveTo(6, 10); ctx.lineTo(26, 6);
    ctx.moveTo(6, 13); ctx.lineTo(26, 16);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 6); ctx.lineTo(-4, 12); ctx.lineTo(4, 12); ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-10, 18);
    ctx.quadraticCurveTo(0, 24, 10, 18);
    ctx.stroke();
    ctx.restore();

    const barW = field.w - 24;
    roundRectPath(field.x + 12, field.y + 8, barW, 12, 8);
    ctx.fillStyle = "rgba(255,255,255,.3)";
    ctx.fill();
    roundRectPath(field.x + 12, field.y + 8, barW * Math.max(0, boss.hp / boss.maxHp), 12, 8);
    ctx.fillStyle = "#ff5d86";
    ctx.fill();

    if(boss.beam){
      const beamX = boss.beam.x;
      if(boss.beam.state === "charge"){
        ctx.strokeStyle = "rgba(255,255,255,.75)";
        ctx.lineWidth = 2;
        ctx.setLineDash([8,8]);
        ctx.beginPath();
        ctx.moveTo(beamX, boss.y + boss.h - 6);
        ctx.lineTo(beamX, field.y + field.h);
        ctx.stroke();
        ctx.setLineDash([]);
      } else {
        const gradB = ctx.createLinearGradient(beamX, boss.y, beamX, field.y + field.h);
        gradB.addColorStop(0, "rgba(255,255,255,.96)");
        gradB.addColorStop(.2, "rgba(255,122,170,.92)");
        gradB.addColorStop(1, "rgba(255,122,170,.12)");
        ctx.fillStyle = gradB;
        ctx.fillRect(beamX - 7, boss.y + boss.h - 6, 14, field.y + field.h - (boss.y + boss.h - 6));
      }
    }
  }

  function drawPaddle(){
    const theme = paddleTheme();
    const g = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    g.addColorStop(0, theme.top);
    g.addColorStop(1, theme.bottom);
    roundRectPath(paddle.x, paddle.y, paddle.w, paddle.h, 12);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.7)";
    ctx.stroke();

    ctx.fillStyle = theme.accent;
    ctx.globalAlpha = 0.26;
    roundRectPath(paddle.x + 8, paddle.y + 3, paddle.w - 16, 5, 8);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = "#6f2858";
    ctx.font = "22px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(selectedChar.emoji, paddle.x + paddle.w/2, paddle.y - 8);
  }

  function drawBalls(){
    for(const ball of balls){
      for(let i=0; i<ball.trail.length; i++){
        const t = ball.trail[i];
        ctx.globalAlpha = (i + 1) / ball.trail.length * 0.16;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.r * (i + 1) / ball.trail.length, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#9fd7ff";
      ctx.beginPath();
      ctx.arc(ball.x - 2, ball.y - 2, ball.r * 0.55, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawItems(){
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for(const item of items){
      ctx.fillStyle = "rgba(255,255,255,.92)";
      ctx.beginPath();
      ctx.arc(item.x, item.y, item.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,99,173,.45)";
      ctx.stroke();
      ctx.font = "18px sans-serif";
      ctx.fillText(item.emoji, item.x, item.y + 1);
    }
  }

  function drawPlayerShots(){
    for(const s of playerShots){
      const grad = ctx.createLinearGradient(s.x, s.y, s.x, s.y + 20);
      grad.addColorStop(0, "rgba(255,255,255,.95)");
      grad.addColorStop(1, "rgba(255,122,190,.05)");
      ctx.fillStyle = grad;
      ctx.fillRect(s.x - 2.8, s.y - 16, 5.6, 20);
      ctx.fillStyle = "#fff2a3";
      ctx.beginPath();
      ctx.arc(s.x, s.y - 16, 3.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawRings(){
    for(const r of rings){
      ctx.globalAlpha = r.life;
      ctx.strokeStyle = r.color;
      ctx.lineWidth = r.line;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles(){
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.font = "18px sans-serif";
      ctx.fillText(p.emoji, p.x, p.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawCatDash(){
    if(!catDash.active) return;

    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.10)";
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "#ffd84d";
    ctx.font = "900 34px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("猫ラッシュ!", W/2, field.y + field.h * 0.32);

    for(let i=0; i<catDash.trail.length; i++){
      const t = catDash.trail[i];
      const a = (i + 1) / catDash.trail.length * 0.18;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(t.x, t.y);
      ctx.rotate(t.rot);

      if(catReady){
        ctx.beginPath();
        ctx.arc(0, 0, 34, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(catImg, -34, -34, 68, 68);
      } else {
        ctx.font = "56px sans-serif";
        ctx.fillText("🐱", 0, 0);
      }
      ctx.restore();
    }

    ctx.save();
    ctx.translate(catDash.x, catDash.y);
    ctx.rotate(catDash.rot);

    ctx.fillStyle = "rgba(255,216,77,.35)";
    for(let i=0; i<5; i++){
      ctx.beginPath();
      ctx.arc(
        Math.cos(i * 1.25) * 42,
        Math.sin(i * 1.25) * 20,
        4 + (i % 2) * 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    if(catReady){
      ctx.beginPath();
      ctx.arc(0, 0, 42, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(catImg, -42, -42, 84, 84);
    } else {
      ctx.font = "72px sans-serif";
      ctx.fillText("🐱", 0, 0);
    }

    ctx.restore();
    ctx.restore();
  }

  function updateBoss(dt){
    if(!boss) return;

    boss.bob += dt * 4.5;
    boss.x += boss.vx * dt * 60;
    if(boss.x < field.x + 12 || boss.x + boss.w > field.x + field.w - 12){
      boss.vx *= -1;
      boss.x = Math.max(field.x + 12, Math.min(field.x + field.w - boss.w - 12, boss.x));
    }
    boss.flash *= 0.88;

    boss.beamTimer += dt;
    if(!boss.beam && boss.beamTimer >= boss.beamGap){
      boss.beamTimer = 0;
      boss.beam = {
        x: boss.x + boss.w/2,
        state:"charge",
        timer:0.55,
        hit:false
      };
    }

    if(boss.beam){
      boss.beam.timer -= dt;
      if(boss.beam.state === "charge" && boss.beam.timer <= 0){
        boss.beam.state = "fire";
        boss.beam.timer = 0.48;
      } else if(boss.beam.state === "fire" && boss.beam.timer <= 0){
        boss.beam = null;
      }

      if(boss.beam && boss.beam.state === "fire"){
        const bx = boss.beam.x;
        const paddleHit = bx >= paddle.x && bx <= paddle.x + paddle.w;
        if(paddleHit && !boss.beam.hit){
          boss.beam.hit = true;
          burst(bx, paddle.y, "💥", 10);
          addRing(bx, paddle.y, "rgba(255,120,160,.95)", 70, 5);
          loseLife();
          return;
        }
      }
    }
  }

  function handlePaddleHit(ball, now){
    playTap(620);
    playPaddleNyah();
    say("ニヤッ!", 360);
    worldFlash = Math.max(worldFlash, 0.08);
    shake = Math.max(shake, 3.5);

    if(magnetCharges > 0 && now < magnetUntil){
      ball.stuck = true;
      ball.stuckOffsetX = Math.max(ball.r, Math.min(paddle.w - ball.r, ball.x - paddle.x));
      magnetCharges--;
      burst(ball.x, paddle.y, "🧲", 9);
      updateHud();
      return true;
    }

    const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
    const minSpeed = currentPerks().launchSpeed;
    const currentSpeed = Math.hypot(ball.vx, ball.vy);
    const nextSpeed = Math.max(minSpeed, Math.min(currentSpeed * 0.94, minSpeed + 1.1));

    ball.vx = hit * nextSpeed * 0.92;
    ball.vy = -Math.sqrt(Math.max(minSpeed * minSpeed * 0.9, nextSpeed * nextSpeed - ball.vx * ball.vx));

    burst(ball.x, paddle.y, "🐾", 9);
    addRing(ball.x, paddle.y, "rgba(255,240,180,.95)", 48, 4);
    return false;
  }

  function hitRect(ball, rect){
    return ball.x + ball.r > rect.x &&
           ball.x - ball.r < rect.x + rect.w &&
           ball.y + ball.r > rect.y &&
           ball.y - ball.r < rect.y + rect.h;
  }

  function reflectBall(ball, rect){
    const prevX = ball.x - ball.vx;
    const prevY = ball.y - ball.vy;
    const fromLeft = prevX + ball.r <= rect.x;
    const fromRight = prevX - ball.r >= rect.x + rect.w;
    const fromTop = prevY + ball.r <= rect.y;
    const fromBottom = prevY - ball.r >= rect.y + rect.h;

    if(fromLeft || fromRight) ball.vx *= -1;
    else if(fromTop || fromBottom) ball.vy *= -1;
    else ball.vy *= -1;
  }

  function updateItems(dt){
    for(let i=items.length - 1; i>=0; i--){
      const it = items[i];
      it.x += it.vx * dt * 60;
      it.y += it.vy * dt * 60;
      if(it.y - it.r > H){
        items.splice(i, 1);
        continue;
      }
      const got = it.x + it.r > paddle.x && it.x - it.r < paddle.x + paddle.w && it.y + it.r > paddle.y && it.y - it.r < paddle.y + paddle.h;
      if(got){
        burst(it.x, it.y, it.emoji, 10);
        applyItem(it.type);
        items.splice(i, 1);
      }
    }
  }

  function spawnPlayerShot(){
    const theme = paddleTheme();
    const px = paddle.x + paddle.w/2 + rand(-paddle.w * 0.24, paddle.w * 0.24);
    playerShots.push({ x:px, y:paddle.y - 4, vy:-10.5, col:theme.accent });
    playTap(980);
  }

  function updatePlayerShots(dt){
    for(let i=playerShots.length - 1; i>=0; i--){
      const s = playerShots[i];
      s.y += s.vy * dt * 60;

      if(s.y < field.y - 26){
        playerShots.splice(i, 1);
        continue;
      }

      if(stageMode === "boss" && boss){
        const rect = { x:boss.x, y:boss.y, w:boss.w, h:boss.h };
        if(s.x > rect.x && s.x < rect.x + rect.w && s.y > rect.y && s.y < rect.y + rect.h){
          boss.hp -= 1;
          boss.flash = 1;
          score += 4;
          addSkill(2);
          burst(s.x, s.y, "💥", 8);
          worldFlash = Math.max(worldFlash, 0.08);
          playerShots.splice(i, 1);

          if(boss.hp <= 0){
            score += 120;
            boss = null;
            goNextStage();
            return;
          }
          continue;
        }
      } else {
        let hit = false;
        for(const b of blocks){
          if(!b.alive) continue;
          if(s.x < b.x || s.x > b.x + b.w || s.y < b.y || s.y > b.y + b.h) continue;

          if(!Number.isFinite(b.hp)){
            burst(s.x, s.y, "💥", 5);
            playerShots.splice(i, 1);
            hit = true;
            break;
          }

          b.hp -= 1;
          score += b.maxHp >= 3 ? 8 : b.maxHp === 2 ? 6 : 5;
          addSkill(2);
          burst(s.x, s.y, "✨", 8);
          worldFlash = Math.max(worldFlash, 0.06);

          if(b.hp <= 0){
            b.alive = false;
            spawnItem(b.x + b.w/2, b.y + b.h/2);
          }

          playerShots.splice(i, 1);
          hit = true;
          break;
        }
        if(hit) continue;
      }
    }
  }

  function updateParticles(dt){
    for(let i=particles.length - 1; i>=0; i--){
      const p = particles[i];
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy += 0.03 * dt * 60;
      p.life -= 0.03 * dt * 60;
      if(p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateRings(dt){
    for(let i=rings.length - 1; i>=0; i--){
      const r = rings[i];
      r.r += (r.maxR - r.r) * 0.18;
      r.life -= dt * 2.1;
      if(r.life <= 0) rings.splice(i, 1);
    }
  }

  function update(dt){
    if(state !== "playing") return;

    const now = performance.now();

    const basePaddle = currentPerks().basePaddle;
    if(now < paddleBoostUntil){
      paddle.w += (170 - paddle.w) * 0.15;
    } else {
      paddle.w += (basePaddle - paddle.w) * 0.14;
    }

    paddle.x += ((pointerX - paddle.w/2) - paddle.x) * Math.min(1, 0.25 * dt * 60);
    paddle.x = Math.max(field.x + 8, Math.min(field.x + field.w - paddle.w - 8, paddle.x));

    if(catDash.active){
      catDash.trail.push({ x: catDash.x, y: catDash.y, rot: catDash.rot });
      if(catDash.trail.length > 8) catDash.trail.shift();
      catDash.x += 26 * dt * 60;
      catDash.y += Math.sin(now / 90) * 1.8;
      catDash.rot += 0.045 * dt * 60;
      if(now > catDash.until){
        catDash.active = false;
        catDash.trail = [];
      }
    }

    if(stageMode === "boss") updateBoss(dt);
    if(state !== "playing") return;

    if(now < rapidUntil){
      rapidShotCooldown -= dt;
      while(rapidShotCooldown <= 0){
        rapidShotCooldown += 0.16;
        spawnPlayerShot();
      }
    }

    updatePlayerShots(dt);
    if(state !== "playing") return;

    for(let i=balls.length - 1; i>=0; i--){
      const ball = balls[i];

      if(ball.stuck){
        ball.x = paddle.x + ball.stuckOffsetX;
        ball.y = paddle.y - ball.r - 2;
        continue;
      }

      ball.trail.push({ x:ball.x, y:ball.y });
      if(ball.trail.length > 6) ball.trail.shift();

      ball.x += ball.vx * dt * 60;
      ball.y += ball.vy * dt * 60;

      if(ball.x < field.x + ball.r){
        ball.x = field.x + ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if(ball.x > field.x + field.w - ball.r){
        ball.x = field.x + field.w - ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if(ball.y < field.y + ball.r){
        ball.y = field.y + ball.r;
        ball.vy *= -1;
        playTap(420);
      }

      if(
        ball.y + ball.r > paddle.y &&
        ball.y - ball.r < paddle.y + paddle.h &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.w &&
        ball.vy > 0
      ){
        const stuckNow = handlePaddleHit(ball, now);
        if(stuckNow) continue;
      }

      if(stageMode === "boss" && boss){
        const rect = { x:boss.x, y:boss.y, w:boss.w, h:boss.h };
        if(hitRect(ball, rect)){
          boss.hp -= 1;
          boss.flash = 1;
          score += 16;
          addSkill(6);
          burst(ball.x, ball.y, "⭐", 12);
          worldFlash = Math.max(worldFlash, 0.08);
          shake = Math.max(shake, 4.8);
          playTap(920);
          reflectBall(ball, rect);
          if(boss.hp <= 0){
            score += 120;
            boss = null;
            goNextStage();
            return;
          }
          updateHud();
        }

        if(boss && boss.beam && boss.beam.state === "fire"){
          const bx = boss.beam.x;
          if(ball.x + ball.r > bx - 7 && ball.x - ball.r < bx + 7 && ball.y > boss.y + boss.h - 8){
            ball.vy *= -1;
            ball.vx *= 0.96;
            burst(ball.x, ball.y, "⚡", 7);
          }
        }
      } else {
        for(const b of blocks){
          if(!b.alive) continue;
          if(!hitRect(ball, b)) continue;

          if(!Number.isFinite(b.hp)){
            reflectBall(ball, b);
            burst(b.x + b.w/2, b.y + b.h/2, "💥", 6);
            shake = Math.max(shake, 2.6);
            playTap(280);
            break;
          }

          b.hp -= 1;
          score += b.maxHp >= 3 ? 14 : b.maxHp === 2 ? 12 : 10;
          addSkill(6);
          burst(b.x + b.w/2, b.y + b.h/2, "✨", 10);
          worldFlash = Math.max(worldFlash, 0.06);
          shake = Math.max(shake, 2.8);

          if(b.hp <= 0){
            b.alive = false;
            playTap(860);
            spawnItem(b.x + b.w/2, b.y + b.h/2);
            burst(b.x + b.w/2, b.y + b.h/2, "💫", 12);
          } else {
            playTap(560);
          }

          reflectBall(ball, b);
          if(score % 100 === 0) showMessage("GREAT!", 520);
          updateHud();
          break;
        }
      }

      if(ball.y > field.y + field.h + 44){
        balls.splice(i, 1);
      }
    }

    if(stageMode === "boss" && balls.length > 1){
      balls = [balls[0]];
    }

    if(balls.length === 0){
      loseLife();
      return;
    }

    if(stageMode === "breakout"){
      const remainingBreakable = blocks.some(b => b.alive && Number.isFinite(b.hp));
      if(!remainingBreakable){
        goNextStage();
        return;
      }
    }

    updateItems(dt);
    updateParticles(dt);
    updateRings(dt);

    if(shake > 0.08) shake *= 0.88;
    else shake = 0;

    if(damageFlash > 0.02) damageFlash *= 0.88;
    else damageFlash = 0;

    if(worldFlash > 0.01) worldFlash *= 0.86;
    else worldFlash = 0;

    updateMusic(dt);
    updateHud();
  }

  function draw(){
    ctx.save();
    if(shake > 0){
      ctx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
    }
    drawBackground();
    if(stageMode === "boss") drawBoss();
    else drawBlocks();
    drawItems();
    drawPlayerShots();
    drawPaddle();
    drawBalls();
    drawRings();
    drawParticles();
    ctx.restore();
    drawCatDash();
  }

  function loop(ts){
    if(!lastTime) lastTime = ts;
    const dt = Math.min(0.033, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function setPointerX(clientX){
    const rect = canvas.getBoundingClientRect();
    pointerX = clientX - rect.left;
  }

  function releaseStuckBalls(){
    let released = false;
    for(const ball of balls){
      if(ball.stuck){
        ball.stuck = false;
        const hit = (pointerX - (paddle.x + paddle.w/2)) / (paddle.w/2);
        ball.vx = hit * 5.2;
        ball.vy = -Math.max(currentPerks().launchSpeed, 4.8);
        released = true;
      }
    }
    if(released) playTap(760);
  }

  canvas.addEventListener("pointerdown", e => {
    unlockAudio();
    setPointerX(e.clientX);
    releaseStuckBalls();
  });

  canvas.addEventListener("pointermove", e => {
    setPointerX(e.clientX);
  });

  canvas.addEventListener("touchstart", () => {
    unlockAudio();
  }, {passive:true});

  skillButton.addEventListener("click", () => {
    unlockAudio();
    useSkill();
  });

  window.addEventListener("resize", () => {
    resize();
    if(state === "playing"){
      paddle.x = Math.max(field.x + 8, Math.min(field.x + field.w - paddle.w - 8, paddle.x));
      paddle.y = field.y + field.h - 24;
    }
  });

  loadCat();
  resize();
  updateHud();
  renderTitle();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
