<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヒデちゃん&猫ちゃん ブロック崩し DX</title>
<style>
  :root{
    --bg1:#ffd9ea;
    --bg2:#f6bfd8;
    --bg3:#ee9fc5;
    --ink:#6f2858;
    --white:#fffdfd;
    --pink:#ff63ad;
    --yellow:#ffd84d;
    --shadow:0 10px 24px rgba(0,0,0,.18);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    font-family:
      "Hiragino Maru Gothic ProN",
      "Hiragino Sans",
      "Yu Gothic",
      system-ui,
      sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));
  }

  #app{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
  }

  canvas{
    display:block;
    width:100%;
    height:100%;
  }

  #hud{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    z-index:20;
    pointer-events:none;
  }

  .col{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .panel{
    min-width:118px;
    padding:10px 14px;
    border-radius:18px;
    background:rgba(255,255,255,.52);
    border:1px solid rgba(255,255,255,.85);
    box-shadow:var(--shadow);
    backdrop-filter:blur(6px);
  }

  .label{
    font-size:11px;
    font-weight:700;
    color:#9e5a83;
    margin-bottom:4px;
  }

  .value{
    font-size:18px;
    font-weight:900;
    color:var(--ink);
    white-space:nowrap;
  }

  #catBadge{
    position:absolute;
    right:12px;
    top:108px;
    width:76px;
    height:76px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:var(--shadow);
    z-index:21;
  }

  #catBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  #catBadgeFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
  }

  #catSkillBadge{
    position:absolute;
    left:14px;
    bottom:98px;
    width:64px;
    height:64px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.25);
    box-shadow:var(--shadow);
    z-index:21;
    opacity:0;
    transform:scale(.8);
    transition:opacity .18s ease, transform .18s ease;
    pointer-events:none;
  }

  #catSkillBadge.show{
    opacity:1;
    transform:scale(1);
  }

  #catSkillBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  #catSkillFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
  }

  #catTalk{
    position:absolute;
    right:10px;
    top:188px;
    z-index:21;
    font-size:13px;
    font-weight:900;
    color:#fff6a8;
    text-shadow:0 2px 8px rgba(0,0,0,.25);
  }

  #message{
    position:absolute;
    top:34%;
    left:50%;
    transform:translateX(-50%);
    z-index:25;
    font-size:clamp(28px, 9vw, 54px);
    font-weight:900;
    color:var(--yellow);
    text-shadow:0 0 14px rgba(0,0,0,.22);
    pointer-events:none;
    opacity:0;
    transition:opacity .18s ease;
    white-space:nowrap;
  }

  #skillWrap{
    position:absolute;
    left:14px;
    right:92px;
    bottom:18px;
    z-index:20;
  }

  #skillLabel{
    font-size:12px;
    color:#fff;
    margin-bottom:6px;
    text-shadow:0 2px 6px rgba(0,0,0,.25);
  }

  #skillBar{
    height:16px;
    border-radius:999px;
    background:rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.65);
    overflow:hidden;
    box-shadow:var(--shadow);
  }

  #skillFill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#72e5ff,#9cff8b,#ffe56a);
    border-radius:999px;
    transition:width .1s linear;
    box-shadow:0 0 16px rgba(126,255,211,.6);
  }

  #skillBtn{
    position:absolute;
    right:14px;
    bottom:14px;
    width:68px;
    height:68px;
    border:none;
    border-radius:50%;
    font-size:28px;
    font-weight:900;
    color:#7a3b00;
    background:linear-gradient(180deg,#fff08e,#ffb833);
    box-shadow:0 8px 0 #d98f00, 0 12px 18px rgba(0,0,0,.18);
    z-index:22;
  }

  #skillBtn:active{
    transform:translateY(4px);
    box-shadow:0 4px 0 #d98f00, 0 8px 14px rgba(0,0,0,.16);
  }

  #skillBtn.disabled{
    opacity:.5;
    filter:grayscale(.7);
  }

  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:40;
    background:rgba(255,228,239,.34);
    backdrop-filter:blur(4px);
  }

  #overlay.hidden{
    display:none;
  }

  .card{
    width:min(94vw,460px);
    padding:22px 18px 20px;
    border-radius:28px;
    background:linear-gradient(180deg,rgba(255,255,255,.64),rgba(255,255,255,.38));
    border:1px solid rgba(255,255,255,.9);
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    text-align:center;
    color:var(--ink);
  }

  .bigCat{
    font-size:72px;
    line-height:1;
    margin-bottom:10px;
  }

  .title{
    font-size:clamp(28px, 7vw, 42px);
    font-weight:900;
    line-height:1.14;
    color:#ff5aa5;
    margin-bottom:10px;
    text-shadow:0 0 14px rgba(255,90,165,.2);
  }

  .sub{
    font-size:14px;
    line-height:1.6;
    color:#8f5377;
    margin-bottom:16px;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:16px 28px;
    font-size:22px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(180deg,#ff60ae,#ff2c92);
    box-shadow:0 8px 0 #b81f69, 0 10px 16px rgba(0,0,0,.16);
  }

  .btn:active{
    transform:translateY(4px);
    box-shadow:0 4px 0 #b81f69, 0 8px 12px rgba(0,0,0,.14);
  }

  .charGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:16px 0 12px;
  }

  .charBtn{
    border:none;
    border-radius:20px;
    padding:14px 10px;
    background:rgba(255,255,255,.48);
    border:2px solid rgba(255,255,255,.7);
    color:var(--ink);
    box-shadow:var(--shadow);
    font:inherit;
  }

  .charBtn .emoji{
    font-size:40px;
    line-height:1.1;
  }

  .charBtn .name{
    font-size:17px;
    font-weight:900;
    margin-top:4px;
  }

  .charBtn .skill{
    font-size:11px;
    line-height:1.45;
    color:#8f5377;
    margin-top:4px;
  }

  .tiny{
    font-size:11px;
    line-height:1.5;
    color:#8f5377;
    margin-top:10px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="col">
      <div class="panel">
        <div class="label">SCORE</div>
        <div class="value" id="scoreText">0</div>
      </div>
      <div class="panel">
        <div class="label">LIFE</div>
        <div class="value" id="lifeText">3</div>
      </div>
    </div>

    <div class="col">
      <div class="panel">
        <div class="label">STAGE</div>
        <div class="value" id="stageText">1 / 20</div>
      </div>
      <div class="panel">
        <div class="label">BEST</div>
        <div class="value" id="bestText">0</div>
      </div>
    </div>
  </div>

  <div id="catBadge">
    <img id="catBadgeImg" alt="cat">
    <div id="catBadgeFallback">🐱</div>
  </div>

  <div id="catSkillBadge">
    <img id="catSkillImg" alt="cat">
    <div id="catSkillFallback">🐱</div>
  </div>

  <div id="catTalk">にゃっ</div>
  <div id="message"></div>

  <div id="skillWrap">
    <div id="skillLabel">✨ ねこラッシュゲージ</div>
    <div id="skillBar"><div id="skillFill"></div></div>
  </div>
  <button id="skillBtn" class="disabled">✨</button>

  <div id="overlay"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreText = document.getElementById("scoreText");
  const lifeText = document.getElementById("lifeText");
  const stageText = document.getElementById("stageText");
  const bestText = document.getElementById("bestText");
  const skillFill = document.getElementById("skillFill");
  const skillBtn = document.getElementById("skillBtn");
  const message = document.getElementById("message");
  const catTalk = document.getElementById("catTalk");
  const overlay = document.getElementById("overlay");
  const catBadgeImg = document.getElementById("catBadgeImg");
  const catSkillImg = document.getElementById("catSkillImg");
  const catBadgeFallback = document.getElementById("catBadgeFallback");
  const catSkillFallback = document.getElementById("catSkillFallback");
  const catSkillBadge = document.getElementById("catSkillBadge");

  const INK = "#6f2858";
  const MAX_STAGE = 20;
  const WORDS = [
    "夢","仕事","健康","旅行","ダイエット","ポテチ","睡眠","散歩",
    "筋トレ","ラーメン","貯金","ごほうび","野菜","チョコ","読書","有休",
    "温泉","締切","休日","猫","会議","サボり","水","お菓子"
  ];
  const COLORS = [
    "#ffd7a8","#bfe7ff","#c8ffd8","#e8c8ff","#ffd4e5","#fff0b8"
  ];

  const CHARACTERS = [
    {
      id:"hide",
      emoji:"😄",
      name:"ヒデ",
      skillName:"キラキラ",
      desc:"全ブロックに1ダメージ",
      use(){
        let hits = 0;
        for (const b of blocks) {
          if (!b.alive || !Number.isFinite(b.hp)) continue;
          b.hp -= 1;
          hits++;
          burst(b.x + b.w/2, b.y + b.h/2, "✨", 5);
          if (b.hp <= 0) {
            b.alive = false;
            score += 10;
          }
        }
        if (hits > 0) {
          say("キラッ");
          showMessage("キラキラ!", 700);
        }
      }
    },
    {
      id:"cat",
      emoji:"🐱",
      name:"ネコ",
      skillName:"ねこラッシュ",
      desc:"5秒強化 + 3ボール",
      use(){
        catRushUntil = performance.now() + 5000;
        dashFx.active = true;
        dashFx.x = -120;
        dashFx.until = performance.now() + 700;

        playMeow();
        say("にゃーー!");
        showMessage("ねこラッシュ!", 750);

        for (const ball of balls) {
          ball.pierceUntil = catRushUntil;
          ball.vx *= 1.12;
          ball.vy *= 1.12;
        }
        while (balls.length < 3) {
          const extra = createBall(balls.length === 1 ? -5 : 5);
          extra.pierceUntil = catRushUntil;
          balls.push(extra);
        }
      }
    },
    {
      id:"bear",
      emoji:"🐻",
      name:"クマ",
      skillName:"どっしり",
      desc:"パドル巨大化 8秒",
      use(){
        paddleBoostUntil = performance.now() + 8000;
        say("どーん");
        showMessage("BIG PAD!", 700);
      }
    },
    {
      id:"rabbit",
      emoji:"🐰",
      name:"ウサ",
      skillName:"ぴょんスロー",
      desc:"ゆっくり 5秒",
      use(){
        slowUntil = performance.now() + 5000;
        say("ぴょん!");
        showMessage("SLOW!", 700);
      }
    }
  ];

  let selectedChar = CHARACTERS[1];

  let W = 0;
  let H = 0;
  const DPR = Math.min(2, window.devicePixelRatio || 1);

  let state = "title";
  let stage = 1;
  let score = 0;
  let lives = 3;
  let skill = 0;
  let best = Number(localStorage.getItem("hidecat_fun_best_v3") || 0);

  let touchX = 0;
  let shake = 0;
  let damageFlash = 0;
  let lastTime = 0;
  let lastPaddleMeow = 0;

  let paddle = { x:0, y:0, w:116, h:18 };
  let balls = [];
  let blocks = [];
  let particles = [];
  let stars = [];
  let boss = null;
  let bossStages = new Set();

  let catRushUntil = 0;
  let paddleBoostUntil = 0;
  let slowUntil = 0;
  let dashFx = { active:false, x:-120, until:0 };

  let catImg = new Image();
  let catReady = false;
  const CAT_CANDIDATES = ["./cat.png.JPG","./cat.jpg","./cat.jpeg","./cat.png"];

  let audioCtx = null;
  let musicTimer = null;
  let musicStep = 0;

  function loadCat(i=0){
    if(i >= CAT_CANDIDATES.length) return;
    catImg = new Image();
    catImg.onload = () => {
      catReady = true;
      catBadgeImg.src = catImg.src;
      catSkillImg.src = catImg.src;
      catBadgeImg.style.display = "block";
      catSkillImg.style.display = "block";
      catBadgeFallback.style.display = "none";
      catSkillFallback.style.display = "none";
    };
    catImg.onerror = () => loadCat(i + 1);
    catImg.src = CAT_CANDIDATES[i];
  }

  function unlockAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
  }

  function midiToFreq(m){
    return 440 * Math.pow(2, (m - 69) / 12);
  }

  function playTone(time, freq, dur, type="triangle", vol=0.03){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(vol, time + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + dur + 0.03);
  }

  function playTap(freq=520){
    if(!audioCtx) return;
    playTone(audioCtx.currentTime, freq, 0.08, "square", 0.02);
  }

  function playDamage(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    playTone(t, 170, 0.16, "sawtooth", 0.035);
    playTone(t + 0.05, 125, 0.22, "sawtooth", 0.03);
  }

  function playMeow(){
    if(!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(680, now);
    osc.frequency.exponentialRampToValueAtTime(430, now + 0.16);
    osc.frequency.exponentialRampToValueAtTime(520, now + 0.30);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.04, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.33);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  }

  function playPaddleMeow(){
    if(!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(760, now);
    osc.frequency.exponentialRampToValueAtTime(560, now + 0.08);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.028, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.14);
  }

  const CANON = [
    [62,66,69],[57,61,64],[59,62,66],[54,57,61],
    [55,59,62],[62,66,69],[55,59,62],[57,61,64]
  ];

  function tickMusic(){
    if(!audioCtx || state !== "playing") return;

    // 16分っぽいトランス感
    const chord = CANON[Math.floor(musicStep / 8) % CANON.length];
    const stepInChord = musicStep % 8;
    const t = audioCtx.currentTime + 0.01;

    const arpPattern = [0,1,2,1,2,1,0,1];
    const arpNote = chord[arpPattern[stepInChord]] + 12;
    playTone(t, midiToFreq(arpNote), 0.10, "square", 0.012);

    if(stepInChord === 1 || stepInChord === 3 || stepInChord === 5 || stepInChord === 7){
      playTone(t, 4200, 0.03, "square", 0.006);
    }

    if(stepInChord === 0 || stepInChord === 4){
      playTone(t, midiToFreq(chord[0] - 24), 0.18, "sine", 0.045);
      playTone(t, midiToFreq(chord[0] - 12), 0.10, "triangle", 0.012);
    }

    musicStep++;
  }

  function startMusic(){
    unlockAudio();
    stopMusic();
    musicStep = 0;
    tickMusic();
    musicTimer = setInterval(tickMusic, 110);
  }

  function stopMusic(){
    if(musicTimer){
      clearInterval(musicTimer);
      musicTimer = null;
    }
  }

  function showMessage(text, ms=650){
    message.textContent = text;
    message.style.opacity = "1";
    clearTimeout(showMessage._timer);
    showMessage._timer = setTimeout(() => {
      message.style.opacity = "0";
    }, ms);
  }

  function say(text){
    catTalk.textContent = text;
    clearTimeout(say._timer);
    say._timer = setTimeout(() => {
      catTalk.textContent = "にゃっ";
    }, 800);
  }

  function saveBest(){
    if(score > best){
      best = score;
      localStorage.setItem("hidecat_fun_best_v3", String(best));
    }
  }

  function updateHud(){
    scoreText.textContent = score;
    lifeText.textContent = lives;
    stageText.textContent = `${stage} / ${MAX_STAGE}`;
    bestText.textContent = best;
    skillFill.style.width = `${Math.max(0, Math.min(100, skill))}%`;
    skillBtn.classList.toggle("disabled", !(state === "playing" && skill >= 100));
    catSkillBadge.classList.toggle("show", performance.now() < catRushUntil || dashFx.active);
  }

  function createBall(vx = null){
    return {
      x: W / 2,
      y: H - 150,
      vx: vx ?? (Math.random() > 0.5 ? 4.2 : -4.2),
      vy: -6.2,
      r: 10,
      trail:[],
      pierceUntil:0
    };
  }

  function resetBalls(){
    balls = [createBall()];
  }

  function generateBossStages(){
    const candidates = [];
    for(let s=4; s<MAX_STAGE; s++){
      candidates.push(s);
    }
    for(let i=candidates.length - 1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    bossStages = new Set(candidates.slice(0, 4));
  }

  function stagePattern(stageNum, r, c, rows, cols){
    const p = (stageNum - 1) % 8;
    const centerR = (rows - 1) / 2;
    const centerC = (cols - 1) / 2;
    const dr = Math.abs(r - centerR);
    const dc = Math.abs(c - centerC);

    switch(p){
      case 0: return true; // full
      case 1: return (r + c) % 2 === 0 || r < 2; // checker
      case 2: return !(r >= 1 && r <= rows - 2 && c === Math.floor(cols/2)); // tunnel
      case 3: return c <= (r % cols); // stairs
      case 4: return dr + dc <= 2.5; // diamond
      case 5: return (r % 2 === 0 ? c < cols - 1 : c > 0); // zigzag walls
      case 6: return r === 0 || r === rows - 1 || c === 0 || c === cols - 1 || (dr <= 0.5 && dc <= 1.5); // fortress
      case 7: return c !== Math.floor(cols/2) || r === 0 || r === rows - 1; // split
      default: return true;
    }
  }

  function createStageBlocks(stageNum){
    boss = null;
    blocks = [];
    const cols = 5;
    const rows = 6;
    const marginX = 16;
    const gapX = 10;
    const gapY = 10;
    const top = 120;
    const bw = (W - marginX * 2 - gapX * (cols - 1)) / cols;
    const bh = 30;

    const strong2Count = Math.min(2 + Math.floor(stageNum / 2), 8);
    const strong3Count = Math.min(Math.floor(stageNum / 4), 6);
    const wallCount = stageNum >= 3 ? Math.min(1 + Math.floor((stageNum - 3) / 3), 4) : 0;

    let candidateIndices = [];
    let idx = 0;
    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        if(stagePattern(stageNum, r, c, rows, cols)){
          candidateIndices.push(idx);
        }
        idx++;
      }
    }

    for(let i=candidateIndices.length - 1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [candidateIndices[i], candidateIndices[j]] = [candidateIndices[j], candidateIndices[i]];
    }

    const wallSet = new Set(candidateIndices.slice(0, wallCount));
    const strong3Set = new Set(candidateIndices.slice(wallCount, wallCount + strong3Count));
    const strong2Set = new Set(candidateIndices.slice(wallCount + strong3Count, wallCount + strong3Count + strong2Count));

    idx = 0;
    let wordShift = stageNum * 3;

    for(let r=0; r<rows; r++){
      for(let c=0; c<cols; c++){
        if(!stagePattern(stageNum, r, c, rows, cols)){
          idx++;
          continue;
        }

        let hp = 1;
        let type = "normal";
        let label = WORDS[(idx + wordShift) % WORDS.length];
        let color = COLORS[(idx + stageNum) % COLORS.length];

        if(wallSet.has(idx)){
          hp = Infinity;
          type = "wall";
          label = "壁";
          color = "#b88aa3";
        } else if(strong3Set.has(idx)){
          hp = 3;
          type = "strong3";
        } else if(strong2Set.has(idx)){
          hp = 2;
          type = "strong2";
        }

        blocks.push({
          x: marginX + c * (bw + gapX),
          y: top + r * (bh + gapY),
          w: bw,
          h: bh,
          label,
          color,
          hp,
          maxHp: hp,
          alive:true,
          type
        });

        idx++;
      }
    }
  }

  function createBoss(stageNum){
    blocks = [];
    const maxHp = 18 + stageNum * 3;
    boss = {
      x: W/2 - 52,
      y: 130,
      w: 104,
      h: 74,
      hp: maxHp,
      maxHp,
      vx: 2.4 + stageNum * 0.05,
      bullets: [],
      shotTimer: 0,
      flash: 0,
      phase: 1
    };
  }

  function buildStars(){
    stars = [];
    for(let i=0; i<36; i++){
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 2 + 0.5,
        a: Math.random() * 0.5 + 0.15
      });
    }
  }

  function burst(x, y, emoji="✨", count=8){
    for(let i=0; i<count; i++){
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 0.5,
        life: 1,
        emoji
      });
    }
  }

  function isBossStage(s){
    return bossStages.has(s);
  }

  function loadStage(s){
    catRushUntil = 0;
    dashFx.active = false;
    resetBalls();
    if(isBossStage(s)){
      createBoss(s);
      showMessage(`BOSS ${s}`, 850);
      say("ボスにゃ!");
    } else {
      createStageBlocks(s);
      showMessage(`STAGE ${s}`, 700);
    }
    paddle.x = W / 2 - paddle.w / 2;
    paddle.y = H - 110;
    updateHud();
  }

  function startGame(){
    unlockAudio();
    startMusic();

    state = "playing";
    stage = 1;
    score = 0;
    lives = 3;
    skill = 0;
    touchX = W / 2;
    shake = 0;
    damageFlash = 0;
    particles = [];
    dashFx.active = false;
    catRushUntil = 0;
    paddleBoostUntil = 0;
    slowUntil = 0;

    paddle.w = 116;
    paddle.h = 18;
    paddle.x = W / 2 - paddle.w / 2;
    paddle.y = H - 110;

    generateBossStages();
    loadStage(stage);
    updateHud();
    overlay.classList.add("hidden");
  }

  function goNextStage(){
    if(stage >= MAX_STAGE){
      endGame(true);
      return;
    }
    stage++;
    skill = Math.min(100, skill + 15);
    loadStage(stage);
  }

  function loseLife(){
    lives--;
    damageFlash = 1;
    shake = 12;
    playDamage();
    updateHud();

    if(lives <= 0){
      endGame(false);
      return;
    }

    resetBalls();
    if(boss) boss.bullets = [];
    showMessage("もういっかい!", 700);
    say("ふにゃ…");
  }

  function endGame(clear){
    state = clear ? "clear" : "gameover";
    stopMusic();
    saveBest();
    updateHud();
    overlay.classList.remove("hidden");
    overlay.innerHTML = `
      <div class="card">
        <div class="bigCat">🐱</div>
        <div class="title">${clear ? "20面クリア！" : "ざんねん…"}</div>
        <div class="sub">
          SCORE: <b>${score}</b><br>
          BEST: <b>${best}</b><br>
          STAGE: <b>${stage}</b>
        </div>
        <button class="btn" id="restartBtn">もういっかい！</button>
      </div>
    `;
    document.getElementById("restartBtn").onclick = renderTitle;
  }

  function renderTitle(){
    state = "title";
    overlay.classList.remove("hidden");
    overlay.innerHTML = `
      <div class="card">
        <div class="bigCat">🐱</div>
        <div class="title">ヒデちゃん&猫ちゃん<br>ブロック崩し DX</div>
        <div class="sub">
          左右ドラッグで移動<br>
          右下の ✨ は満タンで発動
        </div>
        <div class="charGrid">
          ${CHARACTERS.map((c, i) => `
            <button class="charBtn" data-i="${i}">
              <div class="emoji">${c.emoji}</div>
              <div class="name">${c.name}</div>
              <div class="skill">${c.skillName}<br>${c.desc}</div>
            </button>
          `).join("")}
        </div>
        <button class="btn" id="startBtn2">スタート！</button>
      </div>
    `;
    overlay.querySelectorAll(".charBtn").forEach(btn => {
      btn.onclick = () => {
        const i = Number(btn.dataset.i);
        selectedChar = CHARACTERS[i];
        say(i === 1 ? "主役にゃ!" : "いくにゃ");
      };
    });
    document.getElementById("startBtn2").onclick = startGame;
  }

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = `${W}px`;
    canvas.style.height = `${H}px`;
    ctx.setTransform(DPR,0,0,DPR,0,0);

    paddle.y = H - 110;
    if(!touchX) touchX = W / 2;
    buildStars();
  }

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawImageCover(img, x, y, w, h){
    const ir = img.width / img.height;
    const br = w / h;
    let dw, dh, dx, dy;
    if(ir > br){
      dh = h;
      dw = h * ir;
      dx = x - (dw - w) / 2;
      dy = y;
    } else {
      dw = w;
      dh = w / ir;
      dx = x;
      dy = y - (dh - h) / 2;
    }
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, "#ffd8ea");
    g.addColorStop(.52, "#f3bad5");
    g.addColorStop(1, "#ea96bd");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    for(const s of stars){
      ctx.globalAlpha = s.a;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if(catReady){
      const frameX = 18;
      const frameY = 120;
      const frameW = W - 36;
      const frameH = H * 0.46;

      ctx.save();
      ctx.globalAlpha = 0.34;
      roundRectPath(frameX, frameY, frameW, frameH, 24);
      ctx.clip();
      drawImageCover(catImg, frameX, frameY, frameW, frameH);
      ctx.restore();

      ctx.strokeStyle = "rgba(255,255,255,.58)";
      ctx.lineWidth = 2;
      roundRectPath(frameX, frameY, frameW, frameH, 24);
      ctx.stroke();
    }

    if(damageFlash > 0){
      ctx.fillStyle = `rgba(255,80,90,${0.22 * damageFlash})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawBlocks(){
    for(const b of blocks){
      if(!b.alive) continue;

      roundRectPath(b.x, b.y, b.w, b.h, 10);
      ctx.fillStyle = b.color;
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.stroke();

      ctx.fillStyle = INK;
      ctx.font = "bold 15px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 + 1);

      if(Number.isFinite(b.hp) && b.hp > 1){
        ctx.fillStyle = "#7c2b59";
        ctx.font = "bold 10px sans-serif";
        ctx.fillText(String(b.hp), b.x + b.w - 10, b.y + 10);
      }

      if(!Number.isFinite(b.hp)){
        ctx.fillStyle = "#fff";
        ctx.font = "bold 10px sans-serif";
        ctx.fillText("∞", b.x + b.w - 10, b.y + 10);
      }
    }
  }

  function drawBoss(){
    if(!boss) return;
    const grad = ctx.createLinearGradient(0, boss.y, 0, boss.y + boss.h);
    grad.addColorStop(0, boss.flash > 0.1 ? "#fff0a8" : "#ff9ac4");
    grad.addColorStop(1, boss.flash > 0.1 ? "#ffd34d" : "#ff6faa");

    roundRectPath(boss.x, boss.y, boss.w, boss.h, 20);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.55)";
    ctx.stroke();

    ctx.font = "54px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = INK;
    ctx.fillText("😾", boss.x + boss.w/2, boss.y + boss.h/2 + 2);

    const barW = W - 60;
    roundRectPath(30, 90, barW, 12, 8);
    ctx.fillStyle = "rgba(255,255,255,.3)";
    ctx.fill();
    roundRectPath(30, 90, barW * Math.max(0, boss.hp / boss.maxHp), 12, 8);
    ctx.fillStyle = "#ff5d86";
    ctx.fill();
  }

  function drawBossBullets(){
    if(!boss) return;
    for(const b of boss.bullets){
      ctx.fillStyle = "#ff6d8c";
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPaddle(){
    const g = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    g.addColorStop(0, "#fff3a5");
    g.addColorStop(1, "#ffbd52");
    roundRectPath(paddle.x, paddle.y, paddle.w, paddle.h, 12);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.fillStyle = INK;
    ctx.font = "22px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(selectedChar.emoji, paddle.x + paddle.w/2, paddle.y - 8);
  }

  function drawBalls(){
    for(const ball of balls){
      for(let i=0; i<ball.trail.length; i++){
        const t = ball.trail[i];
        ctx.globalAlpha = (i + 1) / ball.trail.length * 0.16;
        ctx.fillStyle = performance.now() < ball.pierceUntil ? "#ffd84d" : "#ffffff";
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.r * (i + 1) / ball.trail.length, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = performance.now() < ball.pierceUntil ? "#ffd84d" : "#fff";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#9fd7ff";
      ctx.beginPath();
      ctx.arc(ball.x - 2, ball.y - 2, ball.r * 0.55, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles(){
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.font = "18px sans-serif";
      ctx.fillText(p.emoji, p.x, p.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawDashFx(){
    if(!dashFx.active) return;
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.10)";
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "#ffd84d";
    ctx.font = "900 34px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("ねこラッシュ!", W/2, H * 0.34);

    if(catReady){
      const s = 88;
      const y = H * 0.5;
      ctx.save();
      ctx.beginPath();
      ctx.arc(dashFx.x + s/2, y, s/2, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(catImg, dashFx.x, y - s/2, s, s);
      ctx.restore();
    } else {
      ctx.font = "72px sans-serif";
      ctx.fillText("🐱", dashFx.x + 40, H * 0.5);
    }
    ctx.restore();
  }

  function update(dt){
    if(state !== "playing") return;

    const now = performance.now();
    const timeScale = now < slowUntil ? 0.62 : 1;

    if(now < paddleBoostUntil){
      paddle.w += (170 - paddle.w) * 0.15;
    } else {
      paddle.w += (116 - paddle.w) * 0.14;
    }

    paddle.x += ((touchX - paddle.w/2) - paddle.x) * Math.min(1, 0.22 * dt * 60);
    paddle.x = Math.max(8, Math.min(W - paddle.w - 8, paddle.x));

    if(boss){
      boss.phase = boss.hp <= boss.maxHp * 0.35 ? 3 : boss.hp <= boss.maxHp * 0.7 ? 2 : 1;
      boss.x += boss.vx * dt * 60 * timeScale;
      if(boss.x < 20 || boss.x + boss.w > W - 20){
        boss.vx *= -1;
      }
      boss.flash *= 0.88;
      boss.shotTimer += dt * timeScale;

      const interval = boss.phase === 1 ? 1.3 : boss.phase === 2 ? 0.95 : 0.65;
      if(boss.shotTimer >= interval){
        boss.shotTimer = 0;
        spawnBossBullets();
      }

      for(let i=boss.bullets.length - 1; i>=0; i--){
        const b = boss.bullets[i];
        b.x += b.vx * dt * 60 * timeScale;
        b.y += b.vy * dt * 60 * timeScale;

        if(b.y > H + 30 || b.x < -30 || b.x > W + 30){
          boss.bullets.splice(i, 1);
          continue;
        }

        const hitPaddle =
          b.x + b.r > paddle.x &&
          b.x - b.r < paddle.x + paddle.w &&
          b.y + b.r > paddle.y &&
          b.y - b.r < paddle.y + paddle.h;

        if(hitPaddle){
          boss.bullets.splice(i, 1);
          burst(b.x, b.y, "💥", 7);
          loseLife();
          return;
        }
      }
    }

    for(let i=balls.length - 1; i>=0; i--){
      const ball = balls[i];

      ball.trail.push({ x:ball.x, y:ball.y });
      if(ball.trail.length > 6) ball.trail.shift();

      ball.x += ball.vx * dt * 60 * timeScale;
      ball.y += ball.vy * dt * 60 * timeScale;

      if(ball.x < ball.r){
        ball.x = ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if(ball.x > W - ball.r){
        ball.x = W - ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if(ball.y < ball.r + 8){
        ball.y = ball.r + 8;
        ball.vy *= -1;
        playTap(420);
      }

      if(
        ball.y + ball.r > paddle.y &&
        ball.y - ball.r < paddle.y + paddle.h &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.w &&
        ball.vy > 0
      ){
        const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
        ball.vx = hit * 6.4;
        ball.vy = -Math.max(6.0, Math.abs(ball.vy));
        burst(ball.x, paddle.y, "🐾", 5);
        playTap(620);

        if(now - lastPaddleMeow > 130){
          playPaddleMeow();
          say("ニャッ!");
          lastPaddleMeow = now;
        }
      }

      if(boss){
        const hitBoss =
          ball.x + ball.r > boss.x &&
          ball.x - ball.r < boss.x + boss.w &&
          ball.y + ball.r > boss.y &&
          ball.y - ball.r < boss.y + boss.h;

        if(hitBoss){
          boss.hp -= now < ball.pierceUntil ? 2 : 1;
          boss.flash = 1;
          score += 16;
          skill = Math.min(100, skill + 6);
          burst(ball.x, ball.y, "⭐", 7);
          playTap(920);

          if(now >= ball.pierceUntil){
            ball.vy *= -1;
          }

          if(boss.hp <= 0){
            score += 120;
            boss = null;
            goNextStage();
            return;
          }
          updateHud();
        }
      } else {
        for(const b of blocks){
          if(!b.alive) continue;

          const hitBlock =
            ball.x + ball.r > b.x &&
            ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y &&
            ball.y - ball.r < b.y + b.h;

          if(!hitBlock) continue;

          if(!Number.isFinite(b.hp)){
            ball.vy *= -1;
            burst(b.x + b.w/2, b.y + b.h/2, "💥", 4);
            playTap(280);
            break;
          }

          const dmg = now < ball.pierceUntil ? 2 : 1;
          b.hp -= dmg;
          score += b.maxHp >= 3 ? 14 : b.maxHp === 2 ? 12 : 10;
          skill = Math.min(100, skill + 6);

          burst(
            b.x + b.w/2,
            b.y + b.h/2,
            now < ball.pierceUntil ? "🐱" : "✨",
            7
          );

          if(b.hp <= 0){
            b.alive = false;
            playTap(860);
          } else {
            playTap(560);
          }

          if(now >= ball.pierceUntil){
            ball.vy *= -1;
          }

          if(score % 100 === 0){
            showMessage("GREAT!", 520);
          }

          updateHud();
          break;
        }
      }

      if(ball.y > H + 40){
        balls.splice(i, 1);
      }
    }

    if(balls.length === 0){
      loseLife();
      return;
    }

    if(!boss){
      const remainingBreakable = blocks.some(b => b.alive && Number.isFinite(b.hp));
      if(!remainingBreakable){
        goNextStage();
        return;
      }
    }

    for(let i=particles.length - 1; i>=0; i--){
      const p = particles[i];
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy += 0.03 * dt * 60;
      p.life -= 0.03 * dt * 60;
      if(p.life <= 0) particles.splice(i, 1);
    }

    if(dashFx.active){
      dashFx.x += 20 * dt * 60;
      if(now > dashFx.until){
        dashFx.active = false;
      }
    }

    if(shake > 0.08) shake *= 0.88;
    else shake = 0;

    if(damageFlash > 0.02) damageFlash *= 0.88;
    else damageFlash = 0;

    updateHud();
  }

  function spawnBossBullets(){
    if(!boss) return;
    const cx = boss.x + boss.w/2;
    const y = boss.y + boss.h - 6;

    if(boss.phase === 1){
      boss.bullets.push({ x:cx, y, vx:0, vy:4.6, r:8 });
      boss.bullets.push({ x:cx - 24, y, vx:-1.0, vy:4.4, r:7 });
      boss.bullets.push({ x:cx + 24, y, vx: 1.0, vy:4.4, r:7 });
    } else if(boss.phase === 2){
      for(let i=-2; i<=2; i++){
        boss.bullets.push({ x:cx + i*12, y, vx:i*0.7, vy:4.8, r:7 });
      }
    } else {
      for(let i=-3; i<=3; i++){
        boss.bullets.push({ x:cx + i*11, y, vx:i*0.9, vy:5.3, r:7 });
      }
      boss.bullets.push({ x:cx, y:y - 10, vx:0, vy:5.8, r:10 });
    }
  }

  function draw(){
    ctx.save();
    if(shake > 0){
      ctx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
    }
    drawBackground();
    if(boss){
      drawBoss();
      drawBossBullets();
    } else {
      drawBlocks();
    }
    drawPaddle();
    drawBalls();
    drawParticles();
    ctx.restore();
    drawDashFx();
  }

  function loop(ts){
    if(!lastTime) lastTime = ts;
    const dt = Math.min(0.033, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function setTouchFromEvent(e){
    const t = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    touchX = t.clientX - rect.left;
  }

  canvas.addEventListener("touchstart", e => {
    unlockAudio();
    setTouchFromEvent(e);
  }, { passive:true });

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    setTouchFromEvent(e);
  }, { passive:false });

  canvas.addEventListener("mousemove", e => {
    if(window.innerWidth > 700){
      touchX = e.clientX;
    }
  });

  skillBtn.addEventListener("click", () => {
    unlockAudio();
    if(state === "playing" && skill >= 100){
      skill = 0;
      selectedChar.use();
      updateHud();
    }
  });

  window.addEventListener("resize", resize);

  loadCat();
  resize();
  updateHud();
  renderTitle();
  requestAnimationFrame(loop);
})();
</script>
</body>
