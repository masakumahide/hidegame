<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ヒデちゃん大冒険 ULTIMATE v4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

:root{
–pk:#ff4d9e; –pk2:#ffd6ec; –pk3:#fff0f8;
–pu:#9b5de5; –pu2:#e9d5ff;
–yw:#ffd93d; –yw2:#fff3b0;
–mn:#00b4d8; –mn2:#caf0f8;
–rd:#ef4444; –gr:#22c55e;
–dk:#1a0a2e; –dk2:#2d1b4e;
–txt:#2d1b4e;
–shadow: 0 8px 32px rgba(155,93,229,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
width:100%;height:100%;overflow:hidden;
background:var(–dk);
font-family:‘M PLUS Rounded 1c’,sans-serif;
touch-action:none;
user-select:none;
}

/* ── Starfield bg ── */
#starfield{
position:fixed;inset:0;z-index:0;pointer-events:none;
background:
radial-gradient(ellipse at 20% 10%, rgba(155,93,229,.35) 0%, transparent 55%),
radial-gradient(ellipse at 80% 90%, rgba(255,77,158,.3) 0%, transparent 55%),
var(–dk);
}

.screen{
display:none;flex-direction:column;align-items:center;
position:fixed;inset:0;z-index:10;
overflow:hidden;
}
.screen.active{display:flex;}

/* ══════════════════════════════
TITLE SCREEN
══════════════════════════════ */
#screen-title{
justify-content:center;gap:18px;padding:24px 20px;
background:linear-gradient(180deg,rgba(26,10,46,.95) 0%,rgba(45,27,78,.98) 100%);
}
.title-logo{
font-family:‘Kaisei Decol’,serif;
font-size:clamp(28px,8vw,42px);
color:#fff;text-align:center;line-height:1.2;
text-shadow:0 0 30px var(–pk),0 0 60px var(–pu),3px 3px 0 rgba(0,0,0,.5);
animation:titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse{0%,100%{text-shadow:0 0 30px var(–pk),0 0 60px var(–pu),3px 3px 0 rgba(0,0,0,.5)}
50%{text-shadow:0 0 50px var(–pk),0 0 100px var(–pu),3px 3px 0 rgba(0,0,0,.5)}}
.title-sub{font-size:13px;color:var(–pu2);letter-spacing:4px;margin-top:-8px;}
.cat-hero{
width:120px;height:120px;border-radius:50%;
border:4px solid var(–pk);
object-fit:cover;
box-shadow:0 0 30px var(–pk),0 0 60px rgba(255,77,158,.4);
animation:heroBounce 2.5s ease-in-out infinite;
}
@keyframes heroBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.03)}}

.menu-btn{
width:min(280px,85vw);padding:16px;border:none;border-radius:50px;
font-family:‘M PLUS Rounded 1c’,sans-serif;font-weight:800;font-size:17px;
cursor:pointer;position:relative;overflow:hidden;
transition:transform .1s,filter .1s;
}
.menu-btn:active{transform:scale(.96);filter:brightness(.9);}
.menu-btn.primary{
background:linear-gradient(135deg,var(–pk),var(–pu));
color:white;
box-shadow:0 6px 24px rgba(255,77,158,.5),0 0 0 2px rgba(255,255,255,.1);
}
.menu-btn.secondary{
background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);
color:rgba(255,255,255,.85);font-size:15px;padding:13px;
}
.menu-btn::after{
content:’’;position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
border-radius:inherit;
}

/* ══════════════════════════════
CHARA SELECT
══════════════════════════════ */
#screen-chara{
background:linear-gradient(180deg,rgba(26,10,46,.97),rgba(45,27,78,.99));
padding:20px 16px;gap:14px;justify-content:center;
}
.chara-title{
font-family:‘Kaisei Decol’,serif;font-size:22px;color:white;
text-shadow:0 0 20px var(–pk);
}
.chara-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(320px,90vw);}
.chara-card{
background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);
border-radius:18px;padding:16px 10px;text-align:center;cursor:pointer;
transition:all .2s;backdrop-filter:blur(4px);
}
.chara-card.selected{
border-color:var(–pk);
background:rgba(255,77,158,.15);
box-shadow:0 0 20px rgba(255,77,158,.3);
transform:scale(1.04);
}
.chara-face{font-size:38px;line-height:1.2;}
.chara-name{font-size:13px;font-weight:800;color:white;margin:4px 0 2px;}
.chara-stat{font-size:10px;color:rgba(255,255,255,.5);}
.special-label{
font-size:9px;color:var(–yw);font-weight:800;margin-top:4px;
background:rgba(255,211,61,.15);border-radius:6px;padding:2px 6px;display:inline-block;
}

/* ══════════════════════════════
GAME SCREEN
══════════════════════════════ */
#screen-game{
background:var(–dk);
padding:0;justify-content:flex-start;align-items:center;
}

#game-hud{
width:100%;max-width:400px;
display:flex;justify-content:space-between;align-items:center;
padding:8px 12px 4px;
background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);
flex-shrink:0;
}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:0;}
.hud-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;}
.hud-val{font-size:18px;font-weight:800;color:white;line-height:1;
text-shadow:0 0 12px currentColor;}
#hud-score .hud-val{color:var(–yw);}
#hud-lives .hud-val{color:var(–rd);}
#hud-stage .hud-val{color:var(–mn);font-size:12px;}
#hud-special{
background:linear-gradient(135deg,var(–yw),#ff9500);
border:none;border-radius:20px;padding:5px 12px;
font-size:11px;font-weight:800;color:#1a0a2e;cursor:pointer;
box-shadow:0 0 15px rgba(255,211,61,.4);
transition:transform .1s,box-shadow .1s;
font-family:‘M PLUS Rounded 1c’,sans-serif;
}
#hud-special:active{transform:scale(.95);}
#hud-special:disabled{opacity:.35;box-shadow:none;}
#special-gauge{
width:50px;height:4px;background:rgba(255,255,255,.1);
border-radius:2px;overflow:hidden;margin-top:3px;
}
#special-fill{height:100%;background:linear-gradient(90deg,var(–yw),#ff9500);
border-radius:2px;transition:width .3s;width:0%;}

#canvas-outer{
position:relative;
width:100%;max-width:400px;
flex:1;
overflow:hidden;
display:flex;align-items:center;justify-content:center;
}
#gameCanvas,#fxCanvas{
position:absolute;top:0;left:0;width:100%;height:100%;
}
#fxCanvas{pointer-events:none;z-index:3;}
#gameCanvas{z-index:2;}

#bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}

/* overlays inside canvas */
#overlay-text{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
z-index:20;text-align:center;pointer-events:none;display:none;
background:rgba(26,10,46,.8);backdrop-filter:blur(8px);
border:2px solid rgba(255,255,255,.15);border-radius:20px;
padding:20px 30px;
}
.ot-main{font-size:clamp(20px,5vw,28px);font-weight:800;color:var(–yw);
text-shadow:0 0 20px var(–yw);animation:popIn .35s ease-out;}
.ot-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:6px;}
@keyframes popIn{0%{transform:scale(.2);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

#combo-hud{
position:absolute;top:8px;right:8px;z-index:5;
font-size:12px;font-weight:800;color:var(–yw);
text-shadow:0 0 10px var(–yw);
opacity:0;transition:opacity .3s;pointer-events:none;
background:rgba(0,0,0,.4);border-radius:8px;padding:3px 8px;
}
#item-hud{
position:absolute;bottom:8px;left:8px;z-index:5;
font-size:11px;font-weight:800;color:var(–mn);
text-shadow:0 0 8px var(–mn);
opacity:0;transition:opacity .3s;pointer-events:none;
background:rgba(0,0,0,.4);border-radius:8px;padding:3px 8px;
}

/* tetris next piece */
#tetris-info{
position:absolute;top:8px;right:8px;z-index:5;
background:rgba(26,10,46,.85);border:1px solid rgba(255,255,255,.15);
border-radius:10px;padding:6px 10px;display:none;text-align:center;
backdrop-filter:blur(4px);
}
#tetris-info .ti-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;}
#tetris-info .ti-face{font-size:22px;line-height:1.2;}
#tetris-score{
position:absolute;top:8px;left:8px;z-index:5;
background:rgba(26,10,46,.85);border:1px solid rgba(255,255,255,.15);
border-radius:10px;padding:6px 10px;display:none;
backdrop-filter:blur(4px);font-size:10px;color:rgba(255,255,255,.6);font-weight:700;
}
#tetris-score b{color:var(–yw);font-size:14px;display:block;}

/* controls */
#controls-breakout{
width:100%;max-width:400px;
display:grid;grid-template-columns:1fr 1.2fr 1fr 0.7fr;gap:6px;
padding:8px 10px;flex-shrink:0;
}
#controls-tetris{
display:none;
width:100%;max-width:400px;
padding:8px 10px;flex-shrink:0;
}
.tetris-ctrl-row{display:flex;gap:6px;justify-content:center;margin-bottom:6px;}
.tetris-ctrl-row:last-child{margin-bottom:0;}

.gbtn{
border:none;border-radius:14px;
font-family:‘M PLUS Rounded 1c’,sans-serif;font-weight:800;
cursor:pointer;transition:transform .08s,filter .08s;
position:relative;overflow:hidden;
display:flex;align-items:center;justify-content:center;
}
.gbtn:active{transform:scale(.93);filter:brightness(.85);}
.gbtn::after{content:’’;position:absolute;inset:0;
background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);border-radius:inherit;}

.gbtn-move{
background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));
border:1px solid rgba(255,255,255,.15);color:white;
font-size:22px;padding:14px 0;
}
.gbtn-start{
background:linear-gradient(135deg,var(–pu),#6d28d9);color:white;
font-size:11px;padding:14px 0;
box-shadow:0 4px 15px rgba(155,93,229,.4);
}
.gbtn-sound{
background:linear-gradient(135deg,var(–mn),#0077a8);color:white;
font-size:18px;padding:14px 0;
box-shadow:0 4px 12px rgba(0,180,216,.3);
}
.gbtn-tet{
background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));
border:1px solid rgba(255,255,255,.15);color:white;
font-size:22px;padding:14px 24px;
box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.gbtn-tet-rot{
background:linear-gradient(135deg,var(–pu),#6d28d9);color:white;
font-size:22px;padding:14px 40px;
box-shadow:0 4px 15px rgba(155,93,229,.4);
}
.gbtn-tet-drop{
background:linear-gradient(135deg,var(–yw),#ff9500);color:var(–dk);
font-size:22px;padding:14px 28px;
box-shadow:0 4px 15px rgba(255,211,61,.4);
}

/* RANKING */
#ranking-panel{
display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:linear-gradient(180deg,var(–dk2),var(–dk));
border:2px solid rgba(255,77,158,.4);
border-radius:24px;padding:22px;z-index:300;
width:min(300px,88vw);
box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 40px rgba(255,77,158,.2);
text-align:center;
}
#ranking-panel h2{color:white;font-family:‘Kaisei Decol’,serif;font-size:22px;margin-bottom:14px;
text-shadow:0 0 20px var(–pk);}
.rank-row{display:flex;align-items:center;padding:7px 10px;margin:4px 0;
border-radius:10px;font-size:13px;font-weight:700;background:rgba(255,255,255,.06);}
.rank-row:nth-child(1){background:rgba(255,211,61,.15);}
.rank-row:nth-child(2){background:rgba(255,255,255,.08);}
.rank-row:nth-child(3){background:rgba(255,149,0,.1);}
.rk-medal{font-size:16px;width:24px}.rk-name{flex:1;text-align:left;padding-left:6px;color:rgba(255,255,255,.8)}
.rk-score{color:var(–yw);font-weight:800;}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:299;backdrop-filter:blur(3px);}
</style>

</head>
<body>
<div id="starfield"></div>

<!-- TITLE -->

<div class="screen active" id="screen-title">
  <div class="title-logo">🐱 ヒデちゃん<br>大冒険！</div>
  <div class="title-sub">ULTIMATE v4</div>
  <img class="cat-hero" src="cat.png.JPG" onerror="this.src='cat.png'" alt="猫">
  <button class="menu-btn primary" id="btn-chara-select">🎮 キャラ選択してスタート</button>
  <button class="menu-btn secondary" id="btn-ranking-title">🏆 ランキングを見る</button>
</div>

<!-- CHARA SELECT -->

<div class="screen" id="screen-chara">
  <div class="chara-title">⭐ キャラを選ぼう！</div>
  <div class="chara-grid" id="chara-grid"></div>
  <button class="menu-btn primary" id="btn-start-game" style="margin-top:4px;width:min(300px,85vw)">✨ 冒険スタート！</button>
  <button class="menu-btn secondary" id="btn-back-title" style="margin-top:8px;width:min(300px,85vw)">← もどる</button>
</div>

<!-- GAME -->

<div class="screen" id="screen-game">
  <div id="game-hud">
    <div class="hud-item" id="hud-lives">
      <div class="hud-label">LIVES</div>
      <div class="hud-val" id="lives-disp">❤️❤️❤️</div>
    </div>
    <div class="hud-item" id="hud-stage">
      <div class="hud-label">MODE</div>
      <div class="hud-val" id="stage-disp">STAGE 1</div>
    </div>
    <div class="hud-item" id="hud-score">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="score-disp">0</div>
    </div>
    <div class="hud-item">
      <button id="hud-special" disabled>⚡ 必殺技</button>
      <div id="special-gauge"><div id="special-fill"></div></div>
    </div>
  </div>

  <div id="canvas-outer">
    <canvas id="bg-canvas"></canvas>
    <canvas id="gameCanvas"></canvas>
    <canvas id="fxCanvas"></canvas>
    <div id="overlay-text">
      <div class="ot-main" id="ot-main"></div>
      <div class="ot-sub" id="ot-sub"></div>
    </div>
    <div id="combo-hud"></div>
    <div id="item-hud"></div>
    <div id="tetris-info">
      <div class="ti-label">NEXT</div>
      <div class="ti-face" id="next-face">　</div>
    </div>
    <div id="tetris-score">
      LINES<b id="lines-disp">0</b>
    </div>
  </div>

  <div id="controls-breakout">
    <button class="gbtn gbtn-move" id="btn-left">◀</button>
    <button class="gbtn gbtn-start" id="btn-start">🎵 START</button>
    <button class="gbtn gbtn-move" id="btn-right">▶</button>
    <button class="gbtn gbtn-sound" id="btn-sound">🔊</button>
  </div>
  <div id="controls-tetris">
    <div class="tetris-ctrl-row">
      <button class="gbtn gbtn-tet" id="t-left">◀</button>
      <button class="gbtn gbtn-tet-rot" id="t-rotate">🔄 回転</button>
      <button class="gbtn gbtn-tet" id="t-right">▶</button>
    </div>
    <div class="tetris-ctrl-row">
      <button class="gbtn gbtn-tet-drop" id="t-down" style="flex:1;max-width:200px">▼ 落とす</button>
    </div>
  </div>
</div>

<!-- RANKING -->

<div class="overlay-bg" id="overlay-bg"></div>
<div id="ranking-panel">
  <h2>🏆 ランキング</h2>
  <div id="ranking-list"></div>
  <button class="menu-btn secondary" id="close-ranking" style="margin-top:12px;width:100%">とじる</button>
</div>

<script>
// ═══════════════════════════════════════════
// CANVAS SETUP — responsive
// ═══════════════════════════════════════════
const canvasOuter = document.getElementById('canvas-outer');
const gameCanvas  = document.getElementById('gameCanvas');
const fxCanvas    = document.getElementById('fxCanvas');
const bgCvs       = document.getElementById('bg-canvas');
const ctx  = gameCanvas.getContext('2d');
const fxCtx= fxCanvas.getContext('2d');
const bgCtx= bgCvs.getContext('2d');

let CW=320, CH=480;
function resizeCanvas(){
  const rect = canvasOuter.getBoundingClientRect();
  CW = rect.width  || 320;
  CH = rect.height || 480;
  [gameCanvas, fxCanvas, bgCvs].forEach(c=>{ c.width=CW; c.height=CH; });
  drawBgStars();
}
window.addEventListener('resize', ()=>{ resizeCanvas(); });

// ═══════════════════════════════════════════
// BACKGROUND STARS
// ═══════════════════════════════════════════
let stars=[];
function makeStar(){return{x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*1.5+.3,a:Math.random()};}
function drawBgStars(){
  bgCtx.clearRect(0,0,CW,CH);
  if(!stars.length) for(let i=0;i<80;i++) stars.push(makeStar());
  for(const s of stars){
    bgCtx.beginPath();bgCtx.arc(s.x%CW,s.y%CH,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,255,${s.a*.6})`;bgCtx.fill();
  }
}

// ═══════════════════════════════════════════
// AUDIO — Canon progression BGM
// ═══════════════════════════════════════════
let audioCtx=null, soundOn=true, bgmNodes=[], bgmPlaying=false, bossMode=false;
function getAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

// Canon chord: D A Bm F#m G D G A (loop)
// Each chord = 4 steps in 8th notes
const CANON_ROOTS = [294,220,247,185,196,294,196,220]; // D A B F# G D G A
const SCALE_OFFSETS = [0,4,7,12]; // major triad
// Melody on top — 8 bars × 8 notes
const MELODY = [
  587,587,659,784, 784,659,587,494,
  440,440,494,587, 587,494,440,392,
  370,370,440,587, 587,587,659,784,
  784,880,784,659, 587,659,587,494,
  440,494,587,659, 784,880,784,659,
  587,494,440,392, 370,440,494,587,
  659,784,880,784, 659,587,494,440,
  392,440,494,587, 659,784,880,1047,
];
const COUNTER = [ // counter-melody
  294,370,440,370, 294,370,440,370,
  294,330,370,330, 294,330,370,330,
  247,294,330,294, 247,294,330,294,
  220,247,294,247, 220,247,294,247,
];

function stopBGM(){ bgmNodes.forEach(n=>{try{n.stop();}catch(e){}}); bgmNodes=[]; bgmPlaying=false; }

function startBGM(boss=false){
  if(!soundOn)return;
  stopBGM(); bgmPlaying=true; bossMode=boss;
  const ac=getAC();
  if(ac.state==='suspended')ac.resume();

  const master=ac.createGain(); master.gain.value=0.5; master.connect(ac.destination);
  // Reverb via convolver simulation (delay+feedback)
  const reverbDelay=ac.createDelay(.4);
  const reverbGain=ac.createGain(); reverbGain.gain.value=.28;
  reverbDelay.connect(reverbGain); reverbGain.connect(reverbDelay); reverbGain.connect(master);

  const BPM = boss?168:132;
  const step = 60/BPM/2;
  const now = ac.currentTime+.05;
  const BARS=8, LOOP=step*16*BARS;

  function note(freq,t,dur,type='sine',vol=.12,toRev=false){
    if(!bgmPlaying)return;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=type; o.frequency.value=freq*(boss?1.5:1);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+.01);
    g.gain.exponentialRampToValueAtTime(.001,t+dur*.9);
    o.connect(g); g.connect(master); if(toRev)g.connect(reverbDelay);
    o.start(t); o.stop(t+dur);
    bgmNodes.push(o);
  }
  function drum(freq,t,dur,vol=.35){
    if(!bgmPlaying)return;
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='sine'; o.frequency.setValueAtTime(freq,t);
    o.frequency.exponentialRampToValueAtTime(freq*.2,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+dur+.02);
    bgmNodes.push(o);
  }
  function hihat(t,vol=.08){
    if(!bgmPlaying)return;
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.04),ac.sampleRate);
    const d=buf.getChannelData(0); for(let j=0;j<d.length;j++)d[j]=Math.random()*2-1;
    const src=ac.createBufferSource(), flt=ac.createBiquadFilter(), g=ac.createGain();
    src.buffer=buf; flt.type='highpass'; flt.frequency.value=7000;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+.04);
    src.connect(flt); flt.connect(g); g.connect(master);
    src.start(t); src.stop(t+.05); bgmNodes.push(src);
  }

  function scheduleLoop(st){
    if(!bgmPlaying)return;

    // Canon bass (arpeggiated)
    for(let bar=0;bar<BARS;bar++){
      const root=CANON_ROOTS[bar%CANON_ROOTS.length];
      for(let i=0;i<16;i++){
        const t=st+bar*step*16+i*step;
        const chord=SCALE_OFFSETS[i%4];
        const f=root*Math.pow(2,chord/12)*.5;
        note(f,t,step*1.8,'sawtooth',.18);
      }
    }

    // Melody
    for(let i=0;i<MELODY.length;i++){
      const t=st+i*step*2;
      note(MELODY[i],t,step*1.9,'triangle',.15,true);
    }

    // Counter melody (lower, softer)
    for(let rep=0;rep<2;rep++) for(let i=0;i<COUNTER.length;i++){
      const t=st+rep*step*16*4+i*step*2;
      note(COUNTER[i],t,step*1.8,'sine',.09,true);
    }

    // Arpeggio sparkle
    const ARP=[587,740,880,987,880,740,587,494];
    for(let rep=0;rep<BARS*4;rep++) for(let i=0;i<ARP.length;i++){
      const t=st+rep*step*4+i*step*.5;
      note(ARP[i]*(boss?2:1),t,step*.45,'triangle',.08,true);
    }

    // Drums
    for(let i=0;i<BARS*16;i++){
      const t=st+i*step;
      if(i%8===0||i%8===4) drum(140,t,.12,.35);  // kick
      if(i%8===4) drum(220,t,.06,.22);            // snare
      hihat(t, i%2===0?.1:.06);
      if(boss&&i%4===0) drum(80,t,.2,.4);         // boss extra bass
    }

    const ahead=LOOP-1.5;
    setTimeout(()=>{if(bgmPlaying)scheduleLoop(st+LOOP);},ahead*1000);
  }
  scheduleLoop(now);
}

// SE
function se(freq,dur,type='square',vol=.14){
  if(!soundOn)return;
  try{
    const ac=getAC(); if(ac.state==='suspended')ac.resume();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}

const PIECES={

  L:{s:[[0,0,1],[1,1,1]],color:'#fdba74',face:'🧡'},
};
const PKEYS=Object.keys(PIECES);
function newPiece(){
  const k=PKEYS[Math.floor(Math.random()*PKEYS.length)];
  const d=PIECES[k];
  return {s:d.s.map(r=>[...r]),color:d.color,face:d.face,
    x:Math.floor(TW/2)-Math.floor(d.s[0].length/2),y:0};
}
function rotatePiece(p){
  const rows=p.s.length,cols=p.s[0].length;
  const r=Array.from({length:cols},(_,ri)=>Array.from({length:rows},(_,ci)=>p.s[rows-1-ci][ri]));
  return {...p,s:r};
}
function canPlace(p,dx=0,dy=0,shape=null){
  const s=shape||p.s;
  for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++){
    if(!s[r][c])continue;
    const nx=p.x+c+dx,ny=p.y+r+dy;
    if(nx<0||nx>=TW||ny>=TH)return false;
    if(ny>=0&&tGrid[ny]&&tGrid[ny][nx])return false;
  }
  return true;
}
function lockPiece(){
  tPiece.s.forEach((row,r)=>row.forEach((v,c)=>{
    if(v){const ny=tPiece.y+r;if(ny>=0)tGrid[ny][tPiece.x+c]={color:tPiece.color,face:tPiece.face};}
  }));
  playHit(); clearLines();
  tPiece=tNext; tNext=newPiece(); updateTetrisUI();
  if(!canPlace(tPiece)){
    isPlaying=false; saveRanking(score);
    showOverlay('💀 GAME OVER',`スコア: ${score}pt`);
    setTimeout(()=>{hideOverlay();resetGame();},2800);
  }
}
function clearLines(){
  let n=0;
  for(let r=TH-1;r>=0;r--){
    if(tGrid[r].every(c=>c!==0)){
      tGrid.splice(r,1);tGrid.unshift(Array(TW).fill(0));n++;r++;
    }
  }
  if(n>0){
    playLine();
    score+=[0,100,300,500,800][n]*gameStage;
    tLinesCleared+=n; specialCharge=Math.min(100,specialCharge+n*15);
    drawHUD(); spawnParts(CW/2,CH/2,n*10);
    if(tLinesCleared>=10){tLinesCleared=0;tDropInterval=Math.max(8,tDropInterval-5);}
  }
}

const EMOJIS=['✨','💥','🌸','⭐','💫','🎉','🔥'];
function spawnParts(x,y,n=12){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.9;
    const sp=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,decay:.03+Math.random()*.03,
      e:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],sz:12+Math.random()*12});
  }
}
function updateParts(){
  fxCtx.clearRect(0,0,CW,CH);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life-=p.decay;
    fxCtx.globalAlpha=Math.max(0,p.life);
    fxCtx.font=`${p.sz}px sans-serif`;fxCtx.textAlign='left';
    fxCtx.fillText(p.e,p.x,p.y);
  }
  fxCtx.globalAlpha=1;
}

function drawTetrisScene(){
  const CS=getCellSize(), TOFFY=getTOffY();
  const TotalW=TW*CS, TotalH=TH*CS;

  // board bg
  ctx.fillStyle='rgba(255,255,255,.03)';
  ctx.fillRect(0,TOFFY,TotalW,TotalH);

  // grid lines
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=.5;
  for(let r=0;r<=TH;r++){ ctx.beginPath();ctx.moveTo(0,TOFFY+r*CS);ctx.lineTo(TotalW,TOFFY+r*CS);ctx.stroke(); }
  for(let c=0;c<=TW;c++){ ctx.beginPath();ctx.moveTo(c*CS,TOFFY);ctx.lineTo(c*CS,TOFFY+TotalH);ctx.stroke(); }
  ctx.lineWidth=1;

  // locked cells
  for(let r=0;r<TH;r++) for(let c=0;c<TW;c++){
    if(!tGrid[r][c])continue;
    const cell=tGrid[r][c];
    const cx=c*CS, cy=TOFFY+r*CS;
    // shadow
    ctx.fillStyle='rgba(0,0,0,.3)';
    rrect(ctx,cx+2,cy+3,CS-2,CS-2,4);ctx.fill();
    // body
    const g=ctx.createLinearGradient(cx,cy,cx,cy+CS);
    g.addColorStop(0,lighten(cell.color,50));g.addColorStop(1,cell.color);
    ctx.fillStyle=g;rrect(ctx,cx+1,cy+1,CS-2,CS-2,4);ctx.fill();
    // shimmer
    ctx.fillStyle='rgba(255,255,255,.2)';
    rrect(ctx,cx+2,cy+2,CS-4,CS*.35,3);ctx.fill();
    // emoji
    ctx.font=`${CS-8}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(cell.face,cx+CS/2,cy+CS-3);
  }

  // ghost
  if(tPiece){
    let ghost={...tPiece,s:tPiece.s.map(r=>[...r])};
    while(canPlace(ghost,0,1))ghost.y++;
    ghost.s.forEach((row,r)=>row.forEach((v,c)=>{
      if(!v)return;
      const cx=(ghost.x+c)*CS, cy=TOFFY+(ghost.y+r)*CS;
      ctx.fillStyle=`${ghost.color}30`;
      ctx.strokeStyle=`${ghost.color}60`;ctx.lineWidth=1;
      rrect(ctx,cx+1,cy+1,CS-2,CS-2,4);ctx.fill();ctx.stroke();
    }));
  }

  // active piece
  if(tPiece){
    tPiece.s.forEach((row,r)=>row.forEach((v,c)=>{
      if(!v)return;
      const cx=(tPiece.x+c)*CS, cy=TOFFY+(tPiece.y+r)*CS;
      if(cy+CS<TOFFY)return; // don't draw above board
      ctx.shadowColor=tPiece.color;ctx.shadowBlur=8;
      const g=ctx.createLinearGradient(cx,cy,cx,cy+CS);
      g.addColorStop(0,lighten(tPiece.color,50));g.addColorStop(1,tPiece.color);
      ctx.fillStyle=g;rrect(ctx,cx+1,cy+1,CS-2,CS-2,4);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,.2)';rrect(ctx,cx+2,cy+2,CS-4,CS*.35,3);ctx.fill();
      ctx.font=`${CS-8}px sans-serif`;ctx.textAlign='center';
      ctx.fillText(tPiece.face,cx+CS/2,cy+CS-3);
    }));
  }

  // board border
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;
  ctx.strokeRect(0,TOFFY,TotalW,TotalH);
}

// ═══════════════════════════════════════════
// UPDATE: BREAKOUT
// ═══════════════════════════════════════════
function updateBreakout(){
  if(!isPlaying)return;

  if(bossActive){
    bossX+=bossVx;if(bossX<40||bossX>CW-40)bossVx*=-1;
    if(frameCount%110===0) items.push({x:bossX,y:70,vy:2.8,r:11,type:'boss_bullet',face:'💀',color:'#ef4444'});
  }

  // move balls
  const allBalls=[ball,...extraBalls];
  allBalls.forEach(b=>{
    b.x+=b.dx; b.y+=b.dy;
    if(b.x<b.r){b.dx=Math.abs(b.dx);}
    if(b.x>CW-b.r){b.dx=-Math.abs(b.dx);}
    if(b.y<b.r){b.dy=Math.abs(b.dy);}
  });

  // main ball paddle
  const ph=CH-paddle.h-18;
  if(ball.y+ball.r>ph&&ball.y+ball.r<ph+paddle.h+10&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){
    ball.dy=-Math.abs(ball.dy);
    const rel=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    ball.dx=rel*(Math.abs(ball.dy)+2);
    spawnParts(ball.x,ph,6);playHit();playNyaa();
    paddleSquish=Math.PI*.8;
    combo++;showCombo(combo);
    specialCharge=Math.min(100,specialCharge+5);
    drawHUD();
  }
  extraBalls.forEach((b,i)=>{
    if(b.y+b.r>ph&&b.y+b.r<ph+paddle.h+10&&b.x>paddle.x&&b.x<paddle.x+paddle.w){
      b.dy=-Math.abs(b.dy);
      const rel=(b.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      b.dx=rel*(Math.abs(b.dy)+2);
    }
  });

  // miss
  if(ball.y>CH+20){
    extraBalls.length=0;
    playMiss();lives--;combo=0;showCombo(0);drawHUD();
    if(lives<=0){
      isPlaying=false;stopBGM();saveRanking(score);
      showOverlay('💀 GAME OVER',`スコア: ${score}pt`);
      setTimeout(()=>{hideOverlay();resetGame();},2800);
    } else {
      ball=makeBall();isPlaying=false;
      showOverlay('💦 ミス！','');
      setTimeout(()=>{hideOverlay();isPlaying=true;},900);
    }
  }
  extraBalls=extraBalls.filter(b=>b.y<CH+20);

  // boss hit
  if(bossActive){
    const allB=[ball,...extraBalls];
    allB.forEach(b=>{
      const d=Math.hypot(b.x-bossX,b.y-30);
      if(d<45){
        b.dy=Math.abs(b.dy); bossHP--;
        spawnParts(bossX,35,8);playBossHit();drawHUD();
        specialCharge=Math.min(100,specialCharge+8);
        if(bossHP<=0){
          bossActive=false;score+=300*gameStage;spawnParts(CW/2,CH/2,35);playClear();drawHUD();
          showOverlay('🎉 BOSS撃破！','テトリスへ！');
          setTimeout(()=>{hideOverlay();switchToTetris();},2000);
        }
      }
    });
  }

  // brick collisions
  for(const col of bricks) for(const b of col){
    if(b.status<=0)continue;
    const allB=[ball,...extraBalls];
    allB.forEach(bl=>{
      if(bl.x+bl.r>b.x&&bl.x-bl.r<b.x+b.w&&bl.y+bl.r>b.y&&bl.y-bl.r<b.y+b.h){
        if(!penetrate)bl.dy*=-1; else b.status=0; // penetrate skips bounce
        b.status=Math.max(0,b.status-1);
        const pts=10*gameStage*(combo>=3?2:1);
        score+=pts;drawHUD();
        spawnParts(b.x+b.w/2,b.y+b.h/2,b.status===0?14:5);playHit();
        if(b.status===0){
          dropItem(b.x+b.w/2,b.y+b.h/2);
          specialCharge=Math.min(100,specialCharge+3);
        }
        if(score>0&&score%100===0){
          const sp=Math.sqrt(bl.dx**2+bl.dy**2);
          const nsp=Math.min(sp*1.06,13);bl.dx*=nsp/sp;bl.dy*=nsp/sp;
        }
      }
    });
  }

  // all bricks cleared → boss
  if(!bossActive&&bossHP<=0&&bricks.flat().every(b=>b.status<=0)){
    isPlaying=false;
    setTimeout(()=>{
      const cfg=BRICK_CFGS[Math.min(gameStage-1,BRICK_CFGS.length-1)];
      bossHP=bossMaxHP=cfg.boss.hp;bossX=CW/2;bossVx=1.8+gameStage*.5;bossActive=true;
      startBGM(true);
      playBossHit();showOverlay(`${cfg.boss.face} ${cfg.boss.name}登場！`,'やっつけろ！');
      setTimeout(()=>{hideOverlay();isPlaying=true;},1800);
    },600);
  }

  // items
  items=items.filter(it=>{
    it.y+=it.vy;
    const ph2=CH-paddle.h-18;
    if(it.type==='boss_bullet'){
      if(it.y+it.r>ph2&&it.x>paddle.x&&it.x<paddle.x+paddle.w){
        lives--;playMiss();spawnParts(it.x,it.y,6);drawHUD();return false;
      }
    } else {
      if(it.y+it.r>ph2&&it.y-it.r<ph2+paddle.h&&it.x>paddle.x&&it.x<paddle.x+paddle.w){
        applyItem(it.type);return false;
      }
    }
    return it.y<CH+30;
  });
}

function dropItem(x,y){
  if(Math.random()>.28)return;
  const it=ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)];
  items.push({x,y,vy:2,r:13,...it});
}
function applyItem(type){
  playItem();if(itemTimer)clearTimeout(itemTimer);
  activeItem=type;
  if(type==='wide')paddle.w=Math.min(CW*.6,paddle.w*1.5);
  if(type==='slow'){ball.dx*=.6;ball.dy*=.6;}
  if(type==='extra')specialCharge=Math.min(100,specialCharge+40);
  showItemHUD(ITEM_TYPES.find(i=>i.type===type)?.label||'');
  itemTimer=setTimeout(()=>{
    if(activeItem==='wide')paddle.w=100;activeItem=null;
    document.getElementById('item-hud').style.opacity=0;
  },7000);
}

// ═══════════════════════════════════════════
// UPDATE: TETRIS
// ═══════════════════════════════════════════
function updateTetris(){
  if(!isPlaying)return;
  tDropTimer++;
  if(tDropTimer>=tDropInterval){
    tDropTimer=0;
    if(canPlace(tPiece,0,1))tPiece.y++;
    else lockPiece();
  }
}
function tetrisLeft(){ if(tPiece&&canPlace(tPiece,-1,0)){tPiece.x--;playBeepT(400);} }
function tetrisRight(){ if(tPiece&&canPlace(tPiece,1,0)){tPiece.x++;playBeepT(400);} }
function tetrisDown(){ if(tPiece){if(canPlace(tPiece,0,1))tPiece.y++;else lockPiece();} }
function tetrisDrop(){ if(tPiece){while(canPlace(tPiece,0,1))tPiece.y++;lockPiece();playBeepT(200);} }
function tetrisRotate(){ if(!tPiece)return; const rot=rotatePiece(tPiece); if(canPlace(rot,0,0,rot.s)){tPiece=rot;playBeepT(660);} }
function playBeepT(f){ se(f,.04,'triangle',.08); }

// ═══════════════════════════════════════════
// SWITCH MODES
// ═══════════════════════════════════════════
function switchToTetris(){
  gameMode='tetris';isPlaying=false;
  items=[];extraBalls=[];penetrate=false;particles=[];
  document.getElementById('controls-breakout').style.display='none';
  document.getElementById('controls-tetris').style.display='block';
  document.getElementById('tetris-info').style.display='block';
  document.getElementById('tetris-score').style.display='block';
  initTetris();drawHUD();
  stopBGM();startBGM(false);
  showOverlay('🎮 TETRIS！','10ライン消してクリア！');
  setTimeout(()=>{hideOverlay();isPlaying=true;},1600);
}
function switchToBreakout(){
  gameMode='breakout';isPlaying=false;
  document.getElementById('controls-breakout').style.display='grid';
  document.getElementById('controls-tetris').style.display='none';
  document.getElementById('tetris-info').style.display='none';
  document.getElementById('tetris-score').style.display='none';
  gameStage++;
  ball=makeBall();paddle=makePaddle();items=[];extraBalls=[];penetrate=false;
  bossHP=0;bossActive=false;particles=[];
  initBricks();drawHUD();
  stopBGM();startBGM(false);
  showOverlay(`🌟 STAGE ${gameStage}！`,'ブロック崩しだ！');
  setTimeout(()=>{hideOverlay();isPlaying=true;},1600);
}

// ═══════════════════════════════════════════
// SPECIAL
// ═══════════════════════════════════════════
document.getElementById('hud-special').addEventListener('click',()=>{
  if(specialCharge<100||!isPlaying||gameMode!=='breakout')return;
  playSpecial();specialCharge=0;drawHUD();
  const state={ball,bricks,score,extraBalls,penetrate};
  selectedChar.doSpecial(state);
  score=state.score;penetrate=state.penetrate;
});

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function loop(){
  ctx.clearRect(0,0,CW,CH);
  frameCount++;

  if(gameMode==='breakout'){
    drawBricks();drawBoss();drawDropItems();
    drawBall(ball);
    extraBalls.forEach(b=>drawBall(b));
    drawCatPaddle();
    updateBreakout();
  } else {
    drawTetrisScene();
    updateTetris();
    if(tLinesCleared>=10){
      isPlaying=false;playClear();
      showOverlay('🌟 TETRIS クリア！','ブロック崩しへ！');
      setTimeout(()=>{hideOverlay();switchToBreakout();},2200);
    }
  }
  updateParts();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════
function resetGame(){
  score=0;lives=3;gameStage=1;combo=0;frameCount=0;specialCharge=0;paddleSquish=0;
  gameMode='breakout';isPlaying=false;
  ball=makeBall();paddle=makePaddle();
  items=[];particles=[];extraBalls=[];activeItem=null;penetrate=false;
  bossHP=0;bossActive=false;
  document.getElementById('controls-breakout').style.display='grid';
  document.getElementById('controls-tetris').style.display='none';
  document.getElementById('tetris-info').style.display='none';
  document.getElementById('tetris-score').style.display='none';
  initBricks();drawHUD();hideOverlay();
}

// ═══════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════
function drawHUD(){
  document.getElementById('score-disp').textContent=score.toLocaleString();
  document.getElementById('lives-disp').textContent='❤️'.repeat(Math.max(0,lives));
  const sd=document.getElementById('stage-disp');
  if(gameMode==='tetris') sd.textContent=`TETRIS ${tLinesCleared}/10`;
  else if(bossActive) sd.textContent=`⚔️ BOSS`;
  else sd.textContent=`STAGE ${gameStage}`;
  // special
  document.getElementById('special-fill').style.width=specialCharge+'%';
  const sb=document.getElementById('hud-special');
  sb.disabled=specialCharge<100||!isPlaying||gameMode!=='breakout';
  sb.textContent=specialCharge>=100?`⚡ ${selectedChar.special}`:'⚡ 必殺技';
}
function showOverlay(m,s){
  document.getElementById('ot-main').textContent=m;
  document.getElementById('ot-sub').textContent=s;
  const el=document.getElementById('overlay-text');
  el.style.display='block';
  const om=el.querySelector('.ot-main');
  om.style.animation='none';void om.offsetWidth;om.style.animation='popIn .35s ease-out';
}
function hideOverlay(){ document.getElementById('overlay-text').style.display='none'; }
function showCombo(c){
  const el=document.getElementById('combo-hud');
  if(c<2){el.style.opacity=0;return;}
  el.textContent=`${c} COMBO! 🔥`;el.style.opacity=1;
  if(comboTimer)clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{el.style.opacity=0;},1600);
}
function showItemHUD(t){
  const el=document.getElementById('item-hud');el.textContent=t;el.style.opacity=1;
}

// ═══════════════════════════════════════════
// RANKING
// ═══════════════════════════════════════════
function getRanking(){ try{return JSON.parse(localStorage.getItem('hide_v4')||'[]');}catch{return[];} }
function saveRanking(s){
  let r=getRanking();
  r.push({name:selectedChar.face+selectedChar.name,score:s,date:new Date().toLocaleDateString('ja')});
  r.sort((a,b)=>b.score-a.score);r=r.slice(0,7);
  localStorage.setItem('hide_v4',JSON.stringify(r));
}
function showRanking(){
  const r=getRanking();
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣'];
  document.getElementById('ranking-list').innerHTML=r.length===0
    ?'<p style="color:rgba(255,255,255,.4);font-size:13px;padding:10px">まだ記録なし！</p>'
    :r.map((e,i)=>`<div class="rank-row"><span class="rk-medal">${medals[i]}</span><span class="rk-name">${e.name}</span><span class="rk-score">${e.score.toLocaleString()}pt</span></div>`).join('');
  document.getElementById('ranking-panel').style.display='block';
  document.getElementById('overlay-bg').style.display='block';
}
['close-ranking','overlay-bg'].forEach(id=>{
  document.getElementById(id).addEventListener('click',()=>{
    document.getElementById('ranking-panel').style.display='none';
    document.getElementById('overlay-bg').style.display='none';
  });
});

// ═══════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click',()=>{
  stopBGM();resetGame();startBGM();isPlaying=true;
});
document.getElementById('btn-sound').addEventListener('click',()=>{
  soundOn=!soundOn;
  document.getElementById('btn-sound').textContent=soundOn?'🔊':'🔇';
  if(soundOn)startBGM(bossMode); else stopBGM();
});

// breakout move
const doLeft=(e)=>{ e&&e.preventDefault(); if(gameMode==='breakout') paddle.x=Math.max(0,paddle.x-38); else tetrisLeft(); };
const doRight=(e)=>{ e&&e.preventDefault(); if(gameMode==='breakout') paddle.x=Math.min(CW-paddle.w,paddle.x+38); else tetrisRight(); };
['touchstart','mousedown'].forEach(ev=>{
  document.getElementById('btn-left').addEventListener(ev,doLeft,{passive:false});
  document.getElementById('btn-right').addEventListener(ev,doRight,{passive:false});
});
// hold
let hL=null,hR=null;
document.getElementById('btn-left').addEventListener('touchstart',()=>{hL=setInterval(()=>doLeft(),75);},{passive:true});
document.getElementById('btn-left').addEventListener('touchend',()=>clearInterval(hL));
document.getElementById('btn-right').addEventListener('touchstart',()=>{hR=setInterval(()=>doRight(),75);},{passive:true});
document.getElementById('btn-right').addEventListener('touchend',()=>clearInterval(hR));

// tetris buttons
document.getElementById('t-left').addEventListener('click',tetrisLeft);
document.getElementById('t-right').addEventListener('click',tetrisRight);
document.getElementById('t-rotate').addEventListener('click',tetrisRotate);
document.getElementById('t-down').addEventListener('click',tetrisDrop);
// hold for tetris
let htL=null,htR=null;
document.getElementById('t-left').addEventListener('touchstart',()=>{htL=setInterval(tetrisLeft,80);},{passive:true});
document.getElementById('t-left').addEventListener('touchend',()=>clearInterval(htL));
document.getElementById('t-right').addEventListener('touchstart',()=>{htR=setInterval(tetrisRight,80);},{passive:true});
document.getElementById('t-right').addEventListener('touchend',()=>clearInterval(htR));

// Swipe on canvas
let swX=null,swY=null;
const co=document.getElementById('canvas-outer');
co.addEventListener('touchstart',e=>{swX=e.touches[0].clientX;swY=e.touches[0].clientY;},{passive:true});
co.addEventListener('touchmove',e=>{
  if(swX===null)return;
  const dx=e.touches[0].clientX-swX;
  if(gameMode==='breakout'){
    paddle.x=Math.max(0,Math.min(CW-paddle.w,paddle.x+dx*.9));
    swX=e.touches[0].clientX;
  }
},{passive:true});
co.addEventListener('touchend',e=>{
  if(gameMode==='tetris'&&swX!==null){
    const dx=e.changedTouches[0].clientX-swX;
    const dy=e.changedTouches[0].clientY-swY;
    if(Math.abs(dx)>Math.abs(dy)){
      if(dx>18)tetrisRight();else if(dx<-18)tetrisLeft();
    } else {
      if(dy>18)tetrisDrop();else if(dy<-18)tetrisRotate();
    }
  }
  swX=null;swY=null;
});

// PC
let drag=false,dragX=null;
co.addEventListener('mousedown',e=>{drag=true;dragX=e.clientX;});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  if(gameMode==='breakout') paddle.x=Math.max(0,Math.min(CW-paddle.w,paddle.x+(e.clientX-dragX)*.9));
  dragX=e.clientX;
});
window.addEventListener('mouseup',()=>drag=false);
// keyboard
window.addEventListener('keydown',e=>{
  if(gameMode==='breakout'){if(e.key==='ArrowLeft')doLeft();if(e.key==='ArrowRight')doRight();}
  else {
    if(e.key==='ArrowLeft')tetrisLeft();if(e.key==='ArrowRight')tetrisRight();
    if(e.key==='ArrowDown')tetrisDrop();if(e.key==='ArrowUp'||e.key==='z')tetrisRotate();
  }
});

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function rrect(c,x,y,w,h,r){
  if(c.roundRect){c.beginPath();c.roundRect(x,y,w,h,r);}
  else{c.beginPath();c.rect(x,y,w,h);}
}
function lighten(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
resizeCanvas();
resetGame();
loop();
</script>
