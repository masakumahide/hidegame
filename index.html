<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヒデちゃん&猫ちゃん BREAKOUT</title>
<style>
  :root {
    --bg-pink: #f9dbe7;
    --block-pink: #f56c9d;
    --paddle-purple: #a467c9;
    --text-maroon: #701d44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

  body {
    width: 100%; height: 100%; overflow: hidden; touch-action: none;
    background-color: var(--bg-pink);
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }

  #game-container {
    position: relative; width: 100vw; height: 100dvh;
    display: flex; flex-direction: column; align-items: center; padding-top: 40px;
  }

  h1 { color: var(--text-maroon); font-size: 28px; margin-bottom: 20px; font-weight: 900; }

  #canvas-wrap {
    position: relative; width: 90vw; height: 55vh;
    background: #fff; border: 4px solid #f9cbdc; border-radius: 10px;
    overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  canvas { display: block; width: 100%; height: 100%; }

  /* 操作パネル */
  #controls {
    margin-top: 30px; display: flex; gap: 15px; align-items: center;
  }

  .btn {
    border: none; border-radius: 12px; color: white; font-weight: 900;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 0 rgba(0,0,0,0.1);
  }

  .arrow-btn { width: 80px; height: 80px; background-color: #e37699; font-size: 24px; }
  .start-btn { width: 100px; height: 80px; background-color: #a476e3; font-size: 16px; text-align: center; line-height: 1.2; }
  .btn:active { transform: translateY(4px); box-shadow: none; }

  #overlay {
    position: absolute; inset: 0; background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #overlay.hidden { display: none; }
</style>
</head>
<body>

<div id="game-container">
  <h1>ヒデちゃん＆猫ちゃん</h1>

  <div id="canvas-wrap">
    <canvas id="game"></canvas>
    <div id="overlay">
      </div>
  </div>

  <div id="controls">
    <button class="btn arrow-btn" id="leftBtn">◀</button>
    <button class="btn start-btn" id="startBtn">音楽＆<br>START!</button>
    <button class="btn arrow-btn" id="rightBtn">▶</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const startBtn = document.getElementById("startBtn");
  const overlay = document.getElementById("overlay");

  let w, h, dpr, ball, paddle, bricks, active = false, score = 0;
  
  // ブロックに書く言葉リスト
  const WORDS = ["健康", "仕事", "旅行", "夢", "ご飯", "ダイエット", "ヒデ", "猫"];

  function resize() {
    dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentNode.getBoundingClientRect();
    w = rect.width;
    h = rect.height;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.scale(dpr, dpr);
    
    paddle = { w: 80, h: 12, x: w / 2 - 40, y: h - 30 };
    resetBall();
  }

  function resetBall() {
    ball = { x: w / 2, y: h - 50, r: 8, vx: 3, vy: -3 };
  }

  function buildBricks() {
    bricks = [];
    const rows = 5, cols = 4, gap = 8, margin = 10;
    const bw = (w - margin * 2 - gap * (cols - 1)) / cols;
    const bh = 22;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        bricks.push({
          x: margin + c * (bw + gap),
          y: 20 + r * (bh + gap),
          w: bw, h: bh,
          alive: true,
          text: WORDS[Math.floor(Math.random() * WORDS.length)]
        });
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    // 背景画像的なもの（薄いピンク）
    ctx.fillStyle = "#fff0f5";
    ctx.fillRect(0,0,w,h);

    // ブロック描画（画像通りのピンク）
    bricks.forEach(b => {
      if (!b.alive) return;
      ctx.fillStyle = "#f56c9d"; // 画像のピンク
      ctx.fillRect(b.x, b.y, b.w, b.h);
      
      ctx.fillStyle = "white";
      ctx.font = "bold 10px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(b.text, b.x + b.w / 2, b.y + 15);
    });

    // パドル（画像通りの紫）
    ctx.fillStyle = "#a467c9";
    ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

    // ボール
    ctx.fillStyle = "#ffff00"; // ヒデちゃんカラーの黄色
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.font = "bold 8px sans-serif";
    ctx.fillText("ヒデ", ball.x, ball.y + 3);

    if (!active) return;

    // 移動ロジック
    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.x < ball.r || ball.x > w - ball.r) ball.vx *= -1;
    if (ball.y < ball.r) ball.vy *= -1;

    // パドル衝突
    if (ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
      ball.vy = -Math.abs(ball.vy);
      ball.vx = (ball.x - (paddle.x + paddle.w / 2)) / 8;
    }

    // ブロック衝突
    bricks.forEach(b => {
      if (b.alive && ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
        b.alive = false;
        ball.vy *= -1;
        score += 10;
      }
    });

    // 落下
    if (ball.y > h) {
      active = false;
      overlay.classList.remove("hidden");
    }

    requestAnimationFrame(draw);
  }

  // ボタン操作
  let moveDir = 0;
  const leftBtn = document.getElementById("leftBtn");
  const rightBtn = document.getElementById("rightBtn");

  const startMove = (dir) => moveDir = dir;
  const stopMove = () => moveDir = 0;

  leftBtn.addEventListener("touchstart", () => startMove(-5));
  leftBtn.addEventListener("touchend", stopMove);
  rightBtn.addEventListener("touchstart", () => startMove(5));
  rightBtn.addEventListener("touchend", stopMove);

  // PC用
  leftBtn.addEventListener("mousedown", () => startMove(-5));
  window.addEventListener("mouseup", stopMove);
  rightBtn.addEventListener("mousedown", () => startMove(5));

  function updatePaddle() {
    if (moveDir !== 0) {
      paddle.x += moveDir;
      paddle.x = Math.max(0, Math.min(w - paddle.w, paddle.x));
    }
    requestAnimationFrame(updatePaddle);
  }

  startBtn.onclick = () => {
    overlay.classList.add("hidden");
    buildBricks();
    resetBall();
    active = true;
    score = 0;
    draw();
  };

  window.addEventListener("resize", resize);
  resize();
  updatePaddle();
  draw(); // 初期表示

})();
</script>
</body>
</html>
