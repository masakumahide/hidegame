<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヒデちゃん＆猫ちゃん爆走Ver</title>
    <style>
        body { margin: 0; background-color: #fce4ec; color: #880e4f; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #canvas-container { position: relative; width: 320px; height: 400px; border: 4px solid #f8bbd0; border-radius: 12px; overflow: hidden; }
        canvas { background-color: rgba(255, 255, 255, 0.4); position: absolute; z-index: 2; }
        #background-image { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; z-index: 1; }
        .controls { display: flex; gap: 10px; margin-top: 15px; width: 320px; }
        .btn { background: #f06292; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 10px; flex: 1; box-shadow: 0 4px #c2185b; }
        #btn-start { background: #ba68c8; box-shadow: 0 4px #7b1fa2; }
    </style>
</head>
<body>
    <h1>ヒデちゃん＆猫ちゃん</h1>
    <div id="canvas-container">
        <img id="background-image" src="cat.png.JPG" alt="猫ちゃん待機中">
        <canvas id="gameCanvas" width="320" height="400"></canvas>
    </div>
    <div class="controls">
        <button class="btn" id="btn-left">◀</button>
        <button class="btn" id="btn-start">音楽＆START!</button>
        <button class="btn" id="btn-right">▶</button>
    </div>

    <audio id="bgm" loop src="https://maoudamashii.jokersounds.com/music/bgm/mp3/bgm_maoudamashii_8bit18.mp3"></audio>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const bgm = document.getElementById("bgm");
    let isPlaying = false;
    let score = 0;
    let ball = { x: 160, y: 350, dx: 3, dy: -3, radius: 12 };
    let paddle = { x: 120, width: 80, height: 15 };
    let bricks = [];

    function initBricks() {
        for(let c=0; c<4; c++) {
            bricks[c] = [];
            for(let r=0; r<5; r++) {
                bricks[c][r] = { x:0, y:0, status:1, text:["健康","仕事","旅行"][Math.floor(Math.random()*3)] };
            }
        }
    }

    function draw() {
        ctx.clearRect(0,0,320,400);
        bricks.forEach((col, c) => col.forEach((b, r) => {
            if(b.status === 1) {
                b.x = c*75+15; b.y = r*30+40;
                ctx.fillStyle = "#ff80ab";
                ctx.fillRect(b.x, b.y, 65, 20);
                ctx.fillStyle = "white";
                ctx.font = "bold 10px Arial";
                ctx.fillText(b.text, b.x+10, b.y+15);
            }
        }));
        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        ctx.fillStyle = "yellow"; ctx.fill();
        ctx.fillStyle = "black"; ctx.font = "bold 12px Arial";
        ctx.fillText("ヒデ", ball.x-10, ball.y+5);
        ctx.fillStyle = "#ba68c8"; ctx.fillRect(paddle.x, 380, paddle.width, 15);

        if(isPlaying) {
            ball.x += ball.dx; ball.y += ball.dy;
            if(ball.x<ball.radius || ball.x>320-ball.radius) ball.dx *= -1;
            if(ball.y<ball.radius) ball.dy *= -1;
            if(ball.y>370 && ball.x>paddle.x && ball.x<paddle.x+paddle.width) ball.dy *= -1;
            if(ball.y>400) { isPlaying = false; bgm.pause(); alert("ゲームオーバー！猫ちゃんが待ってるよ"); }
            
            bricks.forEach(col => col.forEach(b => {
                if(b.status === 1 && ball.x > b.x && ball.x < b.x+65 && ball.y > b.y && ball.y < b.y+20) {
                    b.status = 0; ball.dy *= -1; score++;
                    if(score % 3 === 0) { ball.dx *= 1.2; ball.dy *= 1.2; }
                }
            }));
        }
        requestAnimationFrame(draw);
    }

    document.getElementById("btn-start").addEventListener("click", () => {
        bgm.currentTime = 0;
        bgm.play(); 
        isPlaying = true; score = 0;
        ball = { x: 160, y: 350, dx: 3, dy: -3, radius: 12 };
        initBricks();
    });

    document.getElementById("btn-left").onpointerdown = (e) => { e.preventDefault(); if(paddle.x > 0) paddle.x -= 30; };
    document.getElementById("btn-right").onpointerdown = (e) => { e.preventDefault(); if(paddle.x < 240) paddle.x += 30; };

    initBricks();
    draw();
</script>
</body>
</html>
