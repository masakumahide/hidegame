<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ヒデちゃん&猫ちゃん BREAKOUT 338</title>
<style>
  :root{
    --pink:#ff5aac;
    --pink2:#ff8cc8;
    --yellow:#ffd84d;
    --mint:#7effd3;
    --sky:#7de2ff;
    --violet:#a98bff;
    --ink:#4b2346;
    --white:#fffdfd;
    --shadow:0 12px 28px rgba(0,0,0,.22);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
    font-family:
      "Hiragino Maru Gothic ProN",
      "Hiragino Sans",
      "Yu Gothic",
      system-ui,
      sans-serif;
    background:
      radial-gradient(circle at top, #ffd7ea 0%, #f6bfd8 40%, #ef9fc5 100%);
    color:var(--white);
  }

  #app{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
  }

  canvas{
    display:block;
    width:100%;
    height:100%;
  }

  #hud{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    z-index:20;
    display:flex;
    justify-content:space-between;
    gap:10px;
    pointer-events:none;
  }

  .hud-col{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .panel{
    background:rgba(255,255,255,.42);
    border:1px solid rgba(255,255,255,.72);
    border-radius:18px;
    padding:10px 14px;
    box-shadow:var(--shadow);
    backdrop-filter:blur(8px);
    min-width:110px;
  }

  .label{
    font-size:11px;
    color:#9b527d;
    margin-bottom:4px;
    font-weight:700;
  }

  .value{
    font-size:18px;
    font-weight:900;
    color:var(--ink);
    letter-spacing:.03em;
    white-space:nowrap;
  }

  #catBadge{
    position:absolute;
    right:12px;
    top:106px;
    width:74px;
    height:74px;
    z-index:22;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,255,255,.95);
    box-shadow:var(--shadow);
    background:rgba(255,255,255,.2);
  }

  #catBadge img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }

  #catBadgeFallback{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
  }

  #catTalk{
    position:absolute;
    right:10px;
    top:185px;
    z-index:22;
    font-size:13px;
    font-weight:900;
    color:#fff8b0;
    text-shadow:0 2px 10px rgba(0,0,0,.3);
  }

  #message{
    position:absolute;
    top:34%;
    left:50%;
    transform:translateX(-50%);
    z-index:25;
    font-size:clamp(28px, 10vw, 56px);
    font-weight:900;
    color:var(--yellow);
    text-shadow:0 0 18px rgba(0,0,0,.28);
    pointer-events:none;
    opacity:0;
    transition:opacity .18s ease;
    white-space:nowrap;
  }

  #skillWrap{
    position:absolute;
    left:14px;
    right:92px;
    bottom:18px;
    z-index:21;
  }

  #skillLabel{
    font-size:12px;
    margin-bottom:6px;
    color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,.3);
  }

  #skillBar{
    height:16px;
    border-radius:999px;
    background:rgba(255,255,255,.25);
    border:1px solid rgba(255,255,255,.6);
    overflow:hidden;
    box-shadow:var(--shadow);
  }

  #skillFill{
    width:0%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg, #6de9ff, #9cff8d, #ffe56b);
    box-shadow:0 0 16px rgba(126,255,211,.6);
    transition:width .1s linear;
  }

  #skillBtn{
    position:absolute;
    right:14px;
    bottom:14px;
    width:68px;
    height:68px;
    z-index:23;
    border:none;
    border-radius:50%;
    font-size:28px;
    font-weight:900;
    color:#7a3b00;
    background:linear-gradient(180deg, #fff08e, #ffb833);
    box-shadow:0 8px 0 #d98f00, 0 12px 20px rgba(0,0,0,.22);
  }

  #skillBtn:active{
    transform:translateY(4px);
    box-shadow:0 4px 0 #d98f00, 0 8px 16px rgba(0,0,0,.2);
  }

  #skillBtn.disabled{
    opacity:.5;
    filter:grayscale(.6);
  }

  #overlay{
    position:absolute;
    inset:0;
    z-index:40;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,210,230,.36);
    backdrop-filter:blur(4px);
    padding:20px;
  }

  #overlay.hidden{
    display:none;
  }

  .card{
    width:min(94vw, 460px);
    background:linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.36));
    border:1px solid rgba(255,255,255,.85);
    border-radius:28px;
    box-shadow:0 20px 42px rgba(0,0,0,.22);
    padding:22px 18px 20px;
    text-align:center;
    color:var(--ink);
  }

  .bigCat{
    font-size:74px;
    line-height:1;
    margin-bottom:10px;
    filter:drop-shadow(0 8px 18px rgba(0,0,0,.18));
    animation:bounceCat 1.5s ease-in-out infinite;
  }

  @keyframes bounceCat{
    0%,100%{ transform:translateY(0) rotate(-3deg); }
    50%{ transform:translateY(-8px) rotate(3deg); }
  }

  .title{
    font-size:clamp(28px, 7vw, 42px);
    font-weight:900;
    line-height:1.14;
    color:#ff5aa5;
    text-shadow:0 0 14px rgba(255,90,165,.28);
    margin-bottom:10px;
  }

  .sub{
    font-size:14px;
    line-height:1.6;
    opacity:.95;
    margin-bottom:16px;
    color:#8d4b74;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:16px 28px;
    font-size:22px;
    font-weight:900;
    color:white;
    background:linear-gradient(180deg, #ff60ae, #ff2c92);
    box-shadow:0 8px 0 #b81f69, 0 10px 18px rgba(0,0,0,.2);
    margin-top:6px;
  }

  .btn:active{
    transform:translateY(4px);
    box-shadow:0 4px 0 #b81f69, 0 8px 14px rgba(0,0,0,.18);
  }

  .charGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:16px 0 10px;
  }

  .charBtn{
    border:none;
    border-radius:20px;
    padding:14px 10px;
    background:rgba(255,255,255,.48);
    border:2px solid rgba(255,255,255,.65);
    color:var(--ink);
    box-shadow:var(--shadow);
  }

  .charBtn .emoji{
    font-size:42px;
    line-height:1.1;
  }

  .charBtn .name{
    font-size:17px;
    font-weight:900;
    margin-top:4px;
  }

  .charBtn .skill{
    font-size:11px;
    opacity:.9;
    margin-top:4px;
    line-height:1.45;
    color:#8d4b74;
  }

  .tiny{
    font-size:11px;
    opacity:.85;
    margin-top:10px;
    line-height:1.5;
    color:#8d4b74;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-col">
      <div class="panel">
        <div class="label">SCORE</div>
        <div class="value" id="scoreText">0</div>
      </div>
      <div class="panel">
        <div class="label">LIFE</div>
        <div class="value" id="lifeText">3</div>
      </div>
    </div>
    <div class="hud-col">
      <div class="panel">
        <div class="label">STAGE</div>
        <div class="value" id="stageText">1</div>
      </div>
      <div class="panel">
        <div class="label">CHARACTER</div>
        <div class="value" id="charText">🐱 ネコ</div>
      </div>
    </div>
  </div>

  <div id="catBadge">
    <img id="catBadgeImg" alt="cat">
    <div id="catBadgeFallback">🐱</div>
  </div>
  <div id="catTalk">にゃっ</div>

  <div id="message"></div>

  <div id="skillWrap">
    <div id="skillLabel">✨ ひっさつゲージ</div>
    <div id="skillBar"><div id="skillFill"></div></div>
  </div>
  <button id="skillBtn" class="disabled">✨</button>

  <div id="overlay"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");

  const scoreText = document.getElementById("scoreText");
  const lifeText = document.getElementById("lifeText");
  const stageText = document.getElementById("stageText");
  const charText = document.getElementById("charText");
  const skillFill = document.getElementById("skillFill");
  const skillBtn = document.getElementById("skillBtn");
  const message = document.getElementById("message");
  const catTalk = document.getElementById("catTalk");
  const catBadgeImg = document.getElementById("catBadgeImg");
  const catBadgeFallback = document.getElementById("catBadgeFallback");

  let W = 0;
  let H = 0;
  const DPR = Math.min(2, window.devicePixelRatio || 1);

  const INK = "#4b2346";

  const CHARACTERS = [
    {
      id:"hide",
      name:"ヒデ",
      emoji:"😄",
      color:"#ffd84d",
      skillName:"全体キラキラ",
      desc:"通常ブロックを全部消す",
      use(){
        let removed = 0;
        for (const b of bricks) {
          if (b.alive) {
            b.alive = false;
            removed++;
            burst(b.x + b.w/2, b.y + b.h/2, "✨", 6);
          }
        }
        if (removed > 0) {
          score += removed * 20;
          say("キラッ");
          showMessage("キラキラ!!", 800);
          triggerSpecialFx("✨");
        }
      }
    },
    {
      id:"cat",
      name:"ネコ",
      emoji:"🐱",
      color:"#ff8ec7",
      skillName:"ねこだまし",
      desc:"ボールが3つになる",
      use(){
        const base = balls[0] || createBall(W/2, H*0.72);
        while (balls.length < 3) {
          const offset = balls.length === 1 ? -3 : 3;
          balls.push({
            x: base.x,
            y: base.y,
            vx: base.vx + offset,
            vy: -Math.abs(base.vy),
            r: 10,
            trail:[]
          });
        }
        say("にゃーー!");
        showMessage("NEKO!!", 800);
        triggerSpecialFx("🐱");
        playMeow();
      }
    },
    {
      id:"bear",
      name:"クマ",
      emoji:"🐻",
      color:"#a98bff",
      skillName:"どっしりガード",
      desc:"パドルが大きくなる",
      use(){
        effects.bigPaddleUntil = performance.now() + 8000;
        say("どーん");
        showMessage("BIG PAD!!", 800);
        triggerSpecialFx("🐻");
      }
    },
    {
      id:"rabbit",
      name:"ウサ",
      emoji:"🐰",
      color:"#7effd3",
      skillName:"ぴょんスロー",
      desc:"時間が少しゆっくりになる",
      use(){
        effects.slowUntil = performance.now() + 5000;
        say("ぴょん!");
        showMessage("SLOW!!", 800);
        triggerSpecialFx("🐰");
      }
    }
  ];

  let selectedChar = CHARACTERS[1];

  let state = "title";
  let score = 0;
  let stage = 1;
  let life = 3;
  let skill = 0;
  let lastTime = 0;
  let touchActive = false;
  let touchX = 0;

  let paddle = { x:0, y:0, w:104, h:20 };
  let balls = [];
  let bricks = [];
  let particles = [];
  let stars = [];
  let shake = 0;
  let damageFlash = 0;

  let effects = {
    bigPaddleUntil: 0,
    slowUntil: 0
  };

  let specialFx = {
    active:false,
    until:0,
    symbol:"🐱",
    x:-140
  };

  const BRICK_EMOJIS = ["🐟","🧶","⭐","💖","🐾"];

  let catImg = new Image();
  let catReady = false;
  const CAT_CANDIDATES = ["./cat.png.JPG","./cat.jpg","./cat.jpeg","./cat.png"];

  function loadCat(i=0){
    if (i >= CAT_CANDIDATES.length) return;
    catImg = new Image();
    catImg.onload = () => {
      catReady = true;
      catBadgeImg.src = catImg.src;
      catBadgeImg.style.display = "block";
      catBadgeFallback.style.display = "none";
    };
    catImg.onerror = () => loadCat(i+1);
    catImg.src = CAT_CANDIDATES[i];
  }
  loadCat();

  let audioCtx = null;
  let musicTimer = null;
  let musicStep = 0;

  function unlockAudio(){
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
  }

  function midiToFreq(m){
    return 440 * Math.pow(2, (m - 69) / 12);
  }

  function playTone(time, freq, dur, type="triangle", vol=0.03){
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, time);
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(vol, time + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + dur + 0.04);
  }

  function playTap(freq=520){
    if (!audioCtx) return;
    playTone(audioCtx.currentTime, freq, 0.08, "square", 0.02);
  }

  function playDamage(){
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    playTone(t, 170, 0.16, "sawtooth", 0.035);
    playTone(t + 0.05, 125, 0.22, "sawtooth", 0.03);
  }

  function playMeow(){
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.exponentialRampToValueAtTime(420, now + 0.18);
    osc.frequency.exponentialRampToValueAtTime(520, now + 0.32);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.04, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  }

  const CANON = [
    [62,66,69],
    [57,61,64],
    [59,62,66],
    [54,57,61],
    [55,59,62],
    [62,66,69],
    [55,59,62],
    [57,61,64]
  ];

  function tickMusic(){
    if (!audioCtx || state !== "playing") return;
    const chord = CANON[Math.floor(musicStep / 4) % CANON.length];
    const beat = musicStep % 4;
    const t = audioCtx.currentTime + 0.01;

    if (beat === 0) {
      chord.forEach(n => playTone(t, midiToFreq(n), 0.42, "triangle", 0.014));
      playTone(t, midiToFreq(chord[0] - 24), 0.25, "sine", 0.04);
    }
    if (beat === 2) {
      playTone(t, midiToFreq(chord[0] - 24), 0.20, "sine", 0.03);
    }

    const melody = [chord[2] + 12, chord[1] + 12, chord[0] + 12, chord[1] + 12];
    playTone(t, midiToFreq(melody[beat]), 0.14, "square", 0.012);

    musicStep++;
  }

  function startMusic(){
    unlockAudio();
    stopMusic();
    musicStep = 0;
    tickMusic();
    musicTimer = setInterval(tickMusic, 340);
  }

  function stopMusic(){
    if (musicTimer) {
      clearInterval(musicTimer);
      musicTimer = null;
    }
  }

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    paddle.y = H - 108;
    if (!touchActive) touchX = W/2;
    buildStars();
  }

  function buildStars(){
    stars = [];
    for(let i=0;i<40;i++){
      stars.push({
        x:Math.random() * W,
        y:Math.random() * H,
        r:Math.random() * 2 + 0.5,
        a:Math.random() * 0.55 + 0.18
      });
    }
  }

  function createBall(x, y){
    return {
      x, y,
      vx:(Math.random() > 0.5 ? 4.2 : -4.2),
      vy:-6.4,
      r:10,
      trail:[]
    };
  }

  function resetBalls(){
    balls = [createBall(W/2, H*0.72)];
  }

  function resetPaddle(){
    paddle.w = 104;
    paddle.h = 20;
    paddle.x = W/2 - paddle.w/2;
    paddle.y = H - 108;
  }

  function buildStage(n){
    bricks = [];
    const cols = 6;
    const margin = 14;
    const gap = 8;
    const top = 96;
    const rows = Math.min(3 + n, 6);
    const bw = (W - margin*2 - gap*(cols-1)) / cols;
    const bh = 32;

    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        bricks.push({
          x: margin + c * (bw + gap),
          y: top + r * (bh + gap),
          w: bw,
          h: bh,
          alive: true,
          hp: r > 2 ? 2 : 1,
          emoji: BRICK_EMOJIS[(r+c+n)%BRICK_EMOJIS.length],
          hue: ["#ff66b7","#ffb35d","#88e2ff","#9cffc1","#d39cff"][(r+c)%5]
        });
      }
    }
  }

  function saveBest(){
    const key = "hidecat_breakout_best";
    const best = Number(localStorage.getItem(key) || 0);
    if (score > best) localStorage.setItem(key, String(score));
  }

  function bestScore(){
    return Number(localStorage.getItem("hidecat_breakout_best") || 0);
  }

  function say(text){
    catTalk.textContent = text;
    clearTimeout(say._timer);
    say._timer = setTimeout(() => {
      catTalk.textContent = "にゃっ";
    }, 900);
  }

  function showMessage(text, ms=700){
    message.textContent = text;
    message.style.opacity = "1";
    clearTimeout(showMessage._timer);
    showMessage._timer = setTimeout(() => {
      message.style.opacity = "0";
    }, ms);
  }

  function burst(x, y, emoji="✨", count=8){
    for(let i=0;i<count;i++){
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx:Math.cos(a)*s,
        vy:Math.sin(a)*s - 0.5,
        life:1,
        emoji
      });
    }
  }

  function triggerSpecialFx(symbol){
    specialFx.active = true;
    specialFx.until = performance.now() + 650;
    specialFx.symbol = symbol;
    specialFx.x = -140;
  }

  function updateHud(){
    scoreText.textContent = score;
    lifeText.textContent = life;
    stageText.textContent = stage;
    charText.textContent = selectedChar.emoji + " " + selectedChar.name;
    skillFill.style.width = Math.max(0, Math.min(100, skill)) + "%";
    skillBtn.classList.toggle("disabled", skill < 100 || state !== "playing");
  }

  function startGame(){
    unlockAudio();
    startMusic();

    state = "playing";
    score = 0;
    stage = 1;
    life = 3;
    skill = 0;
    shake = 0;
    damageFlash = 0;
    effects.bigPaddleUntil = 0;
    effects.slowUntil = 0;
    specialFx.active = false;
    touchX = W / 2;

    resetPaddle();
    resetBalls();
    buildStage(stage);
    showMessage("にゃんスタート!", 900);
    updateHud();
    renderOverlay();
  }

  function nextStage(){
    stage++;
    if (stage > 3) {
      state = "clear";
      stopMusic();
      saveBest();
      renderOverlay();
      return;
    }
    skill = Math.min(100, skill + 25);
    buildStage(stage);
    resetBalls();
    resetPaddle();
    showMessage("STAGE " + stage, 900);
    updateHud();
  }

  function loseLife(){
    life--;
    damageFlash = 1;
    shake = 14;
    playDamage();
    updateHud();

    if (life <= 0) {
      state = "gameover";
      stopMusic();
      saveBest();
      renderOverlay();
      return;
    }

    resetBalls();
    resetPaddle();
    showMessage("もういっかい!", 800);
  }

  function useSkill(){
    if (skill < 100 || state !== "playing") return;
    skill = 0;
    selectedChar.use();
    updateHud();
  }

  function renderOverlay(){
    if (state === "title") {
      overlay.classList.remove("hidden");
      overlay.innerHTML = `
        <div class="card">
          <div class="bigCat">🐱</div>
          <div class="title">ヒデちゃん<br>にゃんにゃん BREAKOUT+</div>
          <div class="sub">
            ピンク背景、猫背景、必殺技ありの<br>
            シンプル版です。
          </div>
          <button class="btn" id="goSelect">スタート！</button>
          <div class="tiny">
            操作：画面を左右ドラッグ<br>
            右下の ✨ で必殺技
          </div>
        </div>
      `;
      document.getElementById("goSelect").onclick = () => {
        state = "select";
        renderOverlay();
      };
      return;
    }

    if (state === "select") {
      overlay.classList.remove("hidden");
      overlay.innerHTML = `
        <div class="card">
          <div class="bigCat">🐱</div>
          <div class="title" style="font-size:28px;">キャラをえらぶ</div>
          <div class="charGrid">
            ${CHARACTERS.map((c, i) => `
              <button class="charBtn" data-i="${i}" style="border-color:${c.color}">
                <div class="emoji">${c.emoji}</div>
                <div class="name">${c.name}</div>
                <div class="skill">${c.skillName}<br>${c.desc}</div>
              </button>
            `).join("")}
          </div>
        </div>
      `;
      overlay.querySelectorAll(".charBtn").forEach(btn => {
        btn.onclick = () => {
          const i = Number(btn.dataset.i);
          selectedChar = CHARACTERS[i];
          charText.textContent = selectedChar.emoji + " " + selectedChar.name;
          say(i === 1 ? "主役にゃ!" : "見てるにゃ");
          startGame();
        };
      });
      return;
    }

    if (state === "gameover") {
      overlay.classList.remove("hidden");
      overlay.innerHTML = `
        <div class="card">
          <div class="bigCat">🐱</div>
          <div class="title" style="font-size:30px;">ざんねん…</div>
          <div class="sub">
            SCORE: <b>${score}</b><br>
            BEST: <b>${bestScore()}</b>
          </div>
          <button class="btn" id="retryBtn">もういっかい！</button>
        </div>
      `;
      document.getElementById("retryBtn").onclick = () => {
        state = "select";
        renderOverlay();
      };
      return;
    }

    if (state === "clear") {
      const rank = score >= 900 ? "S" : score >= 650 ? "A" : score >= 450 ? "B" : "C";
      overlay.classList.remove("hidden");
      overlay.innerHTML = `
        <div class="card">
          <div class="bigCat">🐱</div>
          <div class="title" style="font-size:30px;">クリア！</div>
          <div class="sub">
            SCORE: <b>${score}</b><br>
            BEST: <b>${bestScore()}</b><br>
            RANK: <b>${rank}</b>
          </div>
          <button class="btn" id="againBtn">もういっかい！</button>
        </div>
      `;
      document.getElementById("againBtn").onclick = () => {
        state = "select";
        renderOverlay();
      };
      return;
    }

    overlay.innerHTML = "";
    overlay.classList.add("hidden");
  }

  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawImageCover(img, x, y, w, h){
    const ir = img.width / img.height;
    const br = w / h;
    let dw, dh, dx, dy;
    if (ir > br) {
      dh = h;
      dw = h * ir;
      dx = x - (dw - w) / 2;
      dy = y;
    } else {
      dw = w;
      dh = w / ir;
      dx = x;
      dy = y - (dh - h) / 2;
    }
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, "#ffd8ea");
    g.addColorStop(.52, "#f3bad5");
    g.addColorStop(1, "#ea96bd");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    for (const s of stars) {
      ctx.globalAlpha = s.a;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (catReady) {
      const frameX = 18;
      const frameY = 110;
      const frameW = W - 36;
      const frameH = H * 0.5;

      ctx.save();
      ctx.globalAlpha = 0.26;
      roundRectPath(frameX, frameY, frameW, frameH, 24);
      ctx.clip();
      drawImageCover(catImg, frameX, frameY, frameW, frameH);
      ctx.restore();

      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.lineWidth = 2;
      roundRectPath(frameX, frameY, frameW, frameH, 24);
      ctx.stroke();
    }

    if (damageFlash > 0) {
      ctx.fillStyle = `rgba(255,80,90,${0.22 * damageFlash})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawPaddle(){
    const g = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    g.addColorStop(0, "#fff4a6");
    g.addColorStop(1, "#ffb84d");
    ctx.fillStyle = g;
    roundRectPath(paddle.x, paddle.y, paddle.w, paddle.h, 12);
    ctx.fill();

    ctx.font = "24px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = INK;
    ctx.fillText(selectedChar.emoji, paddle.x + paddle.w/2, paddle.y - 8);
  }

  function drawBalls(){
    for (const ball of balls) {
      for (let i=0;i<ball.trail.length;i++){
        const t = ball.trail[i];
        ctx.globalAlpha = (i+1) / ball.trail.length * 0.18;
        ctx.fillStyle = selectedChar.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.r * (i+1)/ball.trail.length, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      const g = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.r);
      g.addColorStop(0, "#ffffff");
      g.addColorStop(1, selectedChar.color);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawBricks(){
    for (const b of bricks) {
      if (!b.alive) continue;
      const fill = ctx.createLinearGradient(b.x, b.y, b.x, b.y+b.h);
      fill.addColorStop(0, b.hue);
      fill.addColorStop(1, "#ffffff");
      ctx.fillStyle = fill;
      roundRectPath(b.x, b.y, b.w, b.h, 10);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,.4)";
      ctx.stroke();

      ctx.font = "20px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = INK;
      ctx.fillText(b.emoji, b.x + b.w/2, b.y + b.h/2 + 1);

      if (b.hp > 1) {
        ctx.fillStyle = "#7c2b59";
        ctx.font = "bold 10px sans-serif";
        ctx.fillText("2", b.x + b.w - 10, b.y + 10);
      }
    }
  }

  function drawParticles(){
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.font = "18px sans-serif";
      ctx.fillText(p.emoji, p.x, p.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawSpecialFx(){
    if (!specialFx.active) return;

    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.12)";
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "#ffef29";
    ctx.font = "900 34px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(
      specialFx.symbol === "🐱" ? "にゃーー!!" : "SPECIAL!!",
      W/2,
      H*0.34
    );

    if (specialFx.symbol === "🐱" && catReady) {
      const s = 86;
      const y = H * 0.5;
      ctx.save();
      ctx.beginPath();
      ctx.arc(specialFx.x + s/2, y, s/2, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(catImg, specialFx.x, y - s/2, s, s);
      ctx.restore();
    } else {
      ctx.font = "72px sans-serif";
      ctx.fillText(specialFx.symbol, specialFx.x + 40, H * 0.5);
    }
    ctx.restore();
  }

  function draw(){
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
    }
    drawBackground();
    drawBricks();
    drawPaddle();
    drawBalls();
    drawParticles();
    ctx.restore();
    drawSpecialFx();
  }

  function update(dt){
    if (state !== "playing") return;

    const now = performance.now();
    const speedScale = now < effects.slowUntil ? 0.58 : 1;

    if (now < effects.bigPaddleUntil) {
      paddle.w += (150 - paddle.w) * 0.15;
    } else {
      paddle.w += (104 - paddle.w) * 0.15;
    }

    paddle.x += ((touchX - paddle.w/2) - paddle.x) * Math.min(1, 0.18 * dt * 60);
    paddle.x = Math.max(8, Math.min(W - paddle.w - 8, paddle.x));

    for (let i = balls.length - 1; i >= 0; i--) {
      const ball = balls[i];
      ball.trail.push({x:ball.x, y:ball.y});
      if (ball.trail.length > 7) ball.trail.shift();

      ball.x += ball.vx * dt * 60 * speedScale;
      ball.y += ball.vy * dt * 60 * speedScale;

      if (ball.x < ball.r) {
        ball.x = ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if (ball.x > W - ball.r) {
        ball.x = W - ball.r;
        ball.vx *= -1;
        playTap(360);
      }
      if (ball.y < ball.r + 8) {
        ball.y = ball.r + 8;
        ball.vy *= -1;
        playTap(420);
      }

      if (
        ball.y + ball.r > paddle.y &&
        ball.y - ball.r < paddle.y + paddle.h &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.w &&
        ball.vy > 0
      ) {
        const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
        ball.vx = hit * 6.5;
        ball.vy = -Math.max(6.2, Math.abs(ball.vy));
        burst(ball.x, paddle.y, "🐾", 5);
        playTap(620);
      }

      for (const brick of bricks) {
        if (!brick.alive) continue;
        if (
          ball.x + ball.r > brick.x &&
          ball.x - ball.r < brick.x + brick.w &&
          ball.y + ball.r > brick.y &&
          ball.y - ball.r < brick.y + brick.h
        ) {
          brick.hp--;
          ball.vy *= -1;
          skill = Math.min(100, skill + 3.8);

          if (brick.hp <= 0) {
            brick.alive = false;
            score += 10;
            burst(brick.x + brick.w/2, brick.y + brick.h/2, brick.emoji, 6);
            playTap(860);
          } else {
            score += 4;
            playTap(540);
          }

          updateHud();
          break;
        }
      }

      if (ball.y > H + 30) {
        balls.splice(i, 1);
      }
    }

    if (balls.length === 0) loseLife();

    if (bricks.every(b => !b.alive)) {
      nextStage();
      updateHud();
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy += 0.03 * dt * 60;
      p.life -= 0.03 * dt * 60;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (specialFx.active) {
      specialFx.x += 18 * dt * 60;
      if (performance.now() > specialFx.until) {
        specialFx.active = false;
      }
    }

    if (shake > 0.08) shake *= 0.88;
    else shake = 0;

    if (damageFlash > 0.02) damageFlash *= 0.88;
    else damageFlash = 0;
  }

  function loop(ts){
    if (!lastTime) lastTime = ts;
    const dt = Math.min(0.033, (ts - lastTime) / 1000);
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function setTouchFromEvent(e){
    const t = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    touchX = t.clientX - rect.left;
  }

  canvas.addEventListener("touchstart", e => {
    touchActive = true;
    setTouchFromEvent(e);
    unlockAudio();
  }, {passive:true});

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    setTouchFromEvent(e);
  }, {passive:false});

  canvas.addEventListener("touchend", () => {
    touchActive = false;
  });

  canvas.addEventListener("mousemove", e => {
    if (window.innerWidth > 700) touchX = e.clientX;
  });

  skillBtn.addEventListener("click", () => {
    unlockAudio();
    useSkill();
  });

  window.addEventListener("resize", resize);

  resize();
  renderOverlay();
  updateHud();
  requestAnimationFrame(loop);
})();
</script>
</body>
